name: Prepare release

# Fires on push to main. When conventional commits indicate a version bump,
# Melos computes per-package version bumps + CHANGELOG updates, and we open (or
# update) a SINGLE rolling release PR on the fixed `chore/release` branch for
# human review. Merge it to cut a release.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    name: Prepare release PR
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Skip when the commit is itself a release commit (prevents loops)
    if: "!contains(github.event.head_commit.message, 'chore(release)')"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # Use PAT so the resulting PR can trigger downstream workflows.
          # Default GITHUB_TOKEN cannot do this.
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1

      # The Dart pub-workspace / Melos root is the repo root, so melos-action
      # (which runs `melos bootstrap` from the workspace root) works directly.
      # It bootstraps, runs `melos version` (commits the bumps + CHANGELOG
      # updates), and a publish dry-run. We deliberately do NOT use its built-in
      # create-pr: that opens a brand-new PR on a `release-${{ github.run_id }}`
      # branch every push. Instead we open ONE rolling PR on a fixed branch.
      - uses: bluefireteam/melos-action@2982f8e4fc92440a219490009d6d05195cb1a6a5 # v3
        with:
          run-versioning: true
          publish-dry-run: true

      # Open or UPDATE a single rolling release PR on the fixed `chore/release`
      # branch. On each push to main, create-pull-request resets that branch to
      # main and re-applies Melos's bumps + changelogs, so there is always
      # exactly one open release PR. Squash-merging it lands a `chore(release)`
      # commit, which triggers release-tag.yml → release-publish.yml.
      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          # RELEASE_PAT (contents+pull-requests:write, ideally actions:write so
          # release-tag.yml triggers) preferred; falls back to GITHUB_TOKEN
          # (needs the org/repo "Allow Actions to create PRs" setting enabled).
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          branch: chore/release
          delete-branch: true
          title: "chore(release): publish packages"
          commit-message: "chore(release): version packages"
          body: |
            Automated version bumps + CHANGELOG updates from Melos.

            **Rolling release PR** — this updates in place on every push to `main`.
            **Squash-merge** it to cut a release (lands a `chore(release)` commit
            that triggers tag + pub.dev publish).
