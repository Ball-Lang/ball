name: ball_self_host_tests
description: >-
  Self-hosting validation harness for Ball. Contains round-trip output of
  dart/engine/lib/engine.dart, plus parity tests against the live engine.
publish_to: none
version: 0.0.0

environment:
  sdk: ^3.9.0
resolution: workspace

dependencies:
  ball_base: ^0.1.0
  ball_engine: ^0.1.0
  ball_resolver: ^0.1.0
  protobuf: ^6.0.0
  fixnum: ^1.1.1

dev_dependencies:
  test: ^1.25.0
