name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  packages: write
  # gh workflow run (npm-publish dispatch after a release is cut)
  actions: write

jobs:
  # ──────────────────────────────────────────────────
  # Run all tests before releasing
  # ──────────────────────────────────────────────────
  test:
    name: Pre-release Tests
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1
        with:
          setup_only: true

      - name: Proto lint
        run: buf lint proto/

      - name: Proto format check
        run: buf format proto/ --diff --exit-code

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable

      - name: Dart install dependencies
        run: cd dart && dart pub get

      - name: Dart analyze
        run: dart analyze dart/

      - name: Dart shared tests
        run: cd dart/shared && dart test

      - name: Dart engine tests
        run: cd dart/engine && dart test

      - name: Dart encoder tests
        run: cd dart/encoder && dart test

      - name: Dart compiler tests
        run: cd dart/compiler && dart test --exclude-tags slow

      - name: Dart resolver tests
        run: cd dart/resolver && dart test

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ts/engine/package-lock.json

      - name: TypeScript install dependencies
        run: cd ts/engine && npm ci

      - name: TypeScript build
        run: cd ts/engine && npm run build

      - name: TypeScript test
        run: cd ts/engine && npm test

  # ──────────────────────────────────────────────────
  # Semantic Release
  # ──────────────────────────────────────────────────
  release:
    name: Semantic Release
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Install semantic-release plugins
        run: >
          npm install -g
          semantic-release
          @semantic-release/commit-analyzer
          @semantic-release/release-notes-generator
          @semantic-release/changelog
          @semantic-release/exec
          @semantic-release/github
          @semantic-release/git

      # semantic-release creates the GitHub release + changelog and bumps the
      # four npm package.json versions in lockstep (see .releaserc.json). The
      # exec plugin's successCmd writes `released_version` to this step's
      # outputs — set ONLY when a release was actually published.
      - name: Run semantic-release
        id: semrel
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # npm publishing runs in publish-npm.yml (OIDC trusted publishing, no
      # token). Its `release: published` trigger never fires for releases
      # created here: events produced with the default GITHUB_TOKEN do not
      # trigger workflows (GitHub recursion protection) — npm silently froze
      # at 0.2.x for months because of this. Dispatch it explicitly instead,
      # pinned to the fresh release tag (same proven pattern as
      # release-tag.yml → release-publish.yml).
      - name: Dispatch npm publish for the new release
        if: steps.semrel.outputs.released_version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run publish-npm.yml --ref "v${{ steps.semrel.outputs.released_version }}"
