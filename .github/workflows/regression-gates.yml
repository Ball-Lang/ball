name: Regression Gates

# Numeric pass-count gates so green suites cannot silently regress.
#
# This is intentionally SEPARATE from ci.yml (which runs the full build +
# test matrix and fails on any non-zero exit) and conformance-matrix.yml
# (which prints a parity table). Those existing workflows already catch a
# suite that goes red. What they do NOT catch is a suite that stays green
# while quietly dropping pass counts (e.g. a test being skipped/deleted, or
# a tally regressing from 156 -> 155). This workflow asserts hard floors:
#
#   * TS hand-written engine : exactly 269 passed / 0 failed
#   * TS self-hosted compiler : exactly 269 passed / 0 failed (node --test suite)
#   * Dart engine            : 0 failed; pass count must not drop below DART_ENGINE_MIN_PASS
#   * Dart encoder           : exactly DART_ENCODER_EXPECTED passed / 0 failed
#   * Dart compiler          : exactly DART_COMPILER_EXPECTED passed / 0 failed
#                              (--exclude-tags slow, matching ci.yml)
#   * C++ self-host tally     : PASS must not drop below 209 (of 227 fixtures)
#                              — blocking only when the Linux native build is green
#
# Action versions verified 2026-05-25 against the upstream release pages:
#   actions/checkout       v6  (latest v6.0.2)
#   actions/setup-node     v6  (latest v6.4.0)
#   dart-lang/setup-dart   v1  (latest v1.7.2)
#   bufbuild/buf-action    v1
# Node is pinned to 22: `--experimental-strip-types` (used by the TS test
# scripts) first shipped in Node 22.6.0, and the `22` line resolves well
# past that.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: regression-gates-${{ github.ref }}
  cancel-in-progress: true

# Pin the expected counts in one place so bumping the floor is a one-line edit.
env:
  TS_ENGINE_EXPECTED_PASS: "269"
  TS_COMPILER_EXPECTED_PASS: "269"
  DART_ENGINE_MIN_PASS: "566"
  DART_ENCODER_EXPECTED: "116"
  DART_COMPILER_EXPECTED: "88"
  CPP_SELFHOST_MIN_PASS: "211"

jobs:
  # ──────────────────────────────────────────────────
  # TypeScript regression gate — engine + compiler must each
  # report exactly 269 engine / 41 compiler passed / 0 failed.
  # ──────────────────────────────────────────────────
  ts-regression:
    name: TS Regression Gate (engine + compiler)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          # `--experimental-strip-types` requires Node >= 22.6.0; the 22 line
          # resolves to a recent 22.x that includes it.
          node-version: 22

      # engine_parse.test.ts shells out to roundtrip_engine.dart when
      # dart/self_host/engine.ball.json is missing.
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Bootstrap Dart workspace (roundtrip_engine)
        run: cd dart && dart pub get

      # engine_runtime.test.ts checks existsSync(engine.ball.json) at module
      # load and SKIPS its ~227 conformance subtests if it is missing — and the
      # file is gitignored. Generate it explicitly here (rather than relying on
      # engine_parse.test.ts's on-demand shell-out, which races module load) so
      # the TS compiler gate exercises the full 269-test suite.
      - name: Generate engine.ball.json (self-host source)
        run: cd dart && dart run encoder/tool/roundtrip_engine.dart --skip-analyze --save-program self_host/engine.ball.json

      # ── @ball-lang/engine — prints: "Results: N passed, M failed, T total"
      - name: Install @ball-lang/engine
        run: cd ts/engine && npm ci

      - name: Build @ball-lang/engine
        run: cd ts/engine && npm run build

      - name: Engine — assert 269 passed / 0 failed
        run: |
          set -o pipefail
          cd ts/engine
          # The test runner already exits non-zero on any failure; we additionally
          # assert the exact pass count so a dropped/skipped test is caught too.
          output=$(npm test 2>&1) || { echo "$output"; echo "::error::TS engine suite exited non-zero"; exit 1; }
          echo "$output"

          passed=$(echo "$output" | grep -oP 'Results: \K\d+(?= passed)' | tail -1)
          failed=$(echo "$output" | grep -oP ', \K\d+(?= failed)'      | tail -1)

          if [ -z "$passed" ] || [ -z "$failed" ]; then
            echo "::error::Could not parse the 'Results: N passed, M failed' line from TS engine output"
            exit 1
          fi

          echo "TS engine: $passed passed, $failed failed (expected ${TS_ENGINE_EXPECTED_PASS} / 0)"
          if [ "$failed" != "0" ]; then
            echo "::error::TS engine has $failed failing test(s)"
            exit 1
          fi
          if [ "$passed" != "${TS_ENGINE_EXPECTED_PASS}" ]; then
            echo "::error::TS engine pass count regressed: got $passed, expected ${TS_ENGINE_EXPECTED_PASS}. If this is an intentional change, update TS_ENGINE_EXPECTED_PASS in .github/workflows/regression-gates.yml."
            exit 1
          fi

      # ── @ball-lang/compiler — uses `node --test`, prints "# pass N" / "# fail N"
      - name: Install @ball-lang/compiler
        run: cd ts/compiler && npm ci

      - name: Build @ball-lang/compiler
        run: cd ts/compiler && npm run build

      - name: Compiler — assert 269 pass / 0 fail
        run: |
          set -o pipefail
          cd ts/compiler
          output=$(npm test 2>&1) || { echo "$output"; echo "::error::TS compiler suite exited non-zero"; exit 1; }
          echo "$output"

          # node --test summary line varies by reporter:
          #   * TAP reporter (non-TTY direct invocation): "# pass N" / "# fail N"
          #   * spec reporter (the default when run via npm):  "ℹ pass N" / "ℹ fail N"
          # Match either form by anchoring on the trailing "pass"/"fail" keyword.
          passed=$(echo "$output" | grep -oP '(^# pass |pass )\K\d+' | tail -1)
          failed=$(echo "$output" | grep -oP '(^# fail |fail )\K\d+' | tail -1)

          if [ -z "$passed" ] || [ -z "$failed" ]; then
            echo "::error::Could not parse the '# pass N' / '# fail N' summary from TS compiler output"
            exit 1
          fi

          echo "TS compiler: $passed pass, $failed fail (expected ${TS_COMPILER_EXPECTED_PASS} / 0)"
          if [ "$failed" != "0" ]; then
            echo "::error::TS compiler has $failed failing test(s)"
            exit 1
          fi
          if [ "$passed" != "${TS_COMPILER_EXPECTED_PASS}" ]; then
            echo "::error::TS compiler pass count regressed: got $passed, expected ${TS_COMPILER_EXPECTED_PASS}. If this is an intentional change, update TS_COMPILER_EXPECTED_PASS in .github/workflows/regression-gates.yml."
            exit 1
          fi

  # ──────────────────────────────────────────────────
  # Dart regression gate — engine, encoder, and compiler must each
  # report 0 failures and the expected pass counts (matching ci.yml
  # conventions: compiler excludes @Tags(['slow'])).
  # ──────────────────────────────────────────────────
  dart-regression:
    name: Dart Regression Gate (engine + encoder + compiler)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      # The Dart compiler test suite shells out to @ball-lang/compiler.
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Dart workspace
        run: cd dart && dart pub get

      - name: Install & build @ball-lang/compiler
        run: cd ts/compiler && npm ci && npm run build

      - name: Engine — assert 0 failed and pass floor
        run: |
          set -o pipefail
          cd dart/engine
          output=$(dart test 2>&1) || { echo "$output"; echo "::error::Dart engine suite exited non-zero"; exit 1; }
          echo "$output"

          if echo "$output" | grep -q "All tests passed"; then
            passed=$(echo "$output" | grep -oP '\+(\d+)' | tail -1 | grep -oP '\d+')
            failed="0"
          else
            passed=$(echo "$output" | grep -oP '\+(\d+)' | tail -1 | grep -oP '\d+' || echo "")
            failed=$(echo "$output" | grep -oP '(?<![+~])-(\d+)' | tail -1 | grep -oP '\d+' || echo "0")
          fi

          if [ -z "$passed" ] || [ -z "$failed" ]; then
            echo "::error::Could not parse Dart engine pass/fail counts"
            exit 1
          fi

          echo "Dart engine: $passed passed, $failed failed (floor: ${DART_ENGINE_MIN_PASS}, require 0 failed)"
          if [ "$failed" != "0" ]; then
            echo "::error::Dart engine has $failed failing test(s)"
            exit 1
          fi
          if [ "$passed" -lt "${DART_ENGINE_MIN_PASS}" ]; then
            echo "::error::Dart engine pass count regressed: got $passed, must be >= ${DART_ENGINE_MIN_PASS}. If this is an intentional change, update DART_ENGINE_MIN_PASS in .github/workflows/regression-gates.yml."
            exit 1
          fi

      - name: Encoder — assert expected pass / 0 failed
        run: |
          set -o pipefail
          cd dart/encoder
          output=$(dart test 2>&1) || { echo "$output"; echo "::error::Dart encoder suite exited non-zero"; exit 1; }
          echo "$output"

          if echo "$output" | grep -q "All tests passed"; then
            passed=$(echo "$output" | grep -oP '\+(\d+)' | tail -1 | grep -oP '\d+')
            failed="0"
          else
            passed=$(echo "$output" | grep -oP '\+(\d+)' | tail -1 | grep -oP '\d+' || echo "")
            failed=$(echo "$output" | grep -oP '(?<![+~])-(\d+)' | tail -1 | grep -oP '\d+' || echo "0")
          fi

          if [ -z "$passed" ] || [ -z "$failed" ]; then
            echo "::error::Could not parse Dart encoder pass/fail counts"
            exit 1
          fi

          echo "Dart encoder: $passed passed, $failed failed (expected ${DART_ENCODER_EXPECTED} / 0)"
          if [ "$failed" != "0" ]; then
            echo "::error::Dart encoder has $failed failing test(s)"
            exit 1
          fi
          if [ "$passed" != "${DART_ENCODER_EXPECTED}" ]; then
            echo "::error::Dart encoder pass count regressed: got $passed, expected ${DART_ENCODER_EXPECTED}. If this is an intentional change, update DART_ENCODER_EXPECTED in .github/workflows/regression-gates.yml."
            exit 1
          fi

      - name: Compiler — assert expected pass / 0 fail (exclude slow)
        run: |
          set -o pipefail
          cd dart/compiler
          output=$(dart test --exclude-tags slow 2>&1) || { echo "$output"; echo "::error::Dart compiler suite exited non-zero"; exit 1; }
          echo "$output"

          if echo "$output" | grep -q "All tests passed"; then
            passed=$(echo "$output" | grep -oP '\+(\d+)' | tail -1 | grep -oP '\d+')
            failed="0"
          else
            passed=$(echo "$output" | grep -oP '\+(\d+)' | tail -1 | grep -oP '\d+' || echo "")
            failed=$(echo "$output" | grep -oP '(?<![+~])-(\d+)' | tail -1 | grep -oP '\d+' || echo "0")
          fi

          if [ -z "$passed" ] || [ -z "$failed" ]; then
            echo "::error::Could not parse Dart compiler pass/fail counts"
            exit 1
          fi

          echo "Dart compiler: $passed passed, $failed failed (expected ${DART_COMPILER_EXPECTED} / 0)"
          if [ "$failed" != "0" ]; then
            echo "::error::Dart compiler has $failed failing test(s)"
            exit 1
          fi
          if [ "$passed" != "${DART_COMPILER_EXPECTED}" ]; then
            echo "::error::Dart compiler pass count regressed: got $passed, expected ${DART_COMPILER_EXPECTED}. If this is an intentional change, update DART_COMPILER_EXPECTED in .github/workflows/regression-gates.yml."
            exit 1
          fi

  # ──────────────────────────────────────────────────
  # C++ self-host tally gate — the compiled Ball engine (engine_rt.cpp)
  # must keep passing at least CPP_SELFHOST_MIN_PASS of the 227 conformance
  # fixtures. This job only runs (and is blocking) once cpp-conformance has
  # built successfully on Linux — i.e. the native C++ build is green.
  #
  # Equivalent of cpp/test/run_selfhost_tally.sh, but re-pointed at the Linux
  # single-config binary path (the checked-in script hard-codes the Windows
  # MSVC `cpp/build3/test/Release/*.exe` path). It emits the same `PASS=N`
  # summary line that the script does, then enforces the floor.
  # ──────────────────────────────────────────────────
  cpp-selfhost-tally:
    name: C++ Self-Host Tally (PASS >= 211)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Install nlohmann-json
        run: sudo apt-get update && sudo apt-get install -y nlohmann-json3-dev

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Bootstrap Dart workspace (engine_rt generation)
        run: cd dart && dart pub get

      - name: Configure CMake (bootstrap compiler)
        run: cmake -S cpp -B cpp/ci-build -DCMAKE_BUILD_TYPE=Release

      - name: Build ball_cpp_compile
        run: cmake --build cpp/ci-build --config Release --target ball_cpp_compile

      - name: Generate engine_rt.cpp
        run: dart run dart/compiler/tool/compile_engine_cpp.dart --monolithic

      - name: Configure CMake (enable self-host target)
        run: cmake -S cpp -B cpp/ci-build -DCMAKE_BUILD_TYPE=Release

      - name: Build self-host conformance binary
        run: cmake --build cpp/ci-build --config Release --target test_selfhost_conformance

      - name: Run per-fixture tally and enforce PASS floor
        run: |
          set -uo pipefail

          # Locate the built binary. Single-config generators (Make/Ninja) emit
          # cpp/ci-build/test/test_selfhost_conformance; multi-config generators
          # would put it under a config subdir. Search both.
          exe=""
          for candidate in \
            cpp/ci-build/test/test_selfhost_conformance \
            cpp/ci-build/test/Release/test_selfhost_conformance; do
            if [ -x "$candidate" ]; then exe="$candidate"; break; fi
          done
          if [ -z "$exe" ]; then
            echo "::error::Could not find test_selfhost_conformance binary under cpp/ci-build/test"
            find cpp/ci-build/test -maxdepth 2 -type f -name 'test_selfhost_conformance*' || true
            exit 1
          fi
          echo "Using binary: $exe"

          # Per-fixture isolated-process tally (mirrors run_selfhost_tally.sh):
          # the in-process harness dies on the first stack-overflowing fixture,
          # so each fixture runs in its own process via BALL_TEST_FILTER.
          pass=0; fail=0; timeout=0; crash=0
          fails=()
          for f in tests/conformance/*.ball.json; do
            name=$(basename "$f" .ball.json)
            out=$(BALL_TEST_FILTER="$name" "$exe" 2>/dev/null)
            if   echo "$out" | grep -q "  PASS: $name ";    then pass=$((pass+1))
            elif echo "$out" | grep -q "  TIMEOUT: $name "; then timeout=$((timeout+1)); fails+=("$name:TIMEOUT")
            elif echo "$out" | grep -q "  FAIL: $name ";    then fail=$((fail+1));    fails+=("$name")
            else crash=$((crash+1)); fails+=("$name:CRASH"); fi
          done

          # Same summary line emitted by run_selfhost_tally.sh.
          echo "PASS=$pass FAIL=$fail TIMEOUT=$timeout CRASH=$crash"
          echo "--- non-pass ---"
          printf '%s\n' "${fails[@]}"

          echo ""
          echo "C++ self-host tally: $pass passed (floor: ${CPP_SELFHOST_MIN_PASS}, of 227 fixtures)"
          if [ "$pass" -lt "${CPP_SELFHOST_MIN_PASS}" ]; then
            echo "::error::C++ self-host PASS regressed: got $pass, must be >= ${CPP_SELFHOST_MIN_PASS}. See the non-pass list above. If this is an intentional change, update CPP_SELFHOST_MIN_PASS in .github/workflows/regression-gates.yml."
            exit 1
          fi
          echo "C++ self-host tally floor satisfied."
