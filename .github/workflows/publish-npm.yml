name: Publish npm

on:
  release:
    types: [published]

permissions:
  id-token: write    # for provenance attestation (not OIDC auth)
  contents: read

jobs:
  publish:
    name: Publish @ball-lang/engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        working-directory: ts/engine
        run: npm ci

      - name: Build
        working-directory: ts/engine
        run: npm run build

      - name: Test
        working-directory: ts/engine
        run: npm test

      - name: Publish with provenance
        working-directory: ts/engine
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
