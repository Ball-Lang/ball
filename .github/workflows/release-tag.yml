name: Tag and start release

# Fires when a release PR (chore(release): ...) is merged to main.
# Creates per-package tags via Melos, then dispatches release-publish.yml
# once per package in dependency order (base → resolver → engine → ...).

on:
  push:
    branches: [main]

permissions:
  actions: write
  contents: write

jobs:
  tag-and-dispatch:
    name: Tag packages and dispatch publish
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Only run on release commits (created by release-prepare.yml's PR merge)
    if: contains(github.event.head_commit.message, 'chore(release)')
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1

      # The Dart pub-workspace / Melos root is the repo root, so melos-action
      # (which runs `melos bootstrap` from the workspace root) works directly.
      # melos-action with `tag: true` creates <package_name>-v<version>
      # tags for every package whose version changed since the last tag.
      - uses: bluefireteam/melos-action@2982f8e4fc92440a219490009d6d05195cb1a6a5 # v3
        with:
          tag: true

      # Dispatch release-publish.yml once per freshly-tagged package.
      # NOT --order-dependents: the workspace has dev-dependency cycles
      # (ball_base↔ball_protobuf, ball_engine↔ball_encoder round-trip tests)
      # that make melos's topological sort hard-fail — the first-ever run of
      # this workflow died on exactly that. The ordering was illusory anyway:
      # `gh workflow run` returns immediately, so the dispatched publishes
      # run concurrently regardless. Steady-state releases are
      # order-independent (caret ranges are satisfied by the PREVIOUS
      # published versions); only a catch-up release for a package whose
      # deps have never reached pub.dev needs manual, tiered dispatch.
      - name: Dispatch per-package publish workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dart run melos exec -c 1 --no-private -- \
            'gh workflow run release-publish.yml --ref $MELOS_PACKAGE_NAME-v$MELOS_PACKAGE_VERSION'
