          if [ "$total" -lt 1 ]; then
            echo "::error::The Rust compiler leg reported no Results line — it ran no fixtures"
            exit 1
          fi

          if [ "$passed" -lt "$RUST_COMPILER_FLOOR" ]; then
            echo "::error::Rust compiler leg REGRESSED: $passed passed, below the floor of $RUST_COMPILER_FLOOR — a fixture that used to compile no longer does"
            exit 1
          fi

          if [ "$passed" -gt "$RUST_COMPILER_FLOOR" ]; then
            echo "::notice::Rust compiler leg IMPROVED: $passed passed (floor was $RUST_COMPILER_FLOOR). Raise RUST_COMPILER_FLOOR to $passed in this workflow to lock the gain in."
          fi
          exit 0

    outputs:
      passed: ${{ steps.conformance.outputs.passed }}
      failed: ${{ steps.conformance.outputs.failed }}
      total: ${{ steps.conformance.outputs.total }}
      floor: ${{ steps.conformance.outputs.floor }}

