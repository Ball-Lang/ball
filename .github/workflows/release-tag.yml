name: Tag and start release

# Fires when a release PR (chore(release): ...) is merged to main.
# Creates per-package tags via Melos, then dispatches release-publish.yml
# once per package in dependency order (base → resolver → engine → ...).

on:
  push:
    branches: [main]

permissions:
  actions: write
  contents: write

jobs:
  tag-and-dispatch:
    name: Tag packages and dispatch publish
    runs-on: ubuntu-latest
    # Only run on release commits (created by release-prepare.yml's PR merge)
    if: contains(github.event.head_commit.message, 'chore(release)')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dart-lang/setup-dart@v1

      - name: Bootstrap workspace
        working-directory: dart
        run: dart pub get

      - name: Configure git identity
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      # Create <package_name>-v<version> tags for every package whose version
      # changed since the last tag, then push them. (melos-action@v3 would do
      # this from the repo root, where there is no Melos workspace — so we run
      # melos directly from dart/ via the dev-dependency.)
      - name: Tag changed packages and push tags
        working-directory: dart
        run: |
          dart run melos exec -c 1 --no-private -- \
            'git tag $MELOS_PACKAGE_NAME-v$MELOS_PACKAGE_VERSION || true'
          git push --no-follow-tags
          for tag in $(git tag --points-at HEAD); do git push origin "$tag"; done

      # Dispatch release-publish.yml once per freshly-tagged package,
      # in dependency order. `--no-published` skips packages whose
      # version is already on pub.dev (e.g. republishing unchanged).
      - name: Dispatch per-package publish workflows
        working-directory: dart
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dart run melos exec -c 1 --no-private --order-dependents -- \
            'gh workflow run release-publish.yml --ref $MELOS_PACKAGE_NAME-v$MELOS_PACKAGE_VERSION'
