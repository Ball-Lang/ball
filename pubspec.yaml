name: ball_workspace
environment:
  sdk: ^3.9.0

# Dart is Ball's reference language (compiler + encoder + engine + CLI + std),
# so the Dart pub workspace / Melos root lives at the repo root. The actual
# packages live under dart/; everything else (ts/, cpp/, proto/, …) is owned by
# its own toolchain. Run `dart pub get` and `melos …` from the repo root.
workspace:
  - dart/ball_protobuf
  - dart/ball_protobuf_gen
  - dart/ball_rpc
  - dart/shared
  - dart/compiler
  - dart/encoder
  - dart/engine
  - dart/cli
  - dart/resolver
  - dart/self_host

dev_dependencies:
  melos: ^7.8.2

melos:
  repository: https://github.com/ball-lang/ball

  command:
    version:
      branch: main
      linkToCommits: true
      # semantic-release (.releaserc.json) is the SOLE owner of the root
      # CHANGELOG.md. Melos must NOT also write it, otherwise the rolling
      # `chore/release` PR goes CONFLICTING every time semantic-release commits
      # its own root-CHANGELOG.md change to main (issue #194). The aggregate
      # that workspaceChangelog used to produce is preserved below as a separate
      # Melos-owned file, PACKAGES_CHANGELOG.md.
      workspaceChangelog: false
      updateGitTagRefs: true
      # Aggregate Dart-package changelog at a Melos-owned path (formerly the
      # root CHANGELOG.md). scope: '*' matches every workspace package, so the
      # version run's default (non-private) selection is aggregated here —
      # same content the old workspaceChangelog produced, just a different file
      # that never collides with semantic-release's root CHANGELOG.md.
      changelogs:
        - path: PACKAGES_CHANGELOG.md
          description: |
            Aggregate changelog for the Dart workspace packages, generated by
            Melos. The root CHANGELOG.md is owned by semantic-release.
          packageFilters:
            scope: '*'

  ignore:
    - '**/.dart_tool/**'
    - '**/build/**'

  scripts:
    analyze:
      description: Run `dart analyze` on all packages
      run: melos exec -c 1 -- "dart analyze --no-fatal-warnings ."

    format:
      description: Run `dart format` on all packages
      run: melos exec -c 1 -- "dart format ."

    format-check:
      description: Check formatting without modifying files
      run: melos exec -c 1 -- "dart format --set-exit-if-changed ."

    test:
      description: Run all tests across packages (skips packages without tests)
      run: melos exec --fail-fast --dir-exists=test -c 1 -- "dart test"

    test-fast:
      description: Run tests excluding slow-tagged tests
      run: melos exec --fail-fast --dir-exists=test -c 1 -- "dart test --exclude-tags slow"

    regen-std:
      description: Regenerate std.json and std.bin from std.dart
      run: cd dart/shared && dart run bin/gen_std.dart

    regen-protobuf:
      description: Regenerate ball_protobuf.json and ball_protobuf.bin from protobuf Dart sources
      run: cd dart/encoder && dart run bin/gen_ball_protobuf.dart

    regen-protos:
      description: Regenerate protobuf bindings via buf
      run: buf generate proto/

    validate-roundtrip:
      description: Run round-trip validation on all 20 top pub packages
      run: cd dart/encoder && dart run ball_encoder:roundtrip_top20

    co19:
      description: Run co19 conformance validation (default 500 tests)
      run: cd dart/encoder && dart run ball_encoder:co19_validate --limit 500

    audit:
      description: Run ball audit on examples
      run: cd dart && dart run ball_cli:ball audit ../examples/hello_world/hello_world.ball.json

    self-host:
      description: Phase 1 parity + Phase 2 TS-native compile of engine.dart
      run: |
        cd dart/self_host && dart test
        cd ../../ts/compiler && npm test

    pub-publish-dry:
      description: Dry-run publish for all packages (order matters — base first)
      run: melos exec -c 1 --order-dependents-first -- "dart pub publish --dry-run"

    clean:
      description: Remove all build artifacts and .dart_tool directories
      run: melos exec -- "rm -rf .dart_tool build"
