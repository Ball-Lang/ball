name: Publish npm

# Triggered by semantic-release creating a GitHub release,
# or by manually publishing a release.
on:
  release:
    types: [published]

permissions:
  id-token: write    # OIDC trusted publishing — no NPM_TOKEN needed
  contents: read

jobs:
  publish:
    name: Publish @ball-lang/engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Install npm 11.5.1+ which supports OIDC trusted publishing for
      # scoped packages. Use corepack to avoid MODULE_NOT_FOUND issues
      # with `npm install -g npm@X` in node:22 image.
      - name: Enable npm 11 via corepack
        run: |
          corepack enable
          corepack prepare npm@11.5.2 --activate

      - name: Install dependencies
        working-directory: ts/engine
        run: npm ci

      - name: Build
        working-directory: ts/engine
        run: npm run build

      - name: Test
        working-directory: ts/engine
        run: npm test

      # Remove setup-node's .npmrc that contains a NODE_AUTH_TOKEN
      # placeholder. With trusted publishing, pure OIDC handles auth;
      # any token in .npmrc prevents OIDC activation on some npm
      # versions (known issue with scoped packages).
      - name: Remove setup-node's .npmrc (enable pure OIDC)
        run: rm -f ~/.npmrc $RUNNER_TEMP/.npmrc

      # OIDC trusted publishing requires npm 11.5.1+ AND the trusted
      # publisher config on npmjs.com must match: org=ball-lang,
      # repo=ball, workflow=publish-npm.yml.
      - name: Publish with provenance
        working-directory: ts/engine
        run: npm publish --provenance --access public
