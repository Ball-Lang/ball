name: ball_cli
description: >-
  Command-line tool for the Ball programming language -- compile, encode,
  run, and inspect Ball programs from the terminal.
version: 0.1.0
homepage: https://github.com/ball-lang/ball
repository: https://github.com/ball-lang/ball
issue_tracker: https://github.com/ball-lang/ball/issues
topics:
  - programming-language
  - cli
  - compiler
  - interpreter
  - ball

environment:
  sdk: ^3.9.0


executables:
  ball:
    ball

dependencies:
  ball_base: ^0.1.0
  ball_compiler: ^0.1.0
  ball_encoder: ^0.1.0
  ball_engine: ^0.1.0
  ball_resolver: ^0.1.0
  fixnum: ^1.1.1
  protobuf: ^6.0.0

dev_dependencies:
  lints: ^6.1.0




resolution: workspace

