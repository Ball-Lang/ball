name: ball_resolver
description: >-
  Module resolver for Ball programs that fetches, verifies, and caches modules
  from HTTP, file, git, inline, and registry sources with integrity checking.
version: 0.1.0
homepage: https://github.com/ball-lang/ball
repository: https://github.com/ball-lang/ball
issue_tracker: https://github.com/ball-lang/ball/issues
topics:
  - programming-language
  - module-resolver
  - dependency-management
  - protobuf
  - ball

environment:
  sdk: ^3.9.0
resolution: workspace

dependencies:
  ball_base: ^0.1.0
  http: ^1.2.0
  archive: ^4.0.0
  crypto: ^3.0.0
  path: ^1.9.0
  pub_semver: ^2.1.0

dev_dependencies:
  test: ^1.25.0
