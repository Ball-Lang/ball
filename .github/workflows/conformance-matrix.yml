name: Conformance Matrix

on:
  push:
    branches: [main]
    paths:
      - "tests/conformance/**"
      - "dart/engine/**"
      - "dart/shared/**"
      - "dart/compiler/**"
      - "ts/engine/**"
      - "ts/compiler/**"
      - "ts/shared/**"
      - "cpp/**"
      - "rust/**"
      - "csharp/**"
      - "go/**"
      - "python/**"
      - "dart/self_host/**"
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 06:00 UTC
  workflow_dispatch:

# Least-privilege: read-only token (conformance runs build + execute only).
permissions:
  contents: read

concurrency:
  group: conformance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────
  # Dart engine (reference implementation)
  # ──────────────────────────────────────────────────
  dart-engine:
    name: Dart Engine
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable

      - name: Install dependencies
        run: cd dart && dart pub get

      - name: Run conformance tests
        id: conformance
        run: |
          cd dart/engine
          set +e
          # --reporter=expanded is REQUIRED: `dart test` auto-detects GitHub
          # Actions and switches to its `github` reporter, which prints
          # "✅ <name>" / "🎉 N tests passed." — NOT the "+N -M" counters this
          # step parses. Without the pin, passed parsed as 0 while 324 tests
          # actually passed, and the row reported a green no-op until the
          # `passed < 1` floor (#439/#444) caught it. Pin the format.
          output=$(dart test --reporter=expanded test/conformance_test.dart 2>&1)
          exit_code=$?
          echo "$output"

          # Parse counts from the reporter's FINAL summary line ONLY — never the
          # whole output. A test name or printed value containing `-N` otherwise
          # gets picked up by a global `grep ... | tail -1`, producing an
          # order-dependent FALSE failure count. Same idiom as the dart-engine
          # gate in regression-gates.yml, which documents this hazard.
          # Summary is "00:05 +324: All tests passed!" or "+320 -4: Some tests
          # failed." — counters carry a time prefix, so the greps stay unanchored
          # but are scoped to the summary line. `(?<![+~])-` avoids matching the
          # `-` of a `+N`/`~N` counter. `|| true`: a grep with no match exits
          # non-zero, which must not abort the step before the checks run.
          summary=$(echo "$output" | grep -E 'All tests passed!|Some tests failed' | tail -1 || true)
          passed=$(echo "$summary" | grep -oP '\+\K\d+'         | tail -1 || true)
          failed=$(echo "$summary" | grep -oP '(?<![+~])-\K\d+'  | tail -1 || true)
          passed=${passed:-0}; failed=${failed:-0}

          total=$(( passed + failed ))
          echo "passed=$passed" >> "$GITHUB_OUTPUT"
          echo "failed=$failed" >> "$GITHUB_OUTPUT"
          echo "total=$total" >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== Dart Engine ==="
          echo "Results: $passed passed, $failed failed, $total total"

          # Fail on a non-zero runner exit OR any parsed test failure (F-CM-1).
          if [ "$exit_code" -ne 0 ] || [ "${failed:-0}" -gt 0 ] || [ "${passed:-0}" -lt 1 ]; then
            echo "::error::Dart Engine conformance failed (exit=$exit_code, failed=${failed:-0})"
            exit 1
          fi
          exit 0

    outputs:
      passed: ${{ steps.conformance.outputs.passed }}
      failed: ${{ steps.conformance.outputs.failed }}
      total: ${{ steps.conformance.outputs.total }}

  # ──────────────────────────────────────────────────
  # TypeScript self-hosted engine (compiled from Ball)
  # ──────────────────────────────────────────────────
  ts-engine:
    name: TS Self-Hosted Engine
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ts/engine/package-lock.json

      - name: Install dependencies
        run: cd ts/engine && npm ci

      - name: Build
        run: cd ts/engine && npm run build

      - name: Run conformance tests
        id: conformance
        run: |
          cd ts/engine
          set +e
          output=$(node --experimental-strip-types test/engine_test.ts 2>&1)
          exit_code=$?
          echo "$output"

          # The TS engine prints: "Results: N passed, M failed, T total"
          # Parse counts from the FINAL `Results:` line ONLY — never a global
          # grep over all output. A leg's own progress chatter can contain a
          # second match (the Rust leg prints "320 fixtures emitted Rust, 0
          # failed to compile"), which makes `grep -oP` return a MULTILINE
          # value, splits the echo, and makes GITHUB_OUTPUT reject the write.
          # Same summary-anchored idiom regression-gates.yml uses for dart test.
          summary=$(echo "$output" | grep -E '^Results: [0-9]+ passed' | tail -1 || true)
          passed=$(echo "$summary" | grep -oP 'Results: \K\d+(?= passed)' | tail -1 || true)
          failed=$(echo "$summary" | grep -oP ', \K\d+(?= failed)'  | tail -1 || true)
          total=$(echo "$summary"  | grep -oP ', \K\d+(?= total)'   | tail -1 || true)

          # Assert each count is a single bare integer. A MULTILINE value would
          # make `[ "$passed" -lt "$FLOOR" ]` error with exit 2 — and a failing
          # `[` in an `if` SKIPS the branch, so the script would fall through to
          # `exit 0`: a silently disabled gate. tail -1 above makes that
          # unreachable; this asserts it rather than trusting it.
          for v in "$passed" "$failed" "$total"; do
            case "$v" in
              ''|*[!0-9]*)
                echo "::error::Could not parse a clean integer count from the Results line (got '$v'). Refusing to report a number this gate cannot trust."
                exit 1;;
            esac
          done

          echo "passed=${passed:-0}" >> "$GITHUB_OUTPUT"
          echo "failed=${failed:-0}" >> "$GITHUB_OUTPUT"
          echo "total=${total:-0}" >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== TS Self-Hosted Engine ==="
          echo "Results: ${passed:-0} passed, ${failed:-0} failed, ${total:-0} total"

          # Fail on a non-zero runner exit OR any parsed test failure (F-CM-1).
          if [ "$exit_code" -ne 0 ] || [ "${failed:-0}" -gt 0 ] || [ "${passed:-0}" -lt 1 ]; then
            echo "::error::TS Self-Hosted Engine conformance failed (exit=$exit_code, failed=${failed:-0})"
            exit 1
          fi
          exit 0

    outputs:
      passed: ${{ steps.conformance.outputs.passed }}
      failed: ${{ steps.conformance.outputs.failed }}
      total: ${{ steps.conformance.outputs.total }}

  # ──────────────────────────────────────────────────
  # TS compiled engine (self-hosted Ball engine compiled to TS)
  # ──────────────────────────────────────────────────
  ts-compiled-engine:
    name: TS Compiled Engine
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ts/compiler/package-lock.json

      # engine_runtime.test.ts checks existsSync(engine.ball.json) at module
      # load and SKIPS every conformance subtest if it is missing — and the file
      # is gitignored. Without this regen the row ran ZERO fixtures and still
      # reported green ("# pass 0, # skipped 1"), until the `passed < 1` floor
      # (#439/#444) caught it. Mirrors the ts-regression job in
      # regression-gates.yml, which generates it for the same reason.
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable

      - name: Bootstrap Dart workspace (roundtrip_engine)
        run: cd dart && dart pub get

      - name: Generate engine.ball.json (self-host source)
        run: cd dart && dart run encoder/tool/roundtrip_engine.dart --skip-analyze --save-program self_host/engine.ball.json

      - name: Install dependencies
        run: cd ts/compiler && npm ci

      - name: Build
        run: cd ts/compiler && npm run build

      - name: Run conformance tests
        id: conformance
        run: |
          cd ts/compiler
          set +e
          output=$(node --experimental-strip-types --test test/engine_runtime.test.ts 2>&1)
          exit_code=$?
          echo "$output"

          # node --test prints: "# pass N" and "# fail N" and "# tests N"
          passed=$(echo "$output" | grep -oP '^# pass \K\d+' || echo "0")
          failed=$(echo "$output" | grep -oP '^# fail \K\d+' || echo "0")
          total=$(echo "$output" | grep -oP '^# tests \K\d+' || echo "0")

          echo "passed=${passed:-0}" >> "$GITHUB_OUTPUT"
          echo "failed=${failed:-0}" >> "$GITHUB_OUTPUT"
          echo "total=${total:-0}" >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== TS Compiled Engine ==="
          echo "Results: ${passed:-0} passed, ${failed:-0} failed, ${total:-0} total"

          # Fail on a non-zero runner exit OR any parsed test failure (F-CM-1).
          if [ "$exit_code" -ne 0 ] || [ "${failed:-0}" -gt 0 ] || [ "${passed:-0}" -lt 1 ]; then
            echo "::error::TS Compiled Engine conformance failed (exit=$exit_code, failed=${failed:-0})"
            exit 1
          fi
          exit 0

    outputs:
      passed: ${{ steps.conformance.outputs.passed }}
      failed: ${{ steps.conformance.outputs.failed }}
      total: ${{ steps.conformance.outputs.total }}

  # ──────────────────────────────────────────────────
  # TS compiled (direct): Ball → TS compiler → node, per fixture (#210)
  # ──────────────────────────────────────────────────
  ts-compiled-direct:
    name: TS Compiled (Direct)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ts/compiler/package-lock.json

      - name: Install dependencies
        run: cd ts/compiler && npm ci

      - name: Build
        run: cd ts/compiler && npm run build

      - name: Run TS compiler e2e conformance
        id: conformance
        run: |
          cd ts/compiler
          set +e
          output=$(node --experimental-strip-types test/full_e2e.ts 2>&1)
          exit_code=$?
          echo "$output"

          # Parse "Results: N passed, M failed, T total" line (N/M/T exclude
          # the fixed-size carve-out list; a carve-out that starts passing or
          # a non-carved-out regression both make full_e2e.ts exit non-zero).
          # Parse counts from the FINAL `Results:` line ONLY — never a global
          # grep over all output. A leg's own progress chatter can contain a
          # second match (the Rust leg prints "320 fixtures emitted Rust, 0
          # failed to compile"), which makes `grep -oP` return a MULTILINE
          # value, splits the echo, and makes GITHUB_OUTPUT reject the write.
          # Same summary-anchored idiom regression-gates.yml uses for dart test.
          summary=$(echo "$output" | grep -E '^Results: [0-9]+ passed' | tail -1 || true)
          passed=$(echo "$summary" | grep -oP 'Results: \K\d+(?= passed)' | tail -1 || true)
          failed=$(echo "$summary" | grep -oP ', \K\d+(?= failed)'  | tail -1 || true)
          total=$(echo "$summary"  | grep -oP ', \K\d+(?= total)'   | tail -1 || true)

          # Assert each count is a single bare integer. A MULTILINE value would
          # make `[ "$passed" -lt "$FLOOR" ]` error with exit 2 — and a failing
          # `[` in an `if` SKIPS the branch, so the script would fall through to
          # `exit 0`: a silently disabled gate. tail -1 above makes that
          # unreachable; this asserts it rather than trusting it.
          for v in "$passed" "$failed" "$total"; do
            case "$v" in
              ''|*[!0-9]*)
                echo "::error::Could not parse a clean integer count from the Results line (got '$v'). Refusing to report a number this gate cannot trust."
                exit 1;;
            esac
          done

          echo "passed=${passed:-0}" >> "$GITHUB_OUTPUT"
          echo "failed=${failed:-0}" >> "$GITHUB_OUTPUT"
          echo "total=${total:-0}" >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== TS Compiled (Direct) ==="
          echo "Results: ${passed:-0} passed, ${failed:-0} failed, ${total:-0} total"

          # Fail on a non-zero runner exit OR any parsed test failure (F-CM-1).
          if [ "$exit_code" -ne 0 ] || [ "${failed:-0}" -gt 0 ] || [ "${passed:-0}" -lt 1 ]; then
            echo "::error::TS Compiled (Direct) conformance failed (exit=$exit_code, failed=${failed:-0})"
            exit 1
          fi
          exit 0

    outputs:
      passed: ${{ steps.conformance.outputs.passed }}
      failed: ${{ steps.conformance.outputs.failed }}
      total: ${{ steps.conformance.outputs.total }}

  # ──────────────────────────────────────────────────
  # C++ compiled engine (Ball → C++ → g++ → run)
  # ──────────────────────────────────────────────────
  cpp-compiled:
    name: C++ Compiled
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # #18 Stage 5: the C++ build is libprotobuf-free — no protobuf to install
      # or FetchContent. The only external dep is nlohmann/json, which CMake
      # FetchContents when it isn't found on the system (same as ci.yml's build).

      - name: ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: cpp-compiled-matrix
          max-size: 1G

      - name: Install ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Configure CMake
        run: cmake -S cpp -B cpp/build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build Ball→C++ compiler
        run: cmake --build cpp/build --config Release --target ball_cpp_compile -j$(nproc)

      - name: Run C++ e2e conformance
        id: conformance
        run: |
          set +e
          output=$(bash cpp/test/full_e2e.sh 2>&1)
          exit_code=$?
          echo "$output"

          # Parse "Results: N passed, M failed, T total" line
          # Parse counts from the FINAL `Results:` line ONLY — never a global
          # grep over all output. A leg's own progress chatter can contain a
          # second match (the Rust leg prints "320 fixtures emitted Rust, 0
          # failed to compile"), which makes `grep -oP` return a MULTILINE
          # value, splits the echo, and makes GITHUB_OUTPUT reject the write.
          # Same summary-anchored idiom regression-gates.yml uses for dart test.
          summary=$(echo "$output" | grep -E '^Results: [0-9]+ passed' | tail -1 || true)
          passed=$(echo "$summary" | grep -oP 'Results: \K\d+(?= passed)' | tail -1 || true)
          failed=$(echo "$summary" | grep -oP ', \K\d+(?= failed)'  | tail -1 || true)
          total=$(echo "$summary"  | grep -oP ', \K\d+(?= total)'   | tail -1 || true)

          # Assert each count is a single bare integer. A MULTILINE value would
          # make `[ "$passed" -lt "$FLOOR" ]` error with exit 2 — and a failing
          # `[` in an `if` SKIPS the branch, so the script would fall through to
          # `exit 0`: a silently disabled gate. tail -1 above makes that
          # unreachable; this asserts it rather than trusting it.
          for v in "$passed" "$failed" "$total"; do
            case "$v" in
              ''|*[!0-9]*)
                echo "::error::Could not parse a clean integer count from the Results line (got '$v'). Refusing to report a number this gate cannot trust."
                exit 1;;
            esac
          done

          echo "passed=${passed:-0}" >> "$GITHUB_OUTPUT"
          echo "failed=${failed:-0}" >> "$GITHUB_OUTPUT"
          echo "total=${total:-0}" >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== C++ Compiled ==="
          echo "Results: ${passed:-0} passed, ${failed:-0} failed, ${total:-0} total"

          # Fail on a non-zero runner exit OR any parsed test failure (F-CM-1).
          if [ "$exit_code" -ne 0 ] || [ "${failed:-0}" -gt 0 ] || [ "${passed:-0}" -lt 1 ]; then
            echo "::error::C++ Compiled conformance failed (exit=$exit_code, failed=${failed:-0})"
            exit 1
          fi
          exit 0

    outputs:
      passed: ${{ steps.conformance.outputs.passed }}
      failed: ${{ steps.conformance.outputs.failed }}
      total: ${{ steps.conformance.outputs.total }}

  # ──────────────────────────────────────────────────
  # Rust self-hosted engine (Ball → Rust → cargo → run)
  # ──────────────────────────────────────────────────
  rust-engine:
    name: Rust Self-Hosted Engine
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # rustup ships preinstalled; `rustup show` installs the pinned toolchain
      # from rust/rust-toolchain.toml.
      - name: Install Rust toolchain
        working-directory: rust
        run: rustup show

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rust

      # The self-hosted engine is a Ball program compiled through ball-lang-compiler,
      # so regenerate engine.ball.json (Dart) then compiled_engine.rs first.
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable

      - name: Regenerate self-hosted engine
        run: |
          dart pub get
          cd dart && dart run compiler/tool/gen_engine_json.dart
          cd ../rust && cargo run -p ball-engine-regen

      - name: Run conformance tests
        id: conformance
        run: |
          cd rust
          set +e
          output=$(cargo test -p ball-lang-engine --features self_host --test self_host_conformance -- --ignored --nocapture 2>&1)
          exit_code=$?
          echo "$output"

          # Parse "Results: N passed, M failed, T total" line. T is the
          # golden-having (executed) fixture count — the 4 golden-less
          # resource-limit/sandbox fixtures (196/197/201/202) are behavioral
          # carve-outs the runner skips, exactly like the Dart runner.
          # Parse counts from the FINAL `Results:` line ONLY — never a global
          # grep over all output. A leg's own progress chatter can contain a
          # second match (the Rust leg prints "320 fixtures emitted Rust, 0
          # failed to compile"), which makes `grep -oP` return a MULTILINE
          # value, splits the echo, and makes GITHUB_OUTPUT reject the write.
          # Same summary-anchored idiom regression-gates.yml uses for dart test.
          summary=$(echo "$output" | grep -E '^Results: [0-9]+ passed' | tail -1 || true)
          passed=$(echo "$summary" | grep -oP 'Results: \K\d+(?= passed)' | tail -1 || true)
          failed=$(echo "$summary" | grep -oP ', \K\d+(?= failed)'  | tail -1 || true)
          total=$(echo "$summary"  | grep -oP ', \K\d+(?= total)'   | tail -1 || true)

          # Assert each count is a single bare integer. A MULTILINE value would
          # make `[ "$passed" -lt "$FLOOR" ]` error with exit 2 — and a failing
          # `[` in an `if` SKIPS the branch, so the script would fall through to
          # `exit 0`: a silently disabled gate. tail -1 above makes that
          # unreachable; this asserts it rather than trusting it.
          for v in "$passed" "$failed" "$total"; do
            case "$v" in
              ''|*[!0-9]*)
                echo "::error::Could not parse a clean integer count from the Results line (got '$v'). Refusing to report a number this gate cannot trust."
                exit 1;;
            esac
          done

          echo "passed=${passed:-0}" >> "$GITHUB_OUTPUT"
          echo "failed=${failed:-0}" >> "$GITHUB_OUTPUT"
          echo "total=${total:-0}" >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== Rust Self-Hosted Engine ==="
          echo "Results: ${passed:-0} passed, ${failed:-0} failed, ${total:-0} total"

          # Fail on a non-zero runner exit OR any parsed test failure (F-CM-1).
          if [ "$exit_code" -ne 0 ] || [ "${failed:-0}" -gt 0 ] || [ "${passed:-0}" -lt 1 ]; then
            echo "::error::Rust Self-Hosted Engine conformance failed (exit=$exit_code, failed=${failed:-0})"
            exit 1
          fi
          exit 0

    outputs:
      passed: ${{ steps.conformance.outputs.passed }}
      failed: ${{ steps.conformance.outputs.failed }}
      total: ${{ steps.conformance.outputs.total }}

  # ──────────────────────────────────────────────────
  # C# self-hosted engine (Ball → C# → dotnet → run)
  # ──────────────────────────────────────────────────
  csharp-engine:
    name: C# Self-Hosted Engine
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "10.0.x"

      # The self-hosted engine is a Ball program compiled through the Phase-4
      # Ball -> C# compiler, so regenerate engine.ball.pb (Dart) then
      # CompiledEngine.cs (Ball.Engine.Regen) first — same two-step regen chain
      # as ci.yml's csharp job (see csharp/AGENTS.md "Self-hosted engine" +
      # "Conformance harness" -> "Regen seam for CI").
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable

      - name: Regenerate self-hosted engine
        run: |
          dart pub get
          cd dart
          dart run compiler/tool/compile_engine_cpp.dart || true
          test -f self_host/engine.ball.pb
          cd ../csharp
          dotnet run --project engine/tool/Ball.Engine.Regen.csproj

      - name: Build self-hosted engine conformance harness
        run: dotnet build csharp/engine/conformance/Ball.Engine.Conformance.csproj -c Release -p:SelfHost=true

      - name: Run conformance tests
        id: conformance
        run: |
          cd csharp
          set +e
          output=$(dotnet run --project engine/conformance/Ball.Engine.Conformance.csproj -c Release -p:SelfHost=true --no-build -- --leg=engine 2>&1)
          exit_code=$?
          echo "$output"

          # Parse "Results: N passed, M failed, T total" line. T is the
          # golden-having (executed) fixture count — the 4 golden-less
          # resource-limit/sandbox fixtures are behavioral carve-outs the
          # runner skips, exactly like the Dart/Rust runners.
          # Parse counts from the FINAL `Results:` line ONLY — never a global
          # grep over all output. A leg's own progress chatter can contain a
          # second match (the Rust leg prints "320 fixtures emitted Rust, 0
          # failed to compile"), which makes `grep -oP` return a MULTILINE
          # value, splits the echo, and makes GITHUB_OUTPUT reject the write.
          # Same summary-anchored idiom regression-gates.yml uses for dart test.
          summary=$(echo "$output" | grep -E '^Results: [0-9]+ passed' | tail -1 || true)
          passed=$(echo "$summary" | grep -oP 'Results: \K\d+(?= passed)' | tail -1 || true)
          failed=$(echo "$summary" | grep -oP ', \K\d+(?= failed)'  | tail -1 || true)
          total=$(echo "$summary"  | grep -oP ', \K\d+(?= total)'   | tail -1 || true)

          # Assert each count is a single bare integer. A MULTILINE value would
          # make `[ "$passed" -lt "$FLOOR" ]` error with exit 2 — and a failing
          # `[` in an `if` SKIPS the branch, so the script would fall through to
          # `exit 0`: a silently disabled gate. tail -1 above makes that
          # unreachable; this asserts it rather than trusting it.
          for v in "$passed" "$failed" "$total"; do
            case "$v" in
              ''|*[!0-9]*)
                echo "::error::Could not parse a clean integer count from the Results line (got '$v'). Refusing to report a number this gate cannot trust."
                exit 1;;
            esac
          done

          echo "passed=${passed:-0}" >> "$GITHUB_OUTPUT"
          echo "failed=${failed:-0}" >> "$GITHUB_OUTPUT"
          echo "total=${total:-0}" >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== C# Self-Hosted Engine ==="
          echo "Results: ${passed:-0} passed, ${failed:-0} failed, ${total:-0} total"

          # Fail on a non-zero runner exit OR any parsed test failure (F-CM-1).
          if [ "$exit_code" -ne 0 ] || [ "${failed:-0}" -gt 0 ] || [ "${passed:-0}" -lt 1 ]; then
            echo "::error::C# Self-Hosted Engine conformance failed (exit=$exit_code, failed=${failed:-0})"
            exit 1
