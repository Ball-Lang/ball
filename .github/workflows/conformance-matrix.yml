        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install "protobuf>=5.29"

      # Reads goldens and subprocess stdout as BYTES and normalizes only \r\n.
      # Text mode collapses a lone \r, which silently corrupts golden
      # comparison in BOTH directions — it has bitten two harnesses here.
      - name: Run compiler leg
        id: conformance
        run: |
          set +e
          output=$(python -m python.compiler.conformance.runner 2>&1)
          exit_code=$?
          echo "$output"
          # Parse counts from the FINAL `Results:` line ONLY — never a global
          # grep over all output. A leg's own progress chatter can contain a
          # second match (the Rust leg prints "320 fixtures emitted Rust, 0
          # failed to compile"), which makes `grep -oP` return a MULTILINE
          # value, splits the echo, and makes GITHUB_OUTPUT reject the write.
          # Same summary-anchored idiom regression-gates.yml uses for dart test.
          summary=$(echo "$output" | grep -E '^Results: [0-9]+ passed' | tail -1 || true)
          passed=$(echo "$summary" | grep -oP 'Results: \K\d+(?= passed)' | tail -1 || true)
          failed=$(echo "$summary" | grep -oP ', \K\d+(?= failed)'  | tail -1 || true)
          total=$(echo "$summary"  | grep -oP ', \K\d+(?= total)'   | tail -1 || true)

          # Assert each count is a single bare integer. A MULTILINE value would
          # make `[ "$passed" -lt "$FLOOR" ]` error with exit 2 — and a failing
          # `[` in an `if` SKIPS the branch, so the script would fall through to
          # `exit 0`: a silently disabled gate. tail -1 above makes that
          # unreachable; this asserts it rather than trusting it.
          for v in "$passed" "$failed" "$total"; do
            case "$v" in
              ''|*[!0-9]*)
                echo "::error::Could not parse a clean integer count from the Results line (got '$v'). Refusing to report a number this gate cannot trust."
                exit 1;;
            esac
          done
          passed=${passed:-0}; failed=${failed:-0}; total=${total:-0}

          echo "passed=$passed" >> "$GITHUB_OUTPUT"
          echo "failed=$failed" >> "$GITHUB_OUTPUT"
          echo "total=$total"   >> "$GITHUB_OUTPUT"
          echo "floor=$PYTHON_COMPILER_FLOOR" >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== Python Compiler Leg ==="
          echo "Results: $passed passed, $failed failed, $total total (floor: $PYTHON_COMPILER_FLOOR)"

          # A harness that printed nothing must never read as a silent pass
          # (#439/#444). Guard the parse separately from the ratchet floor.
          if [ "$total" -lt 1 ]; then
            echo "::error::The Python compiler leg reported no Results line — it ran no fixtures"
            exit 1
          fi

          if [ "$passed" -lt "$PYTHON_COMPILER_FLOOR" ]; then
            echo "::error::Python compiler leg REGRESSED: $passed passed, below the floor of $PYTHON_COMPILER_FLOOR — a fixture that used to compile no longer does"
            exit 1
          fi

          if [ "$passed" -gt "$PYTHON_COMPILER_FLOOR" ]; then
            echo "::notice::Python compiler leg IMPROVED: $passed passed (floor was $PYTHON_COMPILER_FLOOR). Raise PYTHON_COMPILER_FLOOR to $passed in this workflow to lock the gain in."
          fi
          exit 0

    outputs:
      passed: ${{ steps.conformance.outputs.passed }}
      failed: ${{ steps.conformance.outputs.failed }}
      total: ${{ steps.conformance.outputs.total }}
      floor: ${{ steps.conformance.outputs.floor }}

  # ──────────────────────────────────────────────────
  # Summary — parity matrix across all engines
  # ──────────────────────────────────────────────────
  summary:
    name: Parity Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: always()
    needs: [dart-engine, ts-engine, ts-compiled-engine, ts-compiled-direct, cpp-compiled, rust-engine, csharp-engine, go-engine, python-engine, csharp-compiler, rust-compiler, go-compiler, python-compiler]
    steps:
      - name: Print conformance matrix
        run: |
          echo "╔══════════════════════════════╦════════╦════════╦════════╦════════╗"
          echo "║ Engine                       ║ Passed ║ Failed ║ Total  ║ Status ║"
          echo "╠══════════════════════════════╬════════╬════════╬════════╬════════╣"

          print_row() {
            local name="$1" passed="$2" failed="$3" total="$4" result="$5"
            local status="PASS"
            if [ "$result" != "success" ]; then
              status="FAIL"
            fi
            printf "║ %-28s ║ %6s ║ %6s ║ %6s ║ %-6s ║\n" \
              "$name" "${passed:-?}" "${failed:-?}" "${total:-?}" "$status"
          }

          print_row "Dart Engine (reference)" \
            "${{ needs.dart-engine.outputs.passed }}" \
            "${{ needs.dart-engine.outputs.failed }}" \
            "${{ needs.dart-engine.outputs.total }}" \
            "${{ needs.dart-engine.result }}"

          print_row "TS Self-Hosted Engine" \
            "${{ needs.ts-engine.outputs.passed }}" \
            "${{ needs.ts-engine.outputs.failed }}" \
            "${{ needs.ts-engine.outputs.total }}" \
            "${{ needs.ts-engine.result }}"

          print_row "TS Compiled Engine" \
            "${{ needs.ts-compiled-engine.outputs.passed }}" \
            "${{ needs.ts-compiled-engine.outputs.failed }}" \
            "${{ needs.ts-compiled-engine.outputs.total }}" \
            "${{ needs.ts-compiled-engine.result }}"

          print_row "TS Compiled (Direct)" \
            "${{ needs.ts-compiled-direct.outputs.passed }}" \
            "${{ needs.ts-compiled-direct.outputs.failed }}" \
            "${{ needs.ts-compiled-direct.outputs.total }}" \
            "${{ needs.ts-compiled-direct.result }}"

          print_row "C++ Compiled" \
            "${{ needs.cpp-compiled.outputs.passed }}" \
            "${{ needs.cpp-compiled.outputs.failed }}" \
            "${{ needs.cpp-compiled.outputs.total }}" \
            "${{ needs.cpp-compiled.result }}"

          print_row "Rust Self-Hosted Engine" \
            "${{ needs.rust-engine.outputs.passed }}" \
            "${{ needs.rust-engine.outputs.failed }}" \
            "${{ needs.rust-engine.outputs.total }}" \
            "${{ needs.rust-engine.result }}"

          print_row "C# Self-Hosted Engine" \
            "${{ needs.csharp-engine.outputs.passed }}" \
            "${{ needs.csharp-engine.outputs.failed }}" \
            "${{ needs.csharp-engine.outputs.total }}" \
            "${{ needs.csharp-engine.result }}"

          print_row "Go Self-Hosted Engine" \
            "${{ needs.go-engine.outputs.passed }}" \
            "${{ needs.go-engine.outputs.failed }}" \
            "${{ needs.go-engine.outputs.total }}" \
            "${{ needs.go-engine.result }}"

          print_row "Python Self-Hosted Engine" \
            "${{ needs.python-engine.outputs.passed }}" \
            "${{ needs.python-engine.outputs.failed }}" \
            "${{ needs.python-engine.outputs.total }}" \
            "${{ needs.python-engine.result }}"

          echo "╚══════════════════════════════╩════════╩════════╩════════╩════════╝"

          # -- Compile legs, ratcheted -------------------------------------
          # Deliberately NOT part of the parity table above: this leg does
          # not claim full parity and must never be read as if it did. It
          # gates on "the count did not go DOWN" (see the job floor), so a
          # PASS here means "no regression", NOT "complete". #452 tracks the
          # open families.
          echo ""
          echo "Compile leg (ratcheted - not a parity claim)"
          echo ""
          printf "  %-38s  %6s  %6s  %6s  %6s  %-6s\n" "LEG" "PASSED" "FAILED" "TOTAL" "FLOOR" "STATUS"
          csc_status="PASS"
          if [ "${{ needs.csharp-compiler.result }}" != "success" ]; then csc_status="FAIL"; fi
          printf "  %-38s  %6s  %6s  %6s  %6s  %-6s\n" "C# Compiler (Ball -> C# -> Roslyn)" "${{ needs.csharp-compiler.outputs.passed }}" "${{ needs.csharp-compiler.outputs.failed }}" "${{ needs.csharp-compiler.outputs.total }}" "${{ needs.csharp-compiler.outputs.floor }}" "$csc_status"
          rust_status="PASS"
          if [ "${{ needs.rust-compiler.result }}" != "success" ]; then rust_status="FAIL"; fi
          printf "  %-38s  %6s  %6s  %6s  %6s  %-6s\n" "Rust Compiler (Ball -> Rust -> cargo)" "${{ needs.rust-compiler.outputs.passed }}" "${{ needs.rust-compiler.outputs.failed }}" "${{ needs.rust-compiler.outputs.total }}" "${{ needs.rust-compiler.outputs.floor }}" "$rust_status"
          go_status="PASS"
          if [ "${{ needs.go-compiler.result }}" != "success" ]; then go_status="FAIL"; fi
          printf "  %-38s  %6s  %6s  %6s  %6s  %-6s\n" "Go Compiler (Ball -> Go -> go build)" "${{ needs.go-compiler.outputs.passed }}" "${{ needs.go-compiler.outputs.failed }}" "${{ needs.go-compiler.outputs.total }}" "${{ needs.go-compiler.outputs.floor }}" "$go_status"
          python_status="PASS"
          if [ "${{ needs.python-compiler.result }}" != "success" ]; then python_status="FAIL"; fi
          printf "  %-38s  %6s  %6s  %6s  %6s  %-6s\n" "Python Compiler (Ball -> Python)" "${{ needs.python-compiler.outputs.passed }}" "${{ needs.python-compiler.outputs.failed }}" "${{ needs.python-compiler.outputs.total }}" "${{ needs.python-compiler.outputs.floor }}" "$python_status"
          echo ""

          # Fail the summary if any engine job did not succeed (primary gate).
          summary_failed=0
          if [ "${{ needs.dart-engine.result }}" != "success" ] || \
             [ "${{ needs.ts-engine.result }}" != "success" ] || \
             [ "${{ needs.ts-compiled-engine.result }}" != "success" ] || \
             [ "${{ needs.ts-compiled-direct.result }}" != "success" ] || \
             [ "${{ needs.cpp-compiled.result }}" != "success" ] || \
             [ "${{ needs.rust-engine.result }}" != "success" ] || \
             [ "${{ needs.csharp-engine.result }}" != "success" ] || \
             [ "${{ needs.go-engine.result }}" != "success" ] || \
             [ "${{ needs.python-engine.result }}" != "success" ]; then
            echo ""
            echo "One or more engine jobs did not succeed. See individual job logs above."
            summary_failed=1
          fi

          # Each ratcheted compile leg self-gates on its own floor (a DROP fails
          # the job), so its RESULT is the whole signal. They are intentionally
          # absent from the failed-count loop below: that loop asserts FULL
          # PARITY, and none of these four legs has it yet (C# 226/320, Rust
          # 237, Go 243, Python 238) — feeding those honest failure counts in
          # there would wire known-red numbers into the parity gate.
          for leg in \
            "C#:${{ needs.csharp-compiler.result }}" \
            "Rust:${{ needs.rust-compiler.result }}" \
            "Go:${{ needs.go-compiler.result }}" \
            "Python:${{ needs.python-compiler.result }}"; do
            name="${leg%%:*}"; res="${leg#*:}"
            if [ "$res" != "success" ]; then
              echo ""
              echo "The $name compiler leg regressed below its floor. See its job log."
              summary_failed=1
            fi
          done

          # Defense-in-depth (F-CM-1): also fail if any engine reported a
          # non-zero parsed failure count, even if its job reported success —
          # the parsed counts must gate, not merely decorate the matrix.
          for entry in \
            "Dart Engine:${{ needs.dart-engine.outputs.failed }}" \
            "TS Self-Hosted Engine:${{ needs.ts-engine.outputs.failed }}" \
            "TS Compiled Engine:${{ needs.ts-compiled-engine.outputs.failed }}" \
            "TS Compiled (Direct):${{ needs.ts-compiled-direct.outputs.failed }}" \
            "C++ Compiled:${{ needs.cpp-compiled.outputs.failed }}" \
            "Rust Self-Hosted Engine:${{ needs.rust-engine.outputs.failed }}" \
            "C# Self-Hosted Engine:${{ needs.csharp-engine.outputs.failed }}" \
            "Go Self-Hosted Engine:${{ needs.go-engine.outputs.failed }}" \
            "Python Self-Hosted Engine:${{ needs.python-engine.outputs.failed }}"; do
            name="${entry%%:*}"
            count="${entry##*:}"
            # Normalize empty/non-numeric (e.g. a skipped job) to 0 so the
            # comparison can never fail spuriously.
            case "$count" in
              '' | *[!0-9]*) count=0 ;;
            esac
            if [ "$count" -gt 0 ]; then
              echo "::error::$name reported $count conformance failure(s)"
              summary_failed=1
            fi
          done

          if [ "$summary_failed" -ne 0 ]; then
            exit 1
          fi

          echo ""
          echo "All engines passed conformance."
