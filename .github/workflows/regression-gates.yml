name: Regression Gates

# Strict all-green gates. Every suite must run to completion with ZERO failures
# and ZERO skips — there are NO pass-count floors, "expected" counts, or
# minimum-to-pass thresholds. A "minimum number of tests to pass" tolerates
# hidden failures, and a skipped test hides a problem just as much as a failing
# one. Both are unacceptable: any failing OR skipped test fails the gate.
#
#   * TS self-hosted engine        : 0 failed; every reported test passed (passed == total)
#   * TS self-hosted compiler      : 0 failed; 0 skipped (node --test)
#   * Dart engine/encoder/compiler : 0 failed; 0 skipped
#   * C++ self-host tally          : 0 fail; 0 timeout; 0 crash (every fixture passes)
#
# This is intentionally SEPARATE from ci.yml (full build + test matrix) and
# conformance-matrix.yml (parity table). Those fail on a non-zero exit; this
# additionally refuses to let a suite stay green while silently dropping or
# skipping tests.
#
# Action versions verified 2026-05-25 against the upstream release pages:
#   actions/checkout       v6  (latest v6.0.2)
#   actions/setup-node     v6  (latest v6.4.0)
#   dart-lang/setup-dart   v1  (latest v1.7.2)
#   bufbuild/buf-action    v1
# Node is pinned to 22: `--experimental-strip-types` (used by the TS test
# scripts) first shipped in Node 22.6.0, and the `22` line resolves well
# past that.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

# Least-privilege: read-only token (these gates only run tests).
permissions:
  contents: read

concurrency:
  group: regression-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────
  # Detect which stacks changed so each gate can skip when its stack didn't.
  # Same native-git-diff logic as ci.yml's `changes` job (kept inline rather
  # than a shared composite action because it is small + stable; extract to
  # .github/actions/ if it grows). FAIL-OPEN (no usable base => all true) and
  # FAIL-SAFE (any file outside the language dirs => infra=true => run
  # everything).
  # ──────────────────────────────────────────────────
  changes:
    name: Detect changed stacks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      dart: ${{ steps.f.outputs.dart }}
      ts: ${{ steps.f.outputs.ts }}
      cpp: ${{ steps.f.outputs.cpp }}
      infra: ${{ steps.f.outputs.infra }}
      # A self-hosted Dart source (dart/engine/lib/** or the cli_core.dart
      # library) changed — already folded into cpp below (#416). Exposed for
      # observability; the cpp-selfhost-tally job gates on cpp, not this.
      self_host: ${{ steps.f.outputs.self_host }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - id: f
        env:
          EVENT: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PUSH_BASE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          base=""
          [ "$EVENT" = "pull_request" ] && base="$PR_BASE" || true
          [ "$EVENT" = "push" ] && base="$PUSH_BASE" || true
          zero="0000000000000000000000000000000000000000"
          if [ -z "$base" ] || [ "$base" = "$zero" ] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            echo "No usable diff base ('$base') — failing OPEN: run every stack."
            { echo "dart=true"; echo "ts=true"; echo "cpp=true"; echo "infra=true"; echo "self_host=true"; } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Three-dot (merge-base) diff: ONLY this branch's own changes, never
          # commits the base branch gained since we forked (else a sibling PR
          # that merges first leaks its files in and forces every stack to run).
          # The merge-base is reachable thanks to fetch-depth: 0 above.
          files="$(git diff --name-only "$base...HEAD")"
          echo "Changed files vs merge-base(${base}, HEAD):"; echo "$files"
          m() { grep -qE "$1" <<< "$files"; }
          out() { if m "$2"; then echo "$1=true"; else echo "$1=false"; fi; }
          infra=false
          # Every language dir is listed, not just the three these gates cover:
          # an unlisted dir yields a false infra=true, so a rust/csharp/go/python-
          # only PR would run all three Dart/TS/C++ gates it cannot affect (#451,
          # same defect as ci.yml's copy). A genuinely cross-cutting file (proto/,
          # tests/, tools/, root configs, this workflow) still trips infra=true.
          if grep -qvE '^(dart/|ts/|cpp/|rust/|csharp/|go/|python/)' <<< "$files"; then infra=true; fi
          # self_host = the diff touches a Dart source that CROSS-COMPILES into
          # the C++ self-hosted artifacts the cpp-selfhost-tally job regenerates
          # and runs, even though it lives under dart/ (so it would otherwise
          # flip only dart=true):
          #   * dart/engine/lib/**  -> engine_rt.cpp (compile_engine_cpp.dart) —
          #     the self-hosted ENGINE the per-fixture tally executes.
          #   * dart/shared/lib/cli_core.dart + its parts (capability_analyzer,
          #     capability_table, termination_analyzer) -> cli_rt.h
          #     (gen_cli_cpp.dart) — the self-hosted CLI verbs the parity gate
          #     asserts byte-identical to the Dart CLI.
          # Mapped by top-level dir alone, an edit to these sets only dart=true
          # and SKIPS this cpp tally — the exact blind spot that let a C++
          # self-host break slip through PR CI in #398 (and forced #413's manual
          # verification lane). OR self_host into cpp below. (dart/compiler,
          # dart/encoder, dart/cli are Dart-target tooling, not self-host program
          # inputs — C++ uses its OWN compiler for the Ball->native step.) See #416.
          self_host=false
          if m '^dart/engine/lib/|^dart/shared/lib/(cli_core|capability_analyzer|capability_table|termination_analyzer)\.dart$'; then self_host=true; fi
          {
            out dart '^dart/'
            out ts   '^ts/'
            # cpp runs on its own dir changes OR any self-host Dart source change
            # (self_host above — #416).
            if m '^cpp/' || [ "$self_host" = true ]; then echo "cpp=true"; else echo "cpp=false"; fi
            echo "infra=$infra"
            echo "self_host=$self_host"
          } >> "$GITHUB_OUTPUT"
          cat "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────
  # TypeScript regression gate — engine + compiler must each
  # run every test with 0 failed and 0 skipped.
  # ──────────────────────────────────────────────────
  ts-regression:
    name: TS Regression Gate (engine + compiler)
    needs: changes
    # Dart + TS coupled (the TS gate bootstraps engine.ball.json from the Dart
    # self-host source).
    if: ${{ needs.changes.outputs.dart == 'true' || needs.changes.outputs.ts == 'true' || needs.changes.outputs.infra == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          # `--experimental-strip-types` requires Node >= 22.6.0; the 22 line
          # resolves to a recent 22.x that includes it.
          node-version: 22

      # engine_parse.test.ts shells out to roundtrip_engine.dart when
      # dart/self_host/engine.ball.json is missing.
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable

      - name: Bootstrap Dart workspace (roundtrip_engine)
        run: cd dart && dart pub get

      # engine_runtime.test.ts checks existsSync(engine.ball.json) at module
      # load and SKIPS its ~227 conformance subtests if it is missing — and the
      # file is gitignored. Generate it explicitly here (rather than relying on
      # engine_parse.test.ts's on-demand shell-out, which races module load) so
      # the TS compiler gate exercises the full self-host suite with no skips.
      - name: Generate engine.ball.json (self-host source)
        run: cd dart && dart run encoder/tool/roundtrip_engine.dart --skip-analyze --save-program self_host/engine.ball.json

      # ── @ball-lang/engine — prints: "Results: N passed, M failed, T total"
      - name: Install @ball-lang/engine
        run: cd ts/engine && npm ci

      - name: Build @ball-lang/engine
        run: cd ts/engine && npm run build

      - name: Engine — assert 0 failed and every test passed
        run: |
          set -o pipefail
          cd ts/engine
          output=$(npm test 2>&1) || { echo "$output"; echo "::error::TS engine suite exited non-zero"; exit 1; }
          echo "$output"

          passed=$(echo "$output" | grep -oP 'Results: \K\d+(?= passed)' | tail -1)
          failed=$(echo "$output" | grep -oP ', \K\d+(?= failed)'        | tail -1)
          total=$(echo "$output"  | grep -oP ', \K\d+(?= total)'         | tail -1)

          if [ -z "$passed" ] || [ -z "$failed" ] || [ -z "$total" ]; then
            echo "::error::Could not parse the 'Results: N passed, M failed, T total' line from TS engine output"
            exit 1
          fi
          # `passed >= 1` floor (#439/#444): "0 passed, 0 failed" satisfies both the
          # -z guard (0 is non-empty) and the failed-check below, so a suite that ran
          # NOTHING would report green. A gate that measures nothing is not a gate.
          if [ "${passed:-0}" -lt 1 ]; then
            echo "::error::TS engine ran 0 tests — refusing to pass a gate that measured nothing"
            exit 1
          fi

          echo "TS engine: $passed passed, $failed failed, $total total"
          if [ "$failed" != "0" ]; then
            echo "::error::TS engine has $failed failing test(s) — every test must pass"
            exit 1
          fi
          if [ "$passed" != "$total" ]; then
            echo "::error::TS engine: only $passed of $total tests passed — $((total - passed)) did not run/pass (skipped or errored). No skipping allowed."
            exit 1
          fi

      # ── @ball-lang/compiler — uses `node --test`, prints "# pass N" / "# fail N" / "# skipped N"
      - name: Install @ball-lang/compiler
        run: cd ts/compiler && npm ci

      - name: Build @ball-lang/compiler
        run: cd ts/compiler && npm run build

      - name: Compiler — assert 0 fail and 0 skipped
        run: |
          set -o pipefail
          cd ts/compiler
          output=$(npm test 2>&1) || { echo "$output"; echo "::error::TS compiler suite exited non-zero"; exit 1; }
          echo "$output"

          # node --test summary line varies by reporter:
          #   * TAP reporter (non-TTY direct invocation): "# pass N" / "# fail N" / "# skipped N"
          #   * spec reporter (the default when run via npm):  "ℹ pass N" / "ℹ fail N" / "ℹ skipped N"
          # Match either form by anchoring on the trailing keyword.
          passed=$(echo "$output"  | grep -oP '(^# pass |pass )\K\d+'       | tail -1)
          failed=$(echo "$output"  | grep -oP '(^# fail |fail )\K\d+'       | tail -1)
          skipped=$(echo "$output" | grep -oP '(^# skipped |skipped )\K\d+' | tail -1)

          if [ -z "$passed" ] || [ -z "$failed" ]; then
            echo "::error::Could not parse the '# pass N' / '# fail N' summary from TS compiler output"
            exit 1
          fi
          # `passed >= 1` floor (#439/#444) — see the TS engine gate above.
          if [ "${passed:-0}" -lt 1 ]; then
            echo "::error::TS compiler ran 0 tests — refusing to pass a gate that measured nothing"
            exit 1
          fi
          skipped=${skipped:-0}

          echo "TS compiler: $passed pass, $failed fail, $skipped skipped"
          if [ "$failed" != "0" ]; then
            echo "::error::TS compiler has $failed failing test(s) — every test must pass"
            exit 1
          fi
          if [ "$skipped" != "0" ]; then
            echo "::error::TS compiler has $skipped skipped test(s) — no skipping allowed"
            exit 1
          fi

  # ──────────────────────────────────────────────────
  # Dart regression gate — engine, encoder, and compiler must each
  # run every test with 0 failed and 0 skipped (compiler excludes
  # @Tags(['slow']) to match ci.yml; excluded tests are not run, not skipped).
  # ──────────────────────────────────────────────────
  dart-regression:
    name: Dart Regression Gate (engine + encoder + compiler)
    needs: changes
    if: ${{ needs.changes.outputs.dart == 'true' || needs.changes.outputs.ts == 'true' || needs.changes.outputs.infra == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable

      # The Dart compiler test suite shells out to @ball-lang/compiler.
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22

      - name: Install Dart workspace
        run: cd dart && dart pub get

      - name: Install & build @ball-lang/compiler
        run: cd ts/compiler && npm ci && npm run build

      - name: Engine — assert 0 failed and 0 skipped
        run: |
          set -o pipefail
          cd dart/engine
          output=$(dart test --reporter expanded 2>&1) || { echo "$output"; echo "::error::Dart engine suite exited non-zero"; exit 1; }
          echo "$output"

          # Parse counts from the reporter's FINAL summary line ONLY — never the
          # whole output. A test name or printed value containing `-N` (e.g. a
          # negative-number literal like `-200`) otherwise gets picked up by a
          # global `grep ... | tail -1`, producing an order-dependent FALSE
          # failure count. `dart test` already exits non-zero on any real
          # failure (caught by the `||` guard above), so this run is all-green
          # and the summary is `+N[ ~S]: All tests passed!`.
          # `|| true`: under `bash -e` + pipefail a grep with no match exits
          # non-zero, which would otherwise abort the step before the checks run.
          summary=$(echo "$output" | grep -E 'All tests passed!|Some tests failed' | tail -1 || true)
          passed=$(echo "$summary"  | grep -oP '\+\K\d+'            | tail -1 || true)
          failed=$(echo "$summary"  | grep -oP '(?<![+~])-\K\d+'    | tail -1 || true)
          skipped=$(echo "$summary" | grep -oP '~\K\d+'             | tail -1 || true)
          failed=${failed:-0}; skipped=${skipped:-0}

          # `passed >= 1` floor (#439/#444): this also subsumes the old -z check —
          # an empty parse defaults to 0 and trips the floor. "0 passed, 0 failed"
          # would otherwise sail through both this and the failed-check below.
          if [ "${passed:-0}" -lt 1 ]; then
            echo "::error::Dart engine reported 0 passing tests (parse failure, or the suite ran nothing)"
            exit 1
          fi

          echo "Dart engine: $passed passed, $failed failed, $skipped skipped"
          if [ "$failed" != "0" ]; then
            echo "::error::Dart engine has $failed failing test(s) — every test must pass"
            exit 1
          fi
          if [ "$skipped" != "0" ]; then
            echo "::error::Dart engine has $skipped skipped test(s) — no skipping allowed"
            exit 1
          fi

      - name: Encoder — assert 0 failed and 0 skipped
        run: |
          set -o pipefail
          cd dart/encoder
          output=$(dart test --reporter expanded 2>&1) || { echo "$output"; echo "::error::Dart encoder suite exited non-zero"; exit 1; }
          echo "$output"

          # Parse counts from the reporter's FINAL summary line ONLY — never the
          # whole output. A test name or printed value containing `-N` (e.g. a
          # negative-number literal like `-200`) otherwise gets picked up by a
          # global `grep ... | tail -1`, producing an order-dependent FALSE
          # failure count. `dart test` already exits non-zero on any real
          # failure (caught by the `||` guard above), so this run is all-green
          # and the summary is `+N[ ~S]: All tests passed!`.
          # `|| true`: under `bash -e` + pipefail a grep with no match exits
          # non-zero, which would otherwise abort the step before the checks run.
          summary=$(echo "$output" | grep -E 'All tests passed!|Some tests failed' | tail -1 || true)
          passed=$(echo "$summary"  | grep -oP '\+\K\d+'            | tail -1 || true)
          failed=$(echo "$summary"  | grep -oP '(?<![+~])-\K\d+'    | tail -1 || true)
          skipped=$(echo "$summary" | grep -oP '~\K\d+'             | tail -1 || true)
          failed=${failed:-0}; skipped=${skipped:-0}

          # `passed >= 1` floor (#439/#444): this also subsumes the old -z check —
          # an empty parse defaults to 0 and trips the floor. "0 passed, 0 failed"
          # would otherwise sail through both this and the failed-check below.
          if [ "${passed:-0}" -lt 1 ]; then
            echo "::error::Dart encoder reported 0 passing tests (parse failure, or the suite ran nothing)"
            exit 1
          fi

          echo "Dart encoder: $passed passed, $failed failed, $skipped skipped"
          if [ "$failed" != "0" ]; then
            echo "::error::Dart encoder has $failed failing test(s) — every test must pass"
            exit 1
          fi
          if [ "$skipped" != "0" ]; then
            echo "::error::Dart encoder has $skipped skipped test(s) — no skipping allowed"
            exit 1
          fi

      - name: Compiler — assert 0 failed and 0 skipped (exclude slow)
        run: |
          set -o pipefail
          cd dart/compiler
          output=$(dart test --reporter expanded --exclude-tags slow 2>&1) || { echo "$output"; echo "::error::Dart compiler suite exited non-zero"; exit 1; }
          echo "$output"

          # Parse counts from the reporter's FINAL summary line ONLY — never the
          # whole output. A test name or printed value containing `-N` (e.g. a
          # negative-number literal like `-200`) otherwise gets picked up by a
          # global `grep ... | tail -1`, producing an order-dependent FALSE
          # failure count. `dart test` already exits non-zero on any real
          # failure (caught by the `||` guard above), so this run is all-green
          # and the summary is `+N[ ~S]: All tests passed!`.
          # `|| true`: under `bash -e` + pipefail a grep with no match exits
          # non-zero, which would otherwise abort the step before the checks run.
          summary=$(echo "$output" | grep -E 'All tests passed!|Some tests failed' | tail -1 || true)
          passed=$(echo "$summary"  | grep -oP '\+\K\d+'            | tail -1 || true)
          failed=$(echo "$summary"  | grep -oP '(?<![+~])-\K\d+'    | tail -1 || true)
          skipped=$(echo "$summary" | grep -oP '~\K\d+'             | tail -1 || true)
          failed=${failed:-0}; skipped=${skipped:-0}

          # `passed >= 1` floor (#439/#444): this also subsumes the old -z check —
          # an empty parse defaults to 0 and trips the floor. "0 passed, 0 failed"
          # would otherwise sail through both this and the failed-check below.
          if [ "${passed:-0}" -lt 1 ]; then
            echo "::error::Dart compiler reported 0 passing tests (parse failure, or the suite ran nothing)"
            exit 1
          fi

          echo "Dart compiler: $passed passed, $failed failed, $skipped skipped"
          if [ "$failed" != "0" ]; then
            echo "::error::Dart compiler has $failed failing test(s) — every test must pass"
            exit 1
          fi
          if [ "$skipped" != "0" ]; then
            echo "::error::Dart compiler has $skipped skipped test(s) — no skipping allowed"
            exit 1
          fi

  # ──────────────────────────────────────────────────
  # C++ self-host gate — the compiled Ball engine (engine_rt.cpp) must pass
  # EVERY conformance fixture: 0 fail, 0 timeout, 0 crash. Each fixture is its
  # own CTest test, run in its own process (cpp/test/CMakeLists.txt), so a
  # crash/hang fails only that fixture; CTest fails the job if any is non-pass.
  # (Job id/name kept stable for branch-protection required-check matching.)
  # ──────────────────────────────────────────────────
  cpp-selfhost-tally:
    name: C++ Self-Host Tally (every fixture must pass)
    needs: changes
    # C++ self-host is build-isolated from dart/ + ts/.
    if: ${{ needs.changes.outputs.cpp == 'true' || needs.changes.outputs.infra == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1
        with:
          setup_only: true

      - name: ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: cpp-selfhost
          max-size: 1G

      - name: Install nlohmann-json + ninja
        run: sudo apt-get update && sudo apt-get install -y nlohmann-json3-dev ninja-build

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable

      - name: Cache Dart pub
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('dart/**/pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Bootstrap Dart workspace (engine_rt generation)
        run: cd dart && dart pub get

      - name: Configure CMake (bootstrap compiler)
        run: cmake -S cpp -B cpp/ci-build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build ball_cpp_compile
        run: cmake --build cpp/ci-build --config Release --target ball_cpp_compile

      - name: Generate engine_rt.cpp
        run: dart run dart/compiler/tool/compile_engine_cpp.dart --monolithic

      # Issue #367: the unified `ball` CLI's portable verbs (info/validate/tree/
      # audit/version) are the self-hosted cli_core, library-compiled to
      # dart/self_host/lib/cli_rt.h. Generate the CLI IR + header here (Dart +
      # ball_cpp_compile are both available) so the CMake reconfigure below picks
      # them up and builds `ball` (with real verbs + engine_rt run) and the
      # parity test.
      - name: Generate self-hosted CLI core (cli.ball.json + cli_rt.h)
        run: |
          cd dart
          dart run compiler/tool/gen_cli_json.dart
          dart run compiler/tool/gen_cli_cpp.dart

      - name: Generate CLI parity goldens (Dart-native cli_core)
        run: cd dart && dart run cli/tool/gen_cli_parity_goldens.dart "${{ github.workspace }}/cpp/ci-build/cli_parity_goldens"

      - name: Configure CMake (enable self-host target)
        run: cmake -S cpp -B cpp/ci-build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build self-host conformance binary
        run: cmake --build cpp/ci-build --config Release --target test_selfhost_conformance

      # Issue #367: build the unified `ball` CLI + its verb-parity gate, then
      # assert the compiled cli_core verbs are byte-identical to the Dart CLI.
      - name: Build ball CLI + parity gate
        run: cmake --build cpp/ci-build --config Release --target ball test_cli_parity

      - name: Run CLI-verb parity gate (compiled cli_core == Dart golden)
        run: ctest --test-dir cpp/ci-build -C Release -R cli_parity_tests --output-on-failure --no-tests=error

      - name: Run self-host conformance (per-fixture, isolated, via CTest)
        # Each conformance fixture is its own CTest test (label "selfhost"), run
        # in its own process on the binary's main thread — see
        # cpp/test/CMakeLists.txt. CTest provides the cross-platform process
        # isolation + per-test timeout (1200s), and exits non-zero if ANY fixture
        # fails, times out, or crashes — so a single stack-overflowing fixture
        # fails only its own test instead of killing the whole run.
        # Run SEQUENTIALLY (no -j): the self-host engine is a slow std::any
        # tree-walker and several fixtures are CPU/memory-heavy (the heaviest,
        # 143_perfect_number, ~110s alone — more on slower CI runners). Parallel
        # runs make them contend for cores/RAM, swap, and blow the timeout;
        # sequential keeps each fixture at its predictable solo cost — well under
        # the 1200s budget — at the same wall-clock as the old per-fixture loop.
        # --no-tests=error guards against the self-host tests not being
        # registered (e.g. engine_rt missing). Replaces that hand-rolled loop.
        run: >-
          ctest --test-dir cpp/ci-build -C Release
          -L selfhost
          --output-on-failure --no-tests=error
