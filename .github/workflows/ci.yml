name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"

# Least-privilege default token: read-only. No job in this workflow writes to
# the repo (build + test only). https://docs.github.com/actions/security
permissions:
  contents: read

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────
  # Detect which stacks a PR/push touched, so the heavy per-stack jobs below can
  # skip when nothing in their stack changed. Native git-diff (no third-party
  # action). FAIL-OPEN: if a real diff base can't be determined (first push,
  # force-push, zero/missing base), every output is `true` so NO check is ever
  # silently skipped. `infra` (proto/** or this workflow) forces every stack to
  # run, since protos feed all bindings. The post-merge conformance-matrix
  # re-runs the full cross-language matrix regardless, as a safety net.
  # ──────────────────────────────────────────────────
  changes:
    name: Detect changed stacks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      dart: ${{ steps.f.outputs.dart }}
      ts: ${{ steps.f.outputs.ts }}
      cpp: ${{ steps.f.outputs.cpp }}
      rust: ${{ steps.f.outputs.rust }}
      infra: ${{ steps.f.outputs.infra }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history so the diff base is reachable

      - id: f
        env:
          EVENT: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PUSH_BASE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          base=""
          [ "$EVENT" = "pull_request" ] && base="$PR_BASE" || true
          [ "$EVENT" = "push" ] && base="$PUSH_BASE" || true
          zero="0000000000000000000000000000000000000000"
          if [ -z "$base" ] || [ "$base" = "$zero" ] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            echo "No usable diff base ('$base') — failing OPEN: run every stack."
            { echo "dart=true"; echo "ts=true"; echo "cpp=true"; echo "rust=true"; echo "infra=true"; } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Three-dot (merge-base) diff: ONLY this branch's own changes, never
          # commits the base branch gained since we forked. With two-dot, a
          # sibling PR that merges to main first leaks its files into this diff
          # — e.g. a dart-only PR would suddenly see the other PR's
          # workflow/proto change, flip infra=true, and run every stack. The
          # merge-base is reachable thanks to fetch-depth: 0 above.
          files="$(git diff --name-only "$base...HEAD")"
          echo "Changed files vs merge-base(${base}, HEAD):"; echo "$files"
          # here-strings (not `echo | grep`) so `set -o pipefail` can't flake on
          # SIGPIPE when grep -q early-exits on a large file list.
          m() { grep -qE "$1" <<< "$files"; }
          out() { if m "$2"; then echo "$1=true"; else echo "$1=false"; fi; }
          # infra = ANY changed file OUTSIDE the four single-stack dirs — proto/,
          # tests/, tools/, examples/, root configs, this workflow, etc. Anything
          # cross-cutting forces every stack to run, so a path we forgot to map
          # can never silently skip a check (fail-safe by construction).
          infra=false
          if grep -qvE '^(dart/|ts/|cpp/|rust/)' <<< "$files"; then infra=true; fi
          {
            out dart '^dart/'
            out ts   '^ts/'
            out cpp  '^cpp/'
            out rust '^rust/'
            echo "infra=$infra"
          } >> "$GITHUB_OUTPUT"
          cat "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────
  # Proto — lint, format, breaking change check
  # ──────────────────────────────────────────────────
  proto:
    name: Proto Checks
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # needed for buf breaking against git history

      - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1
        with:
          setup_only: true

      - name: Lint
        run: buf lint proto/

      - name: Format check
        run: buf format proto/ --diff --exit-code

      - name: Breaking change check
        if: github.event_name == 'pull_request'
        run: buf breaking proto/ --against ".git#subdir=proto"

  # ──────────────────────────────────────────────────
  # Dart — analyze, format, all test suites
  # ──────────────────────────────────────────────────
  dart:
    name: Dart
    needs: changes
    # Dart + TS are coupled: the Dart compiler suite builds and shells out to
    # @ball-lang/compiler (ts/compiler), and ts tests regenerate from the Dart
    # self-host source. Run this cluster when either changed.
    if: ${{ needs.changes.outputs.dart == 'true' || needs.changes.outputs.ts == 'true' || needs.changes.outputs.infra == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable

      - name: Cache Dart pub
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('dart/**/pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-

      # Node is needed by the Dart-side TsCompiler wrapper, which
      # shells out to @ball-lang/compiler (ts/compiler/). Without the
      # dist build the wrapper throws.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ts/compiler/package-lock.json

      - name: Install dependencies
        run: cd dart && dart pub get

      - name: Install & build @ball-lang/compiler
        run: cd ts/compiler && npm ci && npm run build

      - name: Analyze
        run: dart analyze --no-fatal-warnings dart/

      - name: Format check
        run: dart format --set-exit-if-changed dart/

      - name: Shared tests
        run: cd dart/shared && dart test

      - name: ball_protobuf tests
        run: cd dart/ball_protobuf && dart test

      - name: Editions conformance (legacy↔editions parity + feature codecs)
        run: cd dart/ball_protobuf && dart run tool/editions_conformance.dart

      - name: Engine tests
        run: cd dart/engine && dart test

      - name: Encoder tests
        run: cd dart/encoder && dart test

      - name: Compiler tests
        run: cd dart/compiler && dart test --exclude-tags slow

      - name: Resolver tests
        run: cd dart/resolver && dart test

      # dart/cli (depends on ball_compiler/ball_encoder/ball_engine/
      # ball_resolver, tested above). `--exclude-tags network` excludes only
      # the one test that hits the real pub.dev registry (ball_add's
      # `resolve` integration test) — that stays a manual/local-only check so
      # CI never depends on external network availability; every other CLI
      # test (arg parsing, command dispatch, mock-registry resolution,
      # local-file publish/init/add) runs here for real.
      - name: CLI tests
        run: cd dart/cli && dart test --exclude-tags network

      # engine_roundtrip.dart is a generated artifact (gitignored, like its
      # engine_rt.* siblings). Regenerate it from the live engine so the parity
      # test below has its import. Runs AFTER analyze/format so the generated
      # file is never linted. --skip-analyze: the tool's own analyze pass is
      # advisory (warnings only) and would slow the step.
      - name: Regenerate round-tripped engine (self-host source)
        run: cd dart/encoder && dart run tool/roundtrip_engine.dart --skip-analyze

      - name: Self-host parity (conformance via round-tripped engine)
        run: cd dart/self_host && dart test

  # ──────────────────────────────────────────────────
  # Ball artifact freshness — every committed Ball artifact must be GENERATED
  # from its Dart source, never hand-edited. Regenerate the deterministic shared
  # artifacts and fail if any drifted from the checked-in copy. The .json (text)
  # outputs are gated; each generator writes the sibling .bin in the same run,
  # so a fresh .json implies a fresh .bin (and avoids any binary cross-platform
  # serialization nondeterminism in the gate).
  # ──────────────────────────────────────────────────
  ball-freshness:
    name: Ball Artifact Freshness
    needs: changes
    if: ${{ needs.changes.outputs.dart == 'true' || needs.changes.outputs.ts == 'true' || needs.changes.outputs.infra == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable

      - name: Cache Dart pub
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('dart/**/pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: cd dart && dart pub get

      - name: Regenerate shared Ball artifacts
        run: |
          ( cd dart/shared  && dart run bin/gen_std.dart . )
          ( cd dart/shared  && dart run bin/gen_ball_proto.dart . )
          ( cd dart/encoder && dart run bin/gen_ball_protobuf.dart ../shared )

      - name: Assert no drift
        run: |
          if ! git diff --exit-code -- \
              dart/shared/std.json \
              dart/shared/ball_proto.json \
              dart/shared/ball_protobuf.json; then
            echo "::error::A committed Ball artifact is stale. Regenerate it (see CLAUDE.md 'Build & Test' / 'Typical Feature Workflow') and commit the result — these files must never be hand-edited."
            exit 1
          fi
          echo "All shared Ball artifacts are up to date."

      # Every conformance .ball.json must be sourced from a src/<name>.dart, or
      # be an explicitly documented carve-out (tests/conformance/CARVEOUTS.md).
      - name: Assert conformance fixtures are sourced (no orphans)
        run: cd dart/encoder && dart run bin/check_conformance_sources.dart

      # FORWARD-direction completeness (the gap that hid #55): every std base
      # function the encoder can EMIT must be exercised by at least one executed
      # fixture, or be a documented carve-out
      # (tests/conformance/ENCODER_COMPLETENESS_CARVEOUTS.md).
      - name: Assert encoder completeness (no untested emittable constructs)
        run: cd dart/encoder && dart run bin/check_encoder_completeness.dart

      # A fixture's NAME must not overstate its coverage — no "false coverage"
      # like the old imperative 92_list_comprehension (which let #55 hide).
      - name: Assert fixture names match their content
        run: cd dart/encoder && dart run bin/check_fixture_names.dart

      # STRUCTURAL completeness: every Expression NODE SHAPE (the 7
      # Expression.expr types + meaningful sub-variants) must be exercised by at
      # least one executed fixture, or be a documented carve-out
      # (tests/conformance/NODE_SHAPE_COVERAGE_CARVEOUTS.md). Sibling to the
      # encoder-completeness gate above, which only gates std FUNCTIONS — this
      # closes the ungated node-shape surface (issue #64).
      - name: Assert node-shape coverage (no untested Expression shapes)
        run: cd dart/encoder && dart run bin/check_node_shape_coverage.dart

      # Every conformance .ball.json must be a fresh generator output, never
      # hand-edited. Regenerate from src and fail on drift.
      - name: Regenerate conformance corpus
        run: cd dart/encoder && dart run bin/generate_conformance.dart

      - name: Assert conformance corpus is up to date
        run: |
          if ! git diff --exit-code -- 'tests/conformance/*.ball.json'; then
            echo "::error::A conformance .ball.json is stale. Regenerate with 'cd dart/encoder && dart run bin/generate_conformance.dart' and commit — these files must never be hand-edited (see tests/conformance/CARVEOUTS.md for the only exceptions)."
            exit 1
          fi
          echo "Conformance corpus is up to date."

      # The std base-function coverage inventory (std_coverage.json +
      # STD_COVERAGE.md) is generated FROM the buildStd*Module() builders and
      # the committed conformance fixtures, so it silently rots as std*.dart and
      # the corpus evolve (issue #172). Regenerate and fail on drift — same
      # generate-and-diff contract as the artifacts above. Runs last so it reads
      # the fixtures the corpus step just confirmed fresh.
      - name: Regenerate std coverage inventory
        run: cd dart/encoder && dart run bin/gen_std_coverage.dart

      - name: Assert std coverage inventory is up to date
        run: |
          if ! git diff --exit-code -- \
              tests/conformance/std_coverage.json \
              tests/conformance/STD_COVERAGE.md; then
            echo "::error::The std coverage inventory is stale. Regenerate with 'cd dart/encoder && dart run bin/gen_std_coverage.dart' and commit — these files are generated (issue #172), never hand-edited."
            exit 1
          fi
          echo "Std coverage inventory is up to date."

  # ──────────────────────────────────────────────────
  # Protobuf Codegen — the protoc-gen-ball / -connect / -grpc plugins
  # (dart/ball_protobuf_gen) + the transport runtime (dart/ball_rpc).
  # Each package is analyzed and tested FROM ITS OWN PACKAGE DIRECTORY
  # (the canonical invocation), after a single workspace `dart pub get`.
  # No Node is needed: these packages never shell out to the TS compiler.
  # ──────────────────────────────────────────────────
  protobuf-codegen:
    name: Protobuf Codegen (gen + rpc)
    needs: changes
    if: ${{ needs.changes.outputs.dart == 'true' || needs.changes.outputs.ts == 'true' || needs.changes.outputs.infra == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable

      - name: Cache Dart pub
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('dart/**/pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: cd dart && dart pub get

      # ball_protobuf_gen — protoc-gen-ball / -connect / -grpc plugins
      - name: Analyze ball_protobuf_gen
        run: cd dart/ball_protobuf_gen && dart analyze
      - name: Test ball_protobuf_gen
        run: cd dart/ball_protobuf_gen && dart test

      # ball_rpc — Connect + gRPC transport runtime
      - name: Analyze ball_rpc
        run: cd dart/ball_rpc && dart analyze
      - name: Test ball_rpc
        run: cd dart/ball_rpc && dart test

  # ──────────────────────────────────────────────────
  # C++ — build + test on all platforms
  # ──────────────────────────────────────────────────
  cpp:
    name: C++ (${{ matrix.os }})
    needs: changes
    # C++ is build-isolated (FetchContents its own protobuf; does not build from
    # dart/ or ts/). Skip the whole 3-OS matrix — incl. the ~40-min Windows
    # build — when nothing under cpp/ (or proto/, or this workflow) changed.
    if: ${{ needs.changes.outputs.cpp == 'true' || needs.changes.outputs.infra == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1
        with:
          setup_only: true

      # Compiler cache so the FetchContent protobuf+abseil build (the dominant
      # cost) is reused across runs. ccache on Linux/macOS, sccache on Windows
      # (MSVC). Manages its own GitHub Actions cache save/restore.
      - name: ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: cpp-${{ matrix.os }}
          variant: ${{ runner.os == 'Windows' && 'sccache' || 'ccache' }}
          max-size: 1G

      - name: Install nlohmann-json (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y nlohmann-json3-dev

      - name: Install nlohmann-json (macOS)
        if: runner.os == 'macOS'
        run: brew install nlohmann-json

      # Windows: nlohmann-json is fetched by CMake FetchContent

      # -DBALL_BUILD_PROTOBUF_RT=ON builds Ball's own compiled protobuf runtime
      # (cpp/shared/ball_protobuf_rt.h) plus a smoke driver that round-trips
      # real values through it, as a standalone, dependency-free proof target —
      # the #18 canary that it keeps building AND working under the toolchain.
      # It links no libprotobuf/abseil, so it adds negligible time next to the
      # FetchContent protobuf build this job already pays for. Enabled on Linux
      # (g++) only for now: that's the toolchain the target has been verified
      # against; extend to macOS (AppleClang) / Windows (MSVC) once each is
      # confirmed green — a broken canary must never take the whole job red.
      - name: Configure CMake
        run: cmake -S cpp -B cpp/build -DCMAKE_BUILD_TYPE=Release ${{ runner.os == 'Linux' && '-DBALL_BUILD_PROTOBUF_RT=ON' || '' }} -DCMAKE_C_COMPILER_LAUNCHER=${{ runner.os == 'Windows' && 'sccache' || 'ccache' }} -DCMAKE_CXX_COMPILER_LAUNCHER=${{ runner.os == 'Windows' && 'sccache' || 'ccache' }}

      - name: Build all targets
        run: cmake --build cpp/build --config Release

      - name: Run tests
        run: ctest --test-dir cpp/build --output-on-failure -C Release

  # ──────────────────────────────────────────────────
  # Upstream protobuf conformance — drive ball_protobuf's feature-aware codecs
  # through the REAL protobuf conformance_test_runner for the proto2, proto3,
  # and edition2023 TestAllTypes messages (every registered test must pass — no
  # tolerated-failure list). POSIX-only runner (fork/pipe) → Ubuntu.
  # ──────────────────────────────────────────────────
  editions-conformance-upstream:
    name: Upstream Conformance (Editions)
    needs: changes
    # Drives ball_protobuf (Dart) through the C++ conformance_test_runner — so it
    # depends on dart/ and cpp/ (+ proto/). A TS-only PR can't affect it; skip
    # this ~45-min job there.
    if: ${{ needs.changes.outputs.dart == 'true' || needs.changes.outputs.cpp == 'true' || needs.changes.outputs.infra == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable

      - name: Cache Dart pub
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('dart/**/pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-

      # ccache makes the protobuf+abseil conformance build a near-instant
      # rebuild on warm runs (this is the slowest job in CI — 45-min budget).
      - name: ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: cpp-conformance
          max-size: 1G

      - name: Install nlohmann-json + ninja
        run: sudo apt-get update && sudo apt-get install -y nlohmann-json3-dev ninja-build

      - name: Install dependencies
        run: cd dart && dart pub get

      # Builds only the conformance_test_runner target (protobuf + abseil +
      # conformance harness). It statically links the TestAllTypes* descriptors,
      # so we need not feed it our .proto — it already knows the message types.
      - name: Configure CMake (conformance runner)
        run: cmake -S cpp -B cpp/build-conformance -G Ninja -Dprotobuf_BUILD_CONFORMANCE=ON -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      # Bounded parallelism (-j 2): an unbounded `-j` spawns dozens of protobuf's
      # huge translation units at once (command_line_interface.cc etc.) and
      # exhausts the runner's memory. Two at a time stays well under 16 GB.
      - name: Build conformance_test_runner
        run: cmake --build cpp/build-conformance --target conformance_test_runner --config Release -j 2

      # The conformance program: builds the descriptor registry (with resolved
      # editions features) from the checked-in FileDescriptorSet and drives our
      # codecs. Compiled to a native exe so the runner spawns it cheaply.
      - name: Compile the conformance program
        run: dart compile exe dart/ball_protobuf/tool/conformance_main.dart -o ball_conformance

      - name: Run upstream conformance (Editions)
        run: |
          set -euo pipefail
          runner=$(find cpp/build-conformance -name conformance_test_runner -type f | head -1)
          if [ -z "$runner" ]; then echo "::error::conformance_test_runner not built"; exit 1; fi
          echo "runner: $runner"
          # The program walks up from CWD (repo root) to find the checked-in
          # FileDescriptorSet, so it needs no args — this runner build takes the
          # test program as the final positional arg (no `--` separator). There
          # is NO tolerated-failure list: the runner exits non-zero on ANY
          # conformance failure, so ball_protobuf must pass every case.
          "$runner" --maximum_edition 2023 \
            ./ball_conformance

  # ──────────────────────────────────────────────────
  # TypeScript — build + test
  # ──────────────────────────────────────────────────
  typescript:
    name: TypeScript
    needs: changes
    if: ${{ needs.changes.outputs.dart == 'true' || needs.changes.outputs.ts == 'true' || needs.changes.outputs.infra == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable

      - name: Cache Dart pub
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('dart/**/pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            ts/engine/package-lock.json
            ts/cli/package-lock.json
            ts/compiler/package-lock.json
            ts/shared/package-lock.json

      # Dart is needed to regenerate engine.ball.json for the engine
      # self-host parse test under ts/compiler/test/engine_parse.test.ts.
      - name: Bootstrap Dart workspace
        run: cd dart && dart pub get

      # @ball-lang/shared (protobuf-es generated types; no build step)
      - name: Install @ball-lang/shared deps
        run: cd ts/shared && npm ci
      # Test @ball-lang/shared under its c8 coverage floor (issue #62) — runs
      # `npm test` plus `--check-coverage` so a regression below the measured
      # floor fails CI, not just a silent drop.
      - name: Test @ball-lang/shared (coverage-gated)
        run: cd ts/shared && npm run coverage

      # @ball-lang/engine
      - name: Install @ball-lang/engine deps
        run: cd ts/engine && npm ci
      - name: Build @ball-lang/engine
        run: cd ts/engine && npm run build
      # Coverage-gated (issue #62): `npm run coverage` runs the full `npm test`
      # (conformance corpus + hand-written unit tests) under c8, then enforces
      # the per-package floor via --check-coverage.
      - name: Test @ball-lang/engine (coverage-gated)
        run: cd ts/engine && npm run coverage

      # @ball-lang/cli (depends on the in-repo engine via file:../engine —
      # the engine build above must precede; previously the cli had NO CI
      # gate and shipped built against a stale registry engine)
      - name: Install @ball-lang/cli deps
        run: cd ts/cli && npm ci
      - name: Build @ball-lang/cli
        run: cd ts/cli && npm run build
      # Coverage-gated (issue #62): `npm run coverage` runs the full `npm test`
      # (the black-box subprocess suite in test/cli_test.ts + the dependency-free
      # capability_analyzer/capability_table unit tests) under c8.
      - name: Test @ball-lang/cli (coverage-gated)
        run: cd ts/cli && npm run coverage

      # @ball-lang/compiler (self-host TS-native compiler)
      - name: Install @ball-lang/compiler deps
        run: cd ts/compiler && npm ci
      - name: Build @ball-lang/compiler
        run: cd ts/compiler && npm run build
      # Coverage-gated (issue #62): fixtures + engine parse tests, under c8.
      - name: Test @ball-lang/compiler (fixtures + engine parse, coverage-gated)
        run: cd ts/compiler && npm run coverage

      # @ball-lang/encoder (TypeScript → Ball)
      - name: Install @ball-lang/encoder deps
        run: cd ts/encoder && npm ci
      - name: Build @ball-lang/encoder
        run: cd ts/encoder && npm run build
      # Coverage-gated (issue #62).
      - name: Test @ball-lang/encoder (coverage-gated)
        run: cd ts/encoder && npm run coverage

  # ──────────────────────────────────────────────────
  # Rust — build + test + fmt + clippy
  # ──────────────────────────────────────────────────
  rust:
    name: Rust
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' || needs.changes.outputs.infra == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # rustup ships preinstalled on GitHub-hosted runners. `rustup show`
      # reads rust/rust-toolchain.toml (channel = stable, components =
      # rustfmt + clippy) and installs exactly that pinned toolchain; the
      # explicit component-add below is a fast, idempotent belt-and-braces
      # step in case a runner image ships a stable toolchain without them.
      - name: Install Rust toolchain
        working-directory: rust
        run: |
          rustup show
          rustup component add rustfmt clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rust

      # NOTE: the default `--workspace` build/test below leaves the ball-engine
      # `self_host` feature OFF (compiled_engine.rs is a gitignored, generated
      # build artifact), so this part of the job gates only the wrapper
      # foundation. The self-hosted engine — which now COMPILES **and RUNS**
      # (issue #300: hello_world/fibonacci produce Dart-identical output) — is
      # regenerated and exercised in the dedicated step at the end of this job.
      - name: Build
        run: cd rust && cargo build --workspace

      - name: Test
        run: cd rust && cargo test --workspace

      # rustfmt walks every `mod` declaration unconditionally — unlike
      # rustc/clippy it does NOT respect the `#[cfg(feature = "self_host")]`
      # gate on `pub mod compiled_engine;` (rust/engine/src/lib.rs), so
      # `cargo fmt --check` errors out on a fresh checkout where that
      # gitignored, generated file (rust/.gitignore) has never been
      # regenerated. A single-newline placeholder satisfies rustfmt's module
      # walk; it is already-formatted (no diff) and never affects the real
      # default-features build/test/clippy above, which skip the module
      # entirely via the cfg gate and never touch the file.
      - name: Placeholder for gitignored self-hosted engine module (rustfmt needs the file to exist)
        run: |
          [ -f rust/engine/src/compiled_engine.rs ] || printf '\n' > rust/engine/src/compiled_engine.rs

      - name: Format check
        run: cd rust && cargo fmt --check

      - name: Clippy
        run: cd rust && cargo clippy --workspace --all-targets -- -D warnings

      # ── Self-hosted engine: regenerate + RUN (issue #300) ──
      # The self-hosted engine is a Ball program (dart/self_host/engine.ball.json,
      # itself gitignored) compiled through ball-compiler into the gitignored
      # rust/engine/src/compiled_engine.rs. Regenerate both from source, then run
      # the acceptance programs under `--features self_host` and assert
      # Dart-identical output (hello_world -> "Hello, World!", fibonacci -> "55").
      - name: Setup Dart (for engine.ball.json regeneration)
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable
      - name: Regenerate self-hosted engine
        run: |
          dart pub get
          cd dart && dart run compiler/tool/gen_engine_json.dart
          cd ../rust && cargo run -p ball-engine-regen
      - name: Self-host run tests (Dart-identical output)
        run: cd rust && cargo test -p ball-engine --features self_host --test self_host_run

