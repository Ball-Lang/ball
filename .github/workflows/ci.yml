name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────
  # Proto — lint, format, breaking change check
  # ──────────────────────────────────────────────────
  proto:
    name: Proto Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # needed for buf breaking against git history

      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Lint
        run: buf lint proto/

      - name: Format check
        run: buf format proto/ --diff --exit-code

      - name: Breaking change check
        if: github.event_name == 'pull_request'
        run: buf breaking proto/ --against ".git#subdir=proto"

  # ──────────────────────────────────────────────────
  # Dart — analyze, format, all test suites
  # ──────────────────────────────────────────────────
  dart:
    name: Dart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      # Node is needed by the Dart-side TsCompiler wrapper, which
      # shells out to @ball-lang/compiler (ts/compiler/). Without the
      # dist build the wrapper throws.
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ts/compiler/package-lock.json

      - name: Install dependencies
        run: cd dart && dart pub get

      - name: Install & build @ball-lang/compiler
        run: cd ts/compiler && npm ci && npm run build

      - name: Analyze
        run: dart analyze dart/

      - name: Format check
        run: dart format --set-exit-if-changed dart/

      - name: Shared tests
        run: cd dart/shared && dart test

      - name: Engine tests
        run: cd dart/engine && dart test

      - name: Encoder tests
        run: cd dart/encoder && dart test

      - name: Compiler tests
        run: cd dart/compiler && dart test --exclude-tags slow

      - name: Resolver tests
        run: cd dart/resolver && dart test

      - name: Self-host parity (conformance via round-tripped engine)
        run: cd dart/self_host && dart test

  # ──────────────────────────────────────────────────
  # C++ — build + test on all platforms
  # ──────────────────────────────────────────────────
  cpp:
    name: C++ (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Install nlohmann-json (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y nlohmann-json3-dev

      - name: Install nlohmann-json (macOS)
        if: runner.os == 'macOS'
        run: brew install nlohmann-json

      # Windows: nlohmann-json is fetched by CMake FetchContent

      - name: Configure CMake
        run: cmake -S cpp -B cpp/build -DCMAKE_BUILD_TYPE=Release

      - name: Build all targets
        run: cmake --build cpp/build --config Release

      - name: Run tests
        run: ctest --test-dir cpp/build --output-on-failure -C Release

  # ──────────────────────────────────────────────────
  # TypeScript — build + test
  # ──────────────────────────────────────────────────
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # Dart is needed to regenerate engine.ball.json for the engine
      # self-host parse test under ts/compiler/test/engine_parse.test.ts.
      - name: Bootstrap Dart workspace
        run: cd dart && dart pub get

      # @ball-lang/engine
      - name: Install @ball-lang/engine deps
        run: cd ts/engine && npm ci
      - name: Build @ball-lang/engine
        run: cd ts/engine && npm run build
      - name: Test @ball-lang/engine
        run: cd ts/engine && npm test

      # @ball-lang/compiler (self-host TS-native compiler)
      - name: Install @ball-lang/compiler deps
        run: cd ts/compiler && npm ci
      - name: Build @ball-lang/compiler
        run: cd ts/compiler && npm run build
      - name: Test @ball-lang/compiler (fixtures + engine parse)
        run: cd ts/compiler && npm test
