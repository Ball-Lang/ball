name: Publish npm

on:
  release:
    types: [published]
  # Primary trigger: release.yml dispatches this pinned to the fresh vX.Y.Z
  # tag after semantic-release cuts a release. The `release: published`
  # trigger above only fires for MANUALLY-published releases — GitHub
  # suppresses workflow triggers for events created with the default
  # GITHUB_TOKEN, which is what semantic-release uses.
  workflow_dispatch:

permissions:
  id-token: write    # for provenance attestation (not OIDC auth)
  contents: read

jobs:
  publish:
    name: Publish @ball-lang packages
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # IMPORTANT: do NOT pass `registry-url:` here — that makes setup-node
      # write an .npmrc with `_authToken=${NODE_AUTH_TOKEN}` and export
      # NPM_CONFIG_USERCONFIG. With an unset/empty token npm falls back to
      # token-auth with an empty token instead of negotiating OIDC, producing
      # ENEEDAUTH / E404. OIDC trusted publishing needs no .npmrc at all.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      # ── @ball-lang/engine ───────────────────────────────────────────────
      - name: Install engine dependencies
        working-directory: ts/engine
        run: npm ci

      - name: Build engine
        working-directory: ts/engine
        run: npm run build

      - name: Test engine
        working-directory: ts/engine
        run: npm test

      # ── @ball-lang/cli ──────────────────────────────────────────────────
      - name: Install cli dependencies
        working-directory: ts/cli
        run: npm ci

      - name: Build cli
        working-directory: ts/cli
        run: npm run build

      - name: Test cli
        working-directory: ts/cli
        run: npm test

      # ── @ball-lang/compiler ────────────────────────────────────────
      # MUST install before the encoder tests run: the encoder's
      # roundtrip.test.ts imports ts/compiler/src/compiler.ts across
      # packages, which resolves ts-morph from ts/compiler/node_modules.
      # ci.yml runs compiler-then-encoder for the same reason; the reversed
      # order here failed the first dispatched publish with
      # ERR_MODULE_NOT_FOUND: ts-morph.
      - name: Install compiler dependencies
        working-directory: ts/compiler
        run: npm ci

      - name: Build compiler
        working-directory: ts/compiler
        run: npm run build

      - name: Test compiler
        working-directory: ts/compiler
        run: npm test

      # ── @ball-lang/encoder ─────────────────────────────────────────
      - name: Install encoder dependencies
        working-directory: ts/encoder
        run: npm ci

      - name: Build encoder
        working-directory: ts/encoder
        run: npm run build

      - name: Test encoder
        working-directory: ts/encoder
        run: npm test

      # Upgrade npm to 11.5.1+ for OIDC trusted publishing.
      # Bypass the broken pre-installed npm (missing promise-retry) by
      # downloading the tarball directly and extracting to the node lib
      # path. This is the approach recommended when `npm install -g npm`
      # fails with MODULE_NOT_FOUND.
      - name: Upgrade npm to 11.5.2 for OIDC
        run: |
          NPM_DIR=$(dirname $(dirname $(which node)))/lib/node_modules/npm
          curl -fsSL https://registry.npmjs.org/npm/-/npm-11.5.2.tgz -o /tmp/npm.tgz
          sudo rm -rf "$NPM_DIR"
          sudo mkdir -p "$NPM_DIR"
          sudo tar -xzf /tmp/npm.tgz -C "$NPM_DIR" --strip-components=1
          npm --version

      # Publish engine first — cli depends on it, so on a fresh major bump
      # the engine must be registry-resolvable before the cli publishes.
      - name: Publish engine with provenance (OIDC trusted publishing)
        working-directory: ts/engine
        # No NODE_AUTH_TOKEN, no NPM_TOKEN — any token env var causes npm to
        # use token auth instead of OIDC. id-token: write (set at job level)
        # is what lets npm mint the OIDC token for registry.npmjs.org.
        run: npm publish --provenance --access public

      # ts/cli depends on the IN-REPO engine (`file:../engine`) so dev and CI
      # always build/test against the engine being released — never a stale
      # registry copy. A file: dep must not ship to npm: rewrite it to the
      # concrete registry range of the engine version published just above.
      - name: Point cli at the published engine version
        working-directory: ts/cli
        run: |
          engine_version=$(node -p "require('../engine/package.json').version")
          npm pkg set "dependencies.@ball-lang/engine=^${engine_version}"
          node -p "'cli engine range: ' + require('./package.json').dependencies['@ball-lang/engine']"

      - name: Publish cli with provenance (OIDC trusted publishing)
        working-directory: ts/cli
        run: npm publish --provenance --access public

      - name: Publish compiler with provenance (OIDC trusted publishing)
        working-directory: ts/compiler
        run: npm publish --provenance --access public

      - name: Publish encoder with provenance (OIDC trusted publishing)
        working-directory: ts/encoder
        run: npm publish --provenance --access public
