name: Claude (@claude interactive)

# Interactive Claude Code on GitHub: mention @claude in an issue, issue
# comment, or PR review comment and Claude responds in-thread. Uses the
# official anthropics/claude-code-action v1 (SHA-pinned per repo convention).
#
# AUTH — Max/Pro subscription tokens (no API credits), THREE accounts with
# rotation + failover: the primary token rotates per issue/PR number to
# spread usage; if the primary account fails the run automatically retries
# with the next token, then the last. (There is no public API to query a
# subscription's remaining quota, so rotation+failover is the practical
# "use whichever account has limits left".)
#
# Subscription tokens MUST be passed via the action's `claude_code_oauth_token`
# input — NOT `anthropic_api_key`. An OAuth token sent as an API key is
# rejected by the API on the first call (~150 ms, is_error result, empty
# reply comment) while the action step still exits 0.
#
# Because the action exits 0 even when the Claude execution itself errors
# (only `execution_file` is exposed, no conclusion output), each attempt is
# followed by a check step that parses the execution output for the result's
# `is_error` — failover keys on that, not on the step outcome alone.
#
# Setup (one-time, per account, run BY A HUMAN — tokens are interactive):
#   for each of your Claude accounts (e.g. profiles bdaya / digrum / gmail):
#     1. `claude setup-token` while logged into that account (Pro/Max only)
#     2. gh secret set CLAUDE_CODE_OAUTH_TOKEN_<N> --repo Ball-Lang/ball   (N = 0,1,2)
# OAuth-token limitation per the action docs: inline comment classification
# is skipped (comments post directly).

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  claude:
    # Only fire when the triggering text actually mentions @claude.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      # Rotate the primary account per thread so load spreads across the
      # three subscriptions; failover order is primary, primary+1, primary+2.
      # Missing secrets fall back to _0 via the || below, so the rotation
      # degrades gracefully while fewer than three tokens are configured.
      - name: Pick token order
        id: pick
        env:
          SEED: ${{ github.event.issue.number || github.event.pull_request.number || github.run_number }}
        run: |
          i0=$(( SEED % 3 )); i1=$(( (SEED + 1) % 3 )); i2=$(( (SEED + 2) % 3 ))
          { echo "i0=$i0"; echo "i1=$i1"; echo "i2=$i2"; } >> "$GITHUB_OUTPUT"

      - name: Claude (primary account)
        id: try0
        continue-on-error: true
        uses: anthropics/claude-code-action@a6a5b60a078a0af52612aac63e05e3f95fd4ff64 # v1
        with:
          claude_code_oauth_token: ${{ secrets[format('CLAUDE_CODE_OAUTH_TOKEN_{0}', steps.pick.outputs.i0)] || secrets.CLAUDE_CODE_OAUTH_TOKEN_0 }}
          track_progress: true

      # The action exits 0 even when Claude's execution errors; detect that
      # from the execution output (last `result` message's is_error). A
      # missing file with a green outcome means the trigger gate said "not
      # for Claude" — that is not a failure.
      - name: Check primary result
        id: check0
        env:
          OUTCOME: ${{ steps.try0.outcome }}
          EXEC_FILE: ${{ steps.try0.outputs.execution_file }}
        run: |
          failed=false
          if [ "$OUTCOME" != "success" ]; then
            failed=true
          elif [ -n "$EXEC_FILE" ] && [ -f "$EXEC_FILE" ]; then
            err=$(jq -r 'if type=="array" then ([.[] | select(.type=="result")] | if length>0 then (last | .is_error // false) else false end) elif type=="object" then (.is_error // false) else false end' "$EXEC_FILE" 2>/dev/null || echo true)
            [ "$err" = "true" ] && failed=true
          fi
          echo "failed=$failed" >> "$GITHUB_OUTPUT"
          if [ "$failed" = "true" ]; then echo "::warning::Primary account attempt failed (outcome=$OUTCOME); failing over."; fi

      - name: Claude (failover account 2)
        id: try1
        if: steps.check0.outputs.failed == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@a6a5b60a078a0af52612aac63e05e3f95fd4ff64 # v1
        with:
          claude_code_oauth_token: ${{ secrets[format('CLAUDE_CODE_OAUTH_TOKEN_{0}', steps.pick.outputs.i1)] || secrets.CLAUDE_CODE_OAUTH_TOKEN_0 }}
          track_progress: true

      - name: Check failover 2 result
        id: check1
        if: steps.check0.outputs.failed == 'true'
        env:
          OUTCOME: ${{ steps.try1.outcome }}
          EXEC_FILE: ${{ steps.try1.outputs.execution_file }}
        run: |
          failed=false
          if [ "$OUTCOME" != "success" ]; then
            failed=true
          elif [ -n "$EXEC_FILE" ] && [ -f "$EXEC_FILE" ]; then
            err=$(jq -r 'if type=="array" then ([.[] | select(.type=="result")] | if length>0 then (last | .is_error // false) else false end) elif type=="object" then (.is_error // false) else false end' "$EXEC_FILE" 2>/dev/null || echo true)
            [ "$err" = "true" ] && failed=true
          fi
          echo "failed=$failed" >> "$GITHUB_OUTPUT"
          if [ "$failed" = "true" ]; then echo "::warning::Failover account 2 attempt failed (outcome=$OUTCOME); failing over."; fi

      - name: Claude (failover account 3)
        id: try2
        if: steps.check0.outputs.failed == 'true' && steps.check1.outputs.failed == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@a6a5b60a078a0af52612aac63e05e3f95fd4ff64 # v1
        with:
          claude_code_oauth_token: ${{ secrets[format('CLAUDE_CODE_OAUTH_TOKEN_{0}', steps.pick.outputs.i2)] || secrets.CLAUDE_CODE_OAUTH_TOKEN_0 }}
          track_progress: true

      - name: Check failover 3 result
        id: check2
        if: steps.check0.outputs.failed == 'true' && steps.check1.outputs.failed == 'true'
        env:
          OUTCOME: ${{ steps.try2.outcome }}
          EXEC_FILE: ${{ steps.try2.outputs.execution_file }}
        run: |
          failed=false
          if [ "$OUTCOME" != "success" ]; then
            failed=true
          elif [ -n "$EXEC_FILE" ] && [ -f "$EXEC_FILE" ]; then
            err=$(jq -r 'if type=="array" then ([.[] | select(.type=="result")] | if length>0 then (last | .is_error // false) else false end) elif type=="object" then (.is_error // false) else false end' "$EXEC_FILE" 2>/dev/null || echo true)
            [ "$err" = "true" ] && failed=true
          fi
          echo "failed=$failed" >> "$GITHUB_OUTPUT"

      - name: Fail if all accounts failed
        if: steps.check0.outputs.failed == 'true' && steps.check1.outputs.failed == 'true' && steps.check2.outputs.failed == 'true'
        run: |
          echo "::error::All three Claude accounts failed (auth, rate limits, or a real error — check the attempts above)."
          exit 1
