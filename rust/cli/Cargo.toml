[package]
name = "ball-cli"
description = "Ball CLI (run/compile/encode/check) for the Rust implementation."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[[bin]]
name = "ball"
path = "src/main.rs"

[features]
# Off by default: `ball-engine`'s own `self_host` feature pulls in the
# generated `compiled_engine.rs` (regenerated by `cargo run -p
# ball-engine-regen`, gitignored — see rust/engine/AGENTS.md), which is not
# present in a fresh checkout. Keeping this off by default means `cargo build
# -p ball-cli` / `cargo test -p ball-cli` stay green without that codegen
# step; `ball run` still works in the default build, but every program
# reports `EngineError::SelfHostPending` (surfaced honestly as a runtime
# error, never silently swallowed — see `src/commands/run.rs`). Build with
# `--features self_host` (after regenerating `compiled_engine.rs`) to
# actually execute programs via the self-hosted engine.
default = []
self_host = ["ball-engine/self_host"]
# Off by default for the same reason as `self_host`: `src/compiled_cli.rs`
# (the self-hosted `info`/`validate`/`tree`/`version` report functions,
# compiled from `dart/self_host/cli.ball.json` — issue #365) is a generated,
# gitignored file (`cargo run -p ball-cli-regen`), not present in a fresh
# checkout. Independent of `self_host`: cli-core's compiled functions are
# plain `Program -> String` transforms, not the interpreter — they need no
# self-hosted engine run. Without this feature, `info`/`validate`/`tree`
# honestly report a runtime error instead of silently doing nothing (`ball
# version` still works — see `src/commands/version.rs`).
cli_core = []

[dependencies]
ball-shared = { workspace = true }
ball-compiler = { workspace = true }
ball-encoder = { workspace = true }
ball-engine = { workspace = true }
# CLI argument parsing (derive API — mirrors the other targets' minimal,
# hand-rolled arg parsers only in spirit; `clap` is the idiomatic Rust choice
# and keeps subcommand/flag/help/version wiring declarative).
clap = { version = "4", features = ["derive"] }
# Ball -> Rust program serialization for `ball encode`'s JSON output (the
# reverse of `ball_engine::loader`'s Program -> BallValue view): proto3-JSON
# via `prost-reflect`'s `DynamicMessage`, exactly mirroring
# `rust/engine/src/loader.rs`'s own JSON<->binary round trip.
prost = { workspace = true }
prost-reflect = { workspace = true, features = ["serde"] }
serde_json = "1"
