name: ball_compiler
description: >-
  Ball-to-Dart compiler that translates Ball protobuf programs into formatted
  Dart source code, with support for multi-module package compilation.
version: 0.3.0+5
homepage: https://github.com/ball-lang/ball
repository: https://github.com/ball-lang/ball
issue_tracker: https://github.com/ball-lang/ball/issues
topics:
  - programming-language
  - compiler
  - code-generation
  - protobuf
  - ball

environment:
  sdk: ^3.9.0
resolution: workspace

dependencies:
  ball_base: ^0.3.0+3
  ball_encoder: ^0.3.2
  # ball_compiler.dart re-exports BallEngine/BallRuntimeError/… from
  # package:ball_engine in its public API, so it must be a runtime dependency
  # (pub publish rejects lib/ use of a dev-only dep). No cycle: ball_engine
  # does not depend on ball_compiler.
  ball_engine: ^0.3.0+5
  ball_resolver: ^0.3.0+3
  code_builder: ^4.10.0
  dart_style: ^3.0.0
  fixnum: ^1.1.1
  protobuf: ^6.0.0

dev_dependencies:
  test: ^1.25.0
