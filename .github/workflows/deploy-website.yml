name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'examples/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Website
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install jaspr_cli
        run: dart pub global activate jaspr_cli

      - name: Install dependencies
        working-directory: website
        run: dart pub get

      - name: Generate example excerpts
        run: dart run website/tool/generate_examples.dart

      - name: Build website
        working-directory: website
        run: jaspr build

      - name: Add .nojekyll
        run: touch website/build/jaspr/.nojekyll

      - name: Copy CNAME
        run: cp website/web/CNAME website/build/jaspr/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build/jaspr

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
