name: ball_resolver
description: Module resolver for Ball programs — fetches, verifies, and caches modules from HTTP, file, git, inline, and registry sources.
environment:
  sdk: ^3.9.0
resolution: workspace

dependencies:
  ball_base:
    path: ../shared
  http: ^1.2.0
  archive: ^4.0.0
  crypto: ^3.0.0
  path: ^1.9.0
  pub_semver: ^2.1.0

dev_dependencies:
  test: ^1.25.0
