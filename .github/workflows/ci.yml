name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"

# Least-privilege default token: read-only. No job in this workflow writes to
# the repo (build + test only). https://docs.github.com/actions/security
permissions:
  contents: read

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────
  # Detect which stacks a PR/push touched, so the heavy per-stack jobs below can
  # skip when nothing in their stack changed. Native git-diff (no third-party
  # action). FAIL-OPEN: if a real diff base can't be determined (first push,
  # force-push, zero/missing base), every output is `true` so NO check is ever
  # silently skipped. `infra` (proto/** or this workflow) forces every stack to
  # run, since protos feed all bindings. The post-merge conformance-matrix
  # re-runs the full cross-language matrix regardless, as a safety net.
  # ──────────────────────────────────────────────────
  changes:
    name: Detect changed stacks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      dart: ${{ steps.f.outputs.dart }}
      ts: ${{ steps.f.outputs.ts }}
      cpp: ${{ steps.f.outputs.cpp }}
      rust: ${{ steps.f.outputs.rust }}
      csharp: ${{ steps.f.outputs.csharp }}
      go: ${{ steps.f.outputs.go }}
      infra: ${{ steps.f.outputs.infra }}
      # A self-hosted Dart source (dart/engine/lib/** or the cli_core.dart
      # library) changed — already folded into cpp/rust/csharp below (#416,
      # #386). Exposed for observability/debugging; no downstream job
      # consumes it directly.
      self_host: ${{ steps.f.outputs.self_host }}
      # New/changed conformance fixture stems (space-separated, no dir, no
      # extension) — see the fixture_status computation below.
      changed_fixtures: ${{ steps.f.outputs.changed_fixtures }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history so the diff base is reachable

      - id: f
        env:
          EVENT: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PUSH_BASE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          base=""
          [ "$EVENT" = "pull_request" ] && base="$PR_BASE" || true
          [ "$EVENT" = "push" ] && base="$PUSH_BASE" || true
          zero="0000000000000000000000000000000000000000"
          if [ -z "$base" ] || [ "$base" = "$zero" ] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            echo "No usable diff base ('$base') — failing OPEN: run every stack."
            # changed_fixtures=ALL is the fail-open sentinel for the fixture
            # filter too — the typescript job runs the FULL full_e2e.ts sweep
            # rather than skip it, since we cannot compute what changed.
            { echo "dart=true"; echo "ts=true"; echo "cpp=true"; echo "rust=true"; echo "csharp=true"; echo "go=true"; echo "infra=true"; echo "self_host=true"; echo "changed_fixtures=ALL"; } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Three-dot (merge-base) diff: ONLY this branch's own changes, never
          # commits the base branch gained since we forked. With two-dot, a
          # sibling PR that merges to main first leaks its files into this diff
          # — e.g. a dart-only PR would suddenly see the other PR's
          # workflow/proto change, flip infra=true, and run every stack. The
          # merge-base is reachable thanks to fetch-depth: 0 above.
          files="$(git diff --name-only "$base...HEAD")"
          echo "Changed files vs merge-base(${base}, HEAD):"; echo "$files"
          # here-strings (not `echo | grep`) so `set -o pipefail` can't flake on
          # SIGPIPE when grep -q early-exits on a large file list.
          m() { grep -qE "$1" <<< "$files"; }
          out() { if m "$2"; then echo "$1=true"; else echo "$1=false"; fi; }
          # infra = ANY changed file OUTSIDE the four single-stack dirs — proto/,
          # tests/, tools/, examples/, root configs, this workflow, etc. Anything
          # cross-cutting forces every stack to run, so a path we forgot to map
          # can never silently skip a check (fail-safe by construction).
          infra=false
          if grep -qvE '^(dart/|ts/|cpp/|rust/|csharp/)' <<< "$files"; then infra=true; fi

          # self_host = the diff touches a Dart source that CROSS-COMPILES into
          # the C++, Rust, AND C# self-hosted artifacts, even though it lives
          # under dart/ (so it would otherwise flip only dart=true):
          #   * dart/engine/lib/**  -> engine_rt.cpp / compiled_engine.rs /
          #     CompiledEngine.cs / compiled_engine.go — the self-hosted ENGINE
          #     (engine.dart + its part files), encoded by compile_engine_cpp.dart
          #     and gen_engine_json.dart(+ball-engine-regen / Ball.Engine.Regen /
          #     go/engine's cmd/regen).
          #   * dart/shared/lib/cli_core.dart + its parts (capability_analyzer,
          #     capability_table, termination_analyzer) -> cli_rt.h /
          #     compiled_cli.rs / CompiledCli.cs — the self-hosted CLI core,
          #     encoded by gen_cli_cpp.dart and gen_cli_json.dart(+ball-cli-regen
          #     / Ball.Cli.Regen).
          # These artifacts are REGENERATED from these Dart sources at CI build
          # time, so a Dart-only edit to them changes what the C++/Rust/C#/Go jobs
          # compile and run — yet, mapped by top-level dir alone, sets only
          # dart=true and SKIPS the cpp/rust/csharp/go self-host jobs. That exact
          # blind spot let a C++ self-host break slip through PR CI in #398 (and
          # forced #413's manual verification lane). OR self_host into
          # cpp/rust/csharp/go below so those jobs run whenever the self-host
          # sources change. (dart/compiler, dart/encoder, dart/cli are the
          # Dart-target toolchain, not self-host program inputs, so they are NOT
          # here — the C++/Rust/C# targets use their OWN compilers for the
          # Ball->native step.) See #416, #386.
          self_host=false
          if m '^dart/engine/lib/|^dart/shared/lib/(cli_core|capability_analyzer|capability_table|termination_analyzer)\.dart$'; then self_host=true; fi

          # New/changed conformance fixtures (never deleted) under
          # tests/conformance/*.ball.json, as bare fixture stems (no dir, no
          # extension), space-separated. Closes the escape class where a
          # fixture regression is only caught by a heavy leg that runs
          # main-only (e.g. full_e2e.ts's ~350-fixture sweep, gated behind
          # coverage.yml — see #337/#345): the typescript job below runs
          # full_e2e.ts against JUST this list on every PR, cheaply.
          # --name-status columns are "STATUS\tFILE" for add/modify, or
          # "R###\tOLD\tNEW" for renames — $NF (last field) is the current
          # path either way. Deleted files ('D') are excluded: a fixture that
          # no longer exists has nothing to run.
          fixture_status="$(git diff --name-status "$base...HEAD" -- 'tests/conformance/*.ball.json')"
          changed_fixtures="$(printf '%s\n' "$fixture_status" \
            | awk '$1 !~ /^D/ && NF { print $NF }' \
            | sed -E 's#.*/##; s/\.ball\.json$//' \
            | sort -u | tr '\n' ' ' | sed -E 's/^ +//; s/ +$//')"
          echo "Changed/added conformance fixtures vs merge-base: ${changed_fixtures:-<none>}"

          {
            out dart '^dart/'
            out ts   '^ts/'
            # cpp/rust/csharp run on their own dir changes OR any self-host Dart
            # source change (self_host above — #416, #386): those sources
            # cross-compile into the C++/Rust/C# self-host artifacts even though
            # they live under dart/.
            if m '^cpp/'    || [ "$self_host" = true ]; then echo "cpp=true";    else echo "cpp=false";    fi
            if m '^rust/'   || [ "$self_host" = true ]; then echo "rust=true";   else echo "rust=false";   fi
            if m '^csharp/' || [ "$self_host" = true ]; then echo "csharp=true"; else echo "csharp=false"; fi
            if m '^go/'     || [ "$self_host" = true ]; then echo "go=true";     else echo "go=false";     fi
            echo "infra=$infra"
            echo "self_host=$self_host"
            echo "changed_fixtures=$changed_fixtures"
          } >> "$GITHUB_OUTPUT"
          cat "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────
  # Proto — lint, format, breaking change check
  # ──────────────────────────────────────────────────
  proto:
    name: Proto Checks
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # needed for buf breaking against git history

      - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1
        with:
          setup_only: true

      - name: Lint
        run: buf lint proto/

      - name: Format check
        run: buf format proto/ --diff --exit-code

      - name: Breaking change check
        if: github.event_name == 'pull_request'
        run: buf breaking proto/ --against ".git#subdir=proto"

  # ──────────────────────────────────────────────────
  # Dart — analyze, format, all test suites
  # ──────────────────────────────────────────────────
  dart:
    name: Dart
    needs: changes
    # Dart + TS are coupled: the Dart compiler suite builds and shells out to
    # @ball-lang/compiler (ts/compiler), and ts tests regenerate from the Dart
    # self-host source. Run this cluster when either changed.
    if: ${{ needs.changes.outputs.dart == 'true' || needs.changes.outputs.ts == 'true' || needs.changes.outputs.infra == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable

      - name: Cache Dart pub
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('dart/**/pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-

      # Node is needed by the Dart-side TsCompiler wrapper, which
      # shells out to @ball-lang/compiler (ts/compiler/). Without the
      # dist build the wrapper throws.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ts/compiler/package-lock.json

      - name: Install dependencies
        run: cd dart && dart pub get

      - name: Install & build @ball-lang/compiler
        run: cd ts/compiler && npm ci && npm run build

      - name: Analyze
        # Strict (warnings fatal) to match release.yml's pre-release analyze —
        # otherwise a warning passes PR CI but breaks every release (a BallMap
        # `undefined_shown_name` warning silently blocked releases past v1.42.0).
        run: dart analyze dart/

      - name: Format check
        run: dart format --set-exit-if-changed dart/

      - name: Shared tests
        run: cd dart/shared && dart test

      - name: ball_protobuf tests
        run: cd dart/ball_protobuf && dart test

      - name: Editions conformance (legacy↔editions parity + feature codecs)
        run: cd dart/ball_protobuf && dart run tool/editions_conformance.dart

      - name: Engine tests
        run: cd dart/engine && dart test

      - name: Encoder tests
        run: cd dart/encoder && dart test

      - name: Compiler tests
        run: cd dart/compiler && dart test --exclude-tags slow

      - name: Resolver tests
        run: cd dart/resolver && dart test

      # The `ball` CLI version is single-sourced from pubspec.yaml (#363);
      # fail if the generated lib/version.g.dart drifted from the package.
      - name: CLI version drift check (#363)
        run: cd dart/cli && dart run tool/gen_version.dart --check

      # cli.ball.json (+ .pb) is a generated, gitignored artifact — like
      # engine.ball.json — so self-encode cli_core here. The parity gate in the
      # CLI suite below then executes the portable verbs (info/validate/tree/
      # version) on the Ball engine and asserts byte-identical output vs native.
      - name: Generate self-hosted cli.ball.json (parity-gate input)
        run: cd dart && dart run compiler/tool/gen_cli_json.dart

      # dart/cli (depends on ball_compiler/ball_encoder/ball_engine/
      # ball_resolver, tested above). `--exclude-tags network` excludes only
      # the one test that hits the real pub.dev registry (ball_add's
      # `resolve` integration test) — that stays a manual/local-only check so
      # CI never depends on external network availability; every other CLI
      # test (arg parsing, command dispatch, mock-registry resolution,
      # local-file publish/init/add) runs here for real.
      - name: CLI tests
        run: cd dart/cli && dart test --exclude-tags network

      # engine_roundtrip.dart is a generated artifact (gitignored, like its
      # engine_rt.* siblings). Regenerate it from the live engine so the parity
      # test below has its import. Runs AFTER analyze/format so the generated
      # file is never linted. --skip-analyze: the tool's own analyze pass is
      # advisory (warnings only) and would slow the step.
      - name: Regenerate round-tripped engine (self-host source)
        run: cd dart/encoder && dart run tool/roundtrip_engine.dart --skip-analyze

      - name: Self-host parity (conformance via round-tripped engine)
        run: cd dart/self_host && dart test

  # ──────────────────────────────────────────────────
  # Ball artifact freshness — every committed Ball artifact must be GENERATED
  # from its Dart source, never hand-edited. Regenerate the deterministic shared
  # artifacts and fail if any drifted from the checked-in copy. The .json (text)
  # outputs are gated; each generator writes the sibling .bin in the same run,
  # so a fresh .json implies a fresh .bin (and avoids any binary cross-platform
  # serialization nondeterminism in the gate).
  # ──────────────────────────────────────────────────
  ball-freshness:
    name: Ball Artifact Freshness
    needs: changes
    if: ${{ needs.changes.outputs.dart == 'true' || needs.changes.outputs.ts == 'true' || needs.changes.outputs.infra == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable

      - name: Cache Dart pub
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('dart/**/pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: cd dart && dart pub get

      - name: Regenerate shared Ball artifacts
        run: |
          ( cd dart/shared  && dart run bin/gen_std.dart . )
          ( cd dart/shared  && dart run bin/gen_ball_proto.dart . )
          ( cd dart/encoder && dart run bin/gen_ball_protobuf.dart ../shared )

      - name: Assert no drift
        run: |
          if ! git diff --exit-code -- \
              dart/shared/std.json \
              dart/shared/ball_proto.json \
              dart/shared/ball_protobuf.json; then
            echo "::error::A committed Ball artifact is stale. Regenerate it (see CLAUDE.md 'Build & Test' / 'Typical Feature Workflow') and commit the result — these files must never be hand-edited."
            exit 1
          fi
          echo "All shared Ball artifacts are up to date."

      # Every conformance .ball.json must be sourced from a src/<name>.dart, or
      # be an explicitly documented carve-out (tests/conformance/CARVEOUTS.md).
      - name: Assert conformance fixtures are sourced (no orphans)
        run: cd dart/encoder && dart run bin/check_conformance_sources.dart

      # FORWARD-direction completeness (the gap that hid #55): every std base
      # function the encoder can EMIT must be exercised by at least one executed
      # fixture, or be a documented carve-out
      # (tests/conformance/ENCODER_COMPLETENESS_CARVEOUTS.md).
      - name: Assert encoder completeness (no untested emittable constructs)
        run: cd dart/encoder && dart run bin/check_encoder_completeness.dart

      # A fixture's NAME must not overstate its coverage — no "false coverage"
      # like the old imperative 92_list_comprehension (which let #55 hide).
      - name: Assert fixture names match their content
        run: cd dart/encoder && dart run bin/check_fixture_names.dart

      # STRUCTURAL completeness: every Expression NODE SHAPE (the 7
      # Expression.expr types + meaningful sub-variants) must be exercised by at
      # least one executed fixture, or be a documented carve-out
      # (tests/conformance/NODE_SHAPE_COVERAGE_CARVEOUTS.md). Sibling to the
      # encoder-completeness gate above, which only gates std FUNCTIONS — this
      # closes the ungated node-shape surface (issue #64).
      - name: Assert node-shape coverage (no untested Expression shapes)
        run: cd dart/encoder && dart run bin/check_node_shape_coverage.dart

      # Every conformance .ball.json must be a fresh generator output, never
      # hand-edited. Regenerate from src and fail on drift.
      - name: Regenerate conformance corpus
        run: cd dart/encoder && dart run bin/generate_conformance.dart

      - name: Assert conformance corpus is up to date
        run: |
          if ! git diff --exit-code -- 'tests/conformance/*.ball.json'; then
            echo "::error::A conformance .ball.json is stale. Regenerate with 'cd dart/encoder && dart run bin/generate_conformance.dart' and commit — these files must never be hand-edited (see tests/conformance/CARVEOUTS.md for the only exceptions)."
            exit 1
          fi
          echo "Conformance corpus is up to date."

      # The std base-function coverage inventory (std_coverage.json +
      # STD_COVERAGE.md) is generated FROM the buildStd*Module() builders and
      # the committed conformance fixtures, so it silently rots as std*.dart and
      # the corpus evolve (issue #172). Regenerate and fail on drift — same
      # generate-and-diff contract as the artifacts above. Runs last so it reads
      # the fixtures the corpus step just confirmed fresh.
      - name: Regenerate std coverage inventory
        run: cd dart/encoder && dart run bin/gen_std_coverage.dart

      - name: Assert std coverage inventory is up to date
        run: |
          if ! git diff --exit-code -- \
              tests/conformance/std_coverage.json \
              tests/conformance/STD_COVERAGE.md; then
            echo "::error::The std coverage inventory is stale. Regenerate with 'cd dart/encoder && dart run bin/gen_std_coverage.dart' and commit — these files are generated (issue #172), never hand-edited."
            exit 1
          fi
          echo "Std coverage inventory is up to date."

  # ──────────────────────────────────────────────────
  # Protobuf Codegen — the protoc-gen-ball / -connect / -grpc plugins
  # (dart/ball_protobuf_gen) + the transport runtime (dart/ball_rpc).
  # Each package is analyzed and tested FROM ITS OWN PACKAGE DIRECTORY
  # (the canonical invocation), after a single workspace `dart pub get`.
  # No Node is needed: these packages never shell out to the TS compiler.
  # ──────────────────────────────────────────────────
  protobuf-codegen:
    name: Protobuf Codegen (gen + rpc)
    needs: changes
    if: ${{ needs.changes.outputs.dart == 'true' || needs.changes.outputs.ts == 'true' || needs.changes.outputs.infra == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable

      - name: Cache Dart pub
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('dart/**/pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: cd dart && dart pub get

      # ball_protobuf_gen — protoc-gen-ball / -connect / -grpc plugins
      - name: Analyze ball_protobuf_gen
        run: cd dart/ball_protobuf_gen && dart analyze
      - name: Test ball_protobuf_gen
        run: cd dart/ball_protobuf_gen && dart test

      # ball_rpc — Connect + gRPC transport runtime
      - name: Analyze ball_rpc
        run: cd dart/ball_rpc && dart analyze
      - name: Test ball_rpc
        run: cd dart/ball_rpc && dart test

  # ──────────────────────────────────────────────────
  # C++ — build + test on all platforms
  # ──────────────────────────────────────────────────
  cpp:
    name: C++ (${{ matrix.os }})
    needs: changes
    # C++ is build-isolated (does not build from dart/ or ts/). #18 Stage 5: it
    # no longer FetchContents Google protobuf — the build is now libprotobuf-free
    # (nlohmann/json only), so configure + build are dramatically faster. Skip
    # the whole 3-OS matrix when nothing under cpp/ (or proto/, or this workflow)
    # changed.
    if: ${{ needs.changes.outputs.cpp == 'true' || needs.changes.outputs.infra == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1
        with:
          setup_only: true

      # Compiler cache to speed rebuilds. #18 Stage 5 removed the FetchContent
      # protobuf+abseil build (the former dominant cost), but ccache still helps
      # the heavy ball_protobuf_rt.h TU + the compiler's ~12k-line TU. ccache on
      # Linux/macOS, sccache on Windows (MSVC).
      - name: ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: cpp-${{ matrix.os }}
          variant: ${{ runner.os == 'Windows' && 'sccache' || 'ccache' }}
          max-size: 1G

      - name: Install nlohmann-json (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y nlohmann-json3-dev

      - name: Install nlohmann-json (macOS)
        if: runner.os == 'macOS'
        run: brew install nlohmann-json

      # Windows: nlohmann-json is fetched by CMake FetchContent

      # -DBALL_BUILD_PROTOBUF_RT=ON builds Ball's own compiled protobuf runtime
      # (cpp/shared/ball_protobuf_rt.h) plus a smoke driver that round-trips
      # real values through it, as a standalone, dependency-free proof target —
      # the #18 canary that it keeps building AND working under the toolchain.
      # It links no libprotobuf/abseil, so it adds negligible time next to the
      # FetchContent protobuf build this job already pays for. Enabled on Linux
      # (g++) only for now: that's the toolchain the target has been verified
      # against; extend to macOS (AppleClang) / Windows (MSVC) once each is
      # confirmed green — a broken canary must never take the whole job red.
      - name: Configure CMake
        run: cmake -S cpp -B cpp/build -DCMAKE_BUILD_TYPE=Release ${{ runner.os == 'Linux' && '-DBALL_BUILD_PROTOBUF_RT=ON' || '' }} -DCMAKE_C_COMPILER_LAUNCHER=${{ runner.os == 'Windows' && 'sccache' || 'ccache' }} -DCMAKE_CXX_COMPILER_LAUNCHER=${{ runner.os == 'Windows' && 'sccache' || 'ccache' }}

      - name: Build all targets
        run: cmake --build cpp/build --config Release

      - name: Run tests
        run: ctest --test-dir cpp/build --output-on-failure -C Release

      # Lean per-PR conformance gate for NEW/CHANGED fixtures only, on the Linux
      # leg (avoids tripling cost across the 3-OS matrix). The full-corpus
      # cpp/test/full_e2e.sh sweep (Ball IR -> native C++ via ball_cpp_compile ->
      # g++ -> run, diffed against golden output) otherwise runs ONLY on
      # push-to-main + weekly, inside conformance-matrix.yml's cpp-compiled job —
      # so a PR-introduced conformance regression on the compiled C++ leg could
      # merge green and only turn red after landing on main (this is exactly how
      # the C++ Compiled leg was red for days post-#302 before anyone noticed).
      # ball_cpp_compile is already built by the "Build all targets" step above,
      # so this adds only the marginal cost of compiling+running the changed
      # fixtures with g++ (seconds to low minutes), NOT a second CMake build.
      # `needs.changes` computed which conformance fixtures this PR added/changed
      # vs the merge-base (or the `ALL` fail-open sentinel when it couldn't
      # determine a diff base) — run full_e2e.sh against just those. See #347.
      - name: "C++ compiled e2e — new/changed fixtures only (closes main-only-leg escape class)"
        if: ${{ runner.os == 'Linux' && needs.changes.outputs.changed_fixtures != '' }}
        run: |
          if [ "${{ needs.changes.outputs.changed_fixtures }}" = "ALL" ]; then
            echo "No usable diff base upstream — running the FULL full_e2e.sh sweep."
            bash cpp/test/full_e2e.sh
          else
            echo "Running full_e2e.sh for changed fixtures: ${{ needs.changes.outputs.changed_fixtures }}"
            bash cpp/test/full_e2e.sh --fixtures "${{ needs.changes.outputs.changed_fixtures }}"
          fi

  # ──────────────────────────────────────────────────
  # Upstream protobuf conformance — drive ball_protobuf's feature-aware codecs
  # through the REAL protobuf conformance_test_runner for the proto2, proto3,
  # and edition2023 TestAllTypes messages (every registered test must pass — no
  # tolerated-failure list). POSIX-only runner (fork/pipe) → Ubuntu.
  # ──────────────────────────────────────────────────
  editions-conformance-upstream:
    name: Upstream Conformance (Editions)
    needs: changes
    # Drives ball_protobuf (Dart) through the C++ conformance_test_runner — so it
    # depends on dart/ and cpp/ (+ proto/). A TS-only PR can't affect it; skip
    # this ~45-min job there.
    if: ${{ needs.changes.outputs.dart == 'true' || needs.changes.outputs.cpp == 'true' || needs.changes.outputs.infra == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable

      - name: Cache Dart pub
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('dart/**/pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-

      # ccache makes the protobuf+abseil conformance build a near-instant
      # rebuild on warm runs (this is the slowest job in CI — 45-min budget).
      - name: ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: cpp-conformance
          max-size: 1G

      - name: Install nlohmann-json + ninja
        run: sudo apt-get update && sudo apt-get install -y nlohmann-json3-dev ninja-build

      - name: Install dependencies
        run: cd dart && dart pub get

      # Builds only the conformance_test_runner target (protobuf + abseil +
      # conformance harness). It statically links the TestAllTypes* descriptors,
      # so we need not feed it our .proto — it already knows the message types.
      # #18 Stage 5: the default ball build no longer FetchContents protobuf, so
      # building the upstream conformance_test_runner is now gated behind the
      # opt-in BALL_BUILD_UPSTREAM_CONFORMANCE option (which FetchContents
      # protobuf with protobuf_BUILD_CONFORMANCE=ON — see cpp/CMakeLists.txt).
      - name: Configure CMake (conformance runner)
        run: cmake -S cpp -B cpp/build-conformance -G Ninja -DBALL_BUILD_UPSTREAM_CONFORMANCE=ON -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      # Bounded parallelism (-j 2): an unbounded `-j` spawns dozens of protobuf's
      # huge translation units at once (command_line_interface.cc etc.) and
      # exhausts the runner's memory. Two at a time stays well under 16 GB.
      - name: Build conformance_test_runner
        run: cmake --build cpp/build-conformance --target conformance_test_runner --config Release -j 2

      # The conformance program: builds the descriptor registry (with resolved
      # editions features) from the checked-in FileDescriptorSet and drives our
      # codecs. Compiled to a native exe so the runner spawns it cheaply.
      - name: Compile the conformance program
        run: dart compile exe dart/ball_protobuf/tool/conformance_main.dart -o ball_conformance

      - name: Run upstream conformance (Editions)
        run: |
          set -euo pipefail
          runner=$(find cpp/build-conformance -name conformance_test_runner -type f | head -1)
          if [ -z "$runner" ]; then echo "::error::conformance_test_runner not built"; exit 1; fi
          echo "runner: $runner"
          # The program walks up from CWD (repo root) to find the checked-in
          # FileDescriptorSet, so it needs no args — this runner build takes the
          # test program as the final positional arg (no `--` separator). There
          # is NO tolerated-failure list: the runner exits non-zero on ANY
          # conformance failure, so ball_protobuf must pass every case.
          "$runner" --maximum_edition 2023 \
            ./ball_conformance

  # ──────────────────────────────────────────────────
  # TypeScript — build + test
  # ──────────────────────────────────────────────────
  typescript:
    name: TypeScript
    needs: changes
    if: ${{ needs.changes.outputs.dart == 'true' || needs.changes.outputs.ts == 'true' || needs.changes.outputs.infra == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable

      - name: Cache Dart pub
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('dart/**/pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            ts/engine/package-lock.json
            ts/cli/package-lock.json
            ts/compiler/package-lock.json
            ts/shared/package-lock.json

      # Dart is needed to regenerate engine.ball.json for the engine
      # self-host parse test under ts/compiler/test/engine_parse.test.ts.
      - name: Bootstrap Dart workspace
        run: cd dart && dart pub get

      # @ball-lang/shared (protobuf-es generated types; no build step)
      - name: Install @ball-lang/shared deps
        run: cd ts/shared && npm ci
      # Test @ball-lang/shared under its c8 coverage floor (issue #62) — runs
      # `npm test` plus `--check-coverage` so a regression below the measured
      # floor fails CI, not just a silent drop.
      - name: Test @ball-lang/shared (coverage-gated)
        run: cd ts/shared && npm run coverage

      # @ball-lang/engine
      - name: Install @ball-lang/engine deps
        run: cd ts/engine && npm ci
      - name: Build @ball-lang/engine
        run: cd ts/engine && npm run build
      # Coverage-gated (issue #62): `npm run coverage` runs the full `npm test`
      # (conformance corpus + hand-written unit tests) under c8, then enforces
      # the per-package floor via --check-coverage.
      - name: Test @ball-lang/engine (coverage-gated)
        run: cd ts/engine && npm run coverage

      # @ball-lang/cli (depends on the in-repo engine via file:../engine —
      # the engine build above must precede; previously the cli had NO CI
      # gate and shipped built against a stale registry engine)
      - name: Install @ball-lang/cli deps
        run: cd ts/cli && npm ci
      - name: Build @ball-lang/cli
        run: cd ts/cli && npm run build
      # Coverage-gated (issue #62): `npm run coverage` runs the full `npm test`
      # (the black-box subprocess suite in test/cli_test.ts + the dependency-free
      # capability_analyzer/capability_table unit tests) under c8.
      - name: Test @ball-lang/cli (coverage-gated)
        run: cd ts/cli && npm run coverage

      # @ball-lang/compiler (self-host TS-native compiler)
      - name: Install @ball-lang/compiler deps
        run: cd ts/compiler && npm ci
      - name: Build @ball-lang/compiler
        run: cd ts/compiler && npm run build
      # Coverage-gated (issue #62): fixtures + engine parse tests, under c8.
      - name: Test @ball-lang/compiler (fixtures + engine parse, coverage-gated)
        run: cd ts/compiler && npm run coverage

      # Lean per-PR conformance gate for NEW/CHANGED fixtures only. The full
      # ~350-fixture full_e2e.ts sweep (Ball IR -> native TS -> node, diffed
      # against golden output) runs ONLY on push-to-main, inside coverage.yml's
      # TS job -- so a PR-introduced fixture regression could merge green and
      # only turn red after landing on main (this is exactly how fixture 400
      # broke this leg and merged via #337, only caught + fixed later by
      # #345). `needs.changes` computed which conformance fixtures this PR
      # added/changed vs the merge-base (or the `ALL` fail-open sentinel, when
      # it couldn't determine a diff base at all) -- run full_e2e.ts against
      # just those, so a typical PR pays a few seconds instead of the full
      # sweep's minutes, with zero coverage gap: every fixture a PR touches is
      # proven on THIS engine before merge, not just at the next main push.
      - name: "TS compiled (direct) e2e — new/changed fixtures only (closes main-only-leg escape class)"
        if: ${{ needs.changes.outputs.changed_fixtures != '' }}
        run: |
          cd ts/compiler
          if [ "${{ needs.changes.outputs.changed_fixtures }}" = "ALL" ]; then
            echo "No usable diff base upstream — running the FULL full_e2e.ts sweep."
            node --experimental-strip-types test/full_e2e.ts
          else
            echo "Running full_e2e.ts for changed fixtures: ${{ needs.changes.outputs.changed_fixtures }}"
            node --experimental-strip-types test/full_e2e.ts --fixtures="${{ needs.changes.outputs.changed_fixtures }}"
          fi

      # @ball-lang/encoder (TypeScript → Ball)
      - name: Install @ball-lang/encoder deps
        run: cd ts/encoder && npm ci
      - name: Build @ball-lang/encoder
        run: cd ts/encoder && npm run build
      # Coverage-gated (issue #62).
      - name: Test @ball-lang/encoder (coverage-gated)
        run: cd ts/encoder && npm run coverage

  # ──────────────────────────────────────────────────
  # Rust — build + test + fmt + clippy
  # ──────────────────────────────────────────────────
  rust:
    name: Rust
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' || needs.changes.outputs.infra == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # rustup ships preinstalled on GitHub-hosted runners. `rustup show`
      # reads rust/rust-toolchain.toml (channel = stable, components =
      # rustfmt + clippy) and installs exactly that pinned toolchain; the
      # explicit component-add below is a fast, idempotent belt-and-braces
      # step in case a runner image ships a stable toolchain without them.
      - name: Install Rust toolchain
        working-directory: rust
        run: |
          rustup show
          rustup component add rustfmt clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rust

      # NOTE: the default `--workspace` build/test below leaves the ball-lang-engine
      # `self_host` feature OFF (compiled_engine.rs is a gitignored, generated
      # build artifact), so this part of the job gates only the wrapper
      # foundation. The self-hosted engine — which now COMPILES **and RUNS**
      # (issue #300: hello_world/fibonacci produce Dart-identical output) — is
      # regenerated and exercised in the dedicated step at the end of this job.
      - name: Build
        run: cd rust && cargo build --workspace

      - name: Test
        run: cd rust && cargo test --workspace

      # rustfmt walks every `mod` declaration unconditionally — unlike
      # rustc/clippy it does NOT respect the `#[cfg(feature = "self_host")]`/
      # `#[cfg(feature = "cli_core")]` gates on `pub mod compiled_engine;`
      # (rust/engine/src/lib.rs) / `pub mod compiled_cli;` (rust/cli/src/main.rs),
      # so `cargo fmt --check` errors out on a fresh checkout where those
      # gitignored, generated files (rust/.gitignore) have never been
      # regenerated. A single-newline placeholder satisfies rustfmt's module
      # walk; it is already-formatted (no diff) and never affects the real
      # default-features build/test/clippy above, which skip the modules
      # entirely via the cfg gates and never touch the files.
      - name: Placeholder for gitignored self-hosted modules (rustfmt needs the files to exist)
        run: |
          [ -f rust/engine/src/compiled_engine.rs ] || printf '\n' > rust/engine/src/compiled_engine.rs
          [ -f rust/cli/src/compiled_cli.rs ] || printf '\n' > rust/cli/src/compiled_cli.rs

      - name: Format check
        run: cd rust && cargo fmt --check

      - name: Clippy
        run: cd rust && cargo clippy --workspace --all-targets -- -D warnings

      # ── Self-hosted engine: regenerate + RUN (issue #300) ──
      # The self-hosted engine is a Ball program (dart/self_host/engine.ball.json,
      # itself gitignored) compiled through ball-lang-compiler into the gitignored
      # rust/engine/src/compiled_engine.rs. Regenerate both from source, then run
      # the acceptance programs under `--features self_host` and assert
      # Dart-identical output (hello_world -> "Hello, World!", fibonacci -> "55").
      - name: Setup Dart (for engine.ball.json/cli.ball.json regeneration)
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable
      - name: Regenerate self-hosted engine
        run: |
          dart pub get
          cd dart && dart run compiler/tool/gen_engine_json.dart
          cd ../rust && cargo run -p ball-engine-regen
      - name: Self-host run tests (Dart-identical output)
        run: cd rust && cargo test -p ball-lang-engine --features self_host --test self_host_run

      # Whole-corpus conformance sweep (#40) — drives every
      # tests/conformance/*.ball.json through the self-hosted engine and asserts
      # the canonical `Results: N passed, M failed, T total` line shows every
      # golden-having fixture passing (Dart parity). The 4 golden-less
      # resource-limit/sandbox fixtures (196/197/201/202) are behavioral
      # carve-outs the runner skips, exactly like the Dart runner.
      - name: "Self-host conformance sweep (Results: line)"
        run: |
          cd rust
          set +e
          output=$(cargo test -p ball-lang-engine --features self_host --test self_host_conformance -- --ignored --nocapture 2>&1)
          exit_code=$?
          echo "$output"
          passed=$(echo "$output" | grep -oP 'Results: \K\d+(?= passed)')
          failed=$(echo "$output" | grep -oP ', \K\d+(?= failed)')
          total=$(echo "$output" | grep -oP ', \K\d+(?= total)')
          echo ""
          echo "=== Rust Self-Host ==="
          echo "Results: ${passed:-0} passed, ${failed:-0} failed, ${total:-0} total"
          if [ "$exit_code" != "0" ] || [ "${failed:-1}" != "0" ] || [ -z "${passed}" ] || [ "${passed}" != "${total}" ]; then
            echo "::error::Rust self-host conformance is not at full parity (expected N passed == T total, 0 failed)"
            exit 1
          fi

      # ── cli-core: regenerate + golden-fixture parity gate (issue #365) ──
      # dart/shared/lib/cli_core.dart's info/validate/tree/version verbs,
      # compiled through ball-lang-compiler into the gitignored
      # rust/cli/src/compiled_cli.rs. Regenerate both from source, then build/test
      # under `--features cli_core`: `tests/cli_core_parity.rs` compares the built
      # `ball` binary's info/validate/tree output against the golden `.txt` files
      # checked into rust/cli/tests/golden/cli_core/ (generated once from the Dart
      # CLI — see that test file's module doc comment for the regen command).
      - name: Regenerate self-hosted cli-core
        run: |
          cd dart && dart run compiler/tool/gen_cli_json.dart
          cd ../rust && cargo run -p ball-cli-regen
      - name: cli-core build + clippy + golden-parity tests
        run: |
          cd rust
          cargo build -p ball-lang-cli --features cli_core
          cargo clippy -p ball-lang-cli --all-targets --features cli_core -- -D warnings
          cargo test -p ball-lang-cli --features cli_core

  # ──────────────────────────────────────────────────
  # C# — build + test + format + self-hosted engine conformance
  # ──────────────────────────────────────────────────
  csharp:
    name: C#
    needs: changes
    if: ${{ needs.changes.outputs.csharp == 'true' || needs.changes.outputs.infra == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # .NET 10 is the current LTS (verified to 2028-11-14); "10.0.x" resolves
      # the latest 10.0 patch, matching csharp/global.json's own
      # rollForward: latestFeature contract (minimum SDK 10.0.100).
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('csharp/Directory.Packages.props', 'csharp/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build
        run: dotnet build csharp/Ball.slnx

      - name: Test
        run: dotnet test csharp/Ball.slnx

      - name: Format check
        run: dotnet format csharp/Ball.slnx --verify-no-changes

      # ── Self-hosted engine: regenerate + RUN (issue #383/#384) ──
      # The self-hosted engine is a Ball program (dart/self_host/engine.ball.pb)
      # compiled through the Phase-4 Ball -> C# compiler into the gitignored
      # csharp/engine/src/CompiledEngine.cs. Regenerate both from source, then
      # build + run the Phase-7 conformance harness's engine leg under
      # -p:SelfHost=true and assert Dart parity — the exact regen chain and
      # division of responsibility documented in csharp/AGENTS.md's
      # "Self-hosted engine" and "Conformance harness" -> "Regen seam for CI"
      # sections, mirroring the rust job's identical regen-then-run shape.
      - name: Setup Dart (for engine.ball.pb regeneration)
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable

      # compile_engine_cpp.dart writes dart/self_host/engine.ball.pb BEFORE it
      # tries (and, with no C++ compiler built in this job, fails) to emit C++
      # — the trailing failure is expected and harmless here; only the .pb
      # matters (see csharp/AGENTS.md's "Build & Test"). gen_engine_json.dart
      # alone only writes the JSON, which exceeds System.Text.Json's default
      # depth limit for this program, so the .pb must be materialized instead.
      - name: Regenerate engine.ball.pb
        run: |
          dart pub get
          cd dart
          dart run compiler/tool/compile_engine_cpp.dart || true
          test -f self_host/engine.ball.pb

      - name: Regenerate CompiledEngine.cs
        run: dotnet run --project csharp/engine/tool/Ball.Engine.Regen.csproj

      - name: Build self-hosted engine conformance harness
        run: dotnet build csharp/engine/conformance/Ball.Engine.Conformance.csproj -c Release -p:SelfHost=true

      # Whole-corpus conformance sweep (#384) — drives every
      # tests/conformance/*.ball.json through the self-hosted C# engine and
      # asserts the canonical `Results: N passed, M failed, T total` line shows
      # every golden-having fixture passing (Dart parity). Currently
      # "Results: 320 passed, 0 failed, 320 total (4 skipped carve-outs)" — the
      # 4 golden-less resource-limit/sandbox fixtures are behavioral carve-outs
      # the runner skips, exactly like the Dart/Rust runners. Parity-checked
      # (passed == total, failed == 0) rather than a hardcoded count, mirroring
      # the rust job's identical gate, so the corpus can grow without editing
      # this workflow.
      - name: "Self-host conformance sweep (Results: line)"
        run: |
          cd csharp
          set +e
          output=$(dotnet run --project engine/conformance/Ball.Engine.Conformance.csproj -c Release -p:SelfHost=true --no-build -- --leg=engine 2>&1)
          exit_code=$?
          echo "$output"
          passed=$(echo "$output" | grep -oP 'Results: \K\d+(?= passed)')
          failed=$(echo "$output" | grep -oP ', \K\d+(?= failed)')
          total=$(echo "$output" | grep -oP ', \K\d+(?= total)')
          echo ""
          echo "=== C# Self-Host ==="
          echo "Results: ${passed:-0} passed, ${failed:-0} failed, ${total:-0} total"
          if [ "$exit_code" != "0" ] || [ "${failed:-1}" != "0" ] || [ -z "${passed}" ] || [ "${passed}" != "${total}" ]; then
            echo "::error::C# self-host conformance is not at full parity (expected N passed == T total, 0 failed)"
            exit 1
          fi

  # ──────────────────────────────────────────────────
  # Go — build + vet + gofmt + test + self-hosted engine conformance
  # ──────────────────────────────────────────────────
  go:
    name: Go
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' || needs.changes.outputs.infra == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # go.mod pins `go 1.23`; the tree is authored/gofmt'd with the 1.25 line
      # (go1.25.x resolves the latest 1.25 patch). setup-go's built-in cache keys
      # on the committed go.sum files (runtime is stdlib-only, so it has none).
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.25.x"
          cache-dependency-path: |
            go/compiler/go.sum
            go/encoder/go.sum
            go/engine/go.sum
            go/shared/go.sum

      # The five modules are tied by go/go.work. The workspace-root `./...`
      # pattern isn't valid (go/ is not itself a module), so each build/vet/test
      # enumerates the module subdirs explicitly. The engine's self-host artifact
      # (compiled/compiled_engine.go) is gitignored + `//go:build selfhost`-gated,
      # so a default (no-tag) build stays green on the wrapper foundation alone.
      - name: Build
        run: cd go && go build ./compiler/... ./encoder/... ./engine/... ./runtime/... ./shared/...

      - name: Vet
        run: cd go && go vet ./compiler/... ./encoder/... ./engine/... ./runtime/... ./shared/...

      - name: Format check
        run: |
          cd go
          unformatted=$(gofmt -l compiler encoder engine runtime shared)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted Go files — run 'gofmt -w' and commit:"
            echo "$unformatted"
            exit 1
          fi
          echo "All Go sources are gofmt-clean."

      - name: Test
        run: cd go && go test ./compiler/... ./encoder/... ./engine/... ./runtime/... ./shared/...

      # ── Self-hosted engine: regenerate + RUN (epic #426 Phase 4) ──
      # The self-hosted engine is a Ball program (dart/self_host/engine.ball.json,
      # itself gitignored) compiled through go/compiler into the gitignored
      # go/engine/compiled/compiled_engine.go. Regenerate both from source, then
      # run the whole conformance corpus under `-tags selfhost` and assert Dart
      # parity — the identical regen-then-run shape as the rust/csharp jobs (see
      # go/engine/AGENTS.md's "Regenerate + run").
      - name: Setup Dart (for engine.ball.json regeneration)
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable

      # gen_engine_json.dart writes dart/self_host/engine.ball.json; cmd/regen
      # reads it (it prefers engine.ball.pb, absent here, and falls back to the
      # JSON) and compiles it into compiled/compiled_engine.go.
      - name: Regenerate self-hosted engine
        run: |
          dart pub get
          cd dart && dart run compiler/tool/gen_engine_json.dart
          cd ../go/engine && go run ./cmd/regen

      # Whole-corpus conformance sweep — drives every tests/conformance/*.ball.json
      # through the self-hosted Go engine and asserts the canonical
      # `Results: N passed, M failed, T total` line shows every golden-having
      # fixture passing (Dart parity). Currently
      # "Results: 320 passed, 0 failed, 320 total (4 skipped carve-outs)" — the 4
      # golden-less resource-limit/sandbox fixtures are behavioral carve-outs the
      # runner skips, exactly like the Dart/Rust/C# runners. Parity-checked
      # (passed == total, failed == 0) rather than a hardcoded count. `-v` is
      # REQUIRED: without it `go test` caches and discards a passing test's stdout,
      # so the `Results:` line (a plain fmt.Printf) would never reach the log.
      - name: "Self-host conformance sweep (Results: line)"
        run: |
          cd go/engine
          set +e
          output=$(go test -v -tags selfhost -run TestConformance -timeout 3600s ./conformance/ 2>&1)
          exit_code=$?
          echo "$output"
          passed=$(echo "$output" | grep -oP 'Results: \K\d+(?= passed)')
          failed=$(echo "$output" | grep -oP ', \K\d+(?= failed)')
          total=$(echo "$output" | grep -oP ', \K\d+(?= total)')
          echo ""
          echo "=== Go Self-Host ==="
          echo "Results: ${passed:-0} passed, ${failed:-0} failed, ${total:-0} total"
          if [ "$exit_code" != "0" ] || [ "${failed:-1}" != "0" ] || [ -z "${passed}" ] || [ "${passed}" != "${total}" ]; then
            echo "::error::Go self-host conformance is not at full parity (expected N passed == T total, 0 failed)"
            exit 1
          fi

