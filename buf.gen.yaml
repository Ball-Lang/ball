version: v2

clean: true

managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/ball-lang/ball/go/shared/gen

plugins:
  - remote: buf.build/protocolbuffers/dart:v25.0.0
    out: dart/shared/lib/gen
    include_imports: true
    include_wkt: true

  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: go/shared/gen
    opt: paths=source_relative

  - remote: buf.build/protocolbuffers/python:v35.1
    out: python/shared/gen

  - remote: buf.build/bufbuild/es:v2.12.1
    out: ts/shared/gen

  - remote: buf.build/protocolbuffers/java:v35.1
    out: java/shared/gen

  # cpp is pinned to v34.1 (not latest) to match cpp/CMakeLists' FetchContent
  # protobuf v34.1 runtime — 35.1 gencode + 34.1 runtime is a hard #error
  # (issue #333; the real fix is #18's protobuf cutover).
  - remote: buf.build/protocolbuffers/cpp:v34.1
    out: cpp/shared/gen

  - remote: buf.build/protocolbuffers/csharp:v35.1
    out: csharp/shared/gen

  - remote: buf.build/community/neoeinstein-prost:v0.4.0
    out: rust/shared/gen
    include_imports: true
    include_wkt: true
    opt:
      - compile_well_known_types=true
      - file_descriptor_set=true
