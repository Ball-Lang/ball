                echo "::error::Could not parse a clean integer count from the Results line (got '$v'). Refusing to report a number this gate cannot trust."
                exit 1;;
            esac
          done
          passed=${passed:-0}; failed=${failed:-0}; total=${total:-0}

          echo "passed=$passed" >> "$GITHUB_OUTPUT"
          echo "failed=$failed" >> "$GITHUB_OUTPUT"
          echo "total=$total"   >> "$GITHUB_OUTPUT"
          echo "floor=$RUST_COMPILER_FLOOR" >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== Rust Compiler Leg ==="
          echo "Results: $passed passed, $failed failed, $total total (floor: $RUST_COMPILER_FLOOR)"

          # A harness that printed nothing must never read as a silent pass
