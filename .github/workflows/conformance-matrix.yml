name: Conformance Matrix

on:
  push:
    branches: [main]
    paths:
      - "tests/conformance/**"
      - "dart/engine/**"
      - "dart/shared/**"
      - "dart/compiler/**"
      - "ts/engine/**"
      - "ts/compiler/**"
      - "ts/shared/**"
      - "cpp/**"
      - "rust/**"
      - "csharp/**"
      - "go/**"
      - "dart/self_host/**"
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 06:00 UTC
  workflow_dispatch:

# Least-privilege: read-only token (conformance runs build + execute only).
permissions:
  contents: read

concurrency:
  group: conformance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────
  # Dart engine (reference implementation)
  # ──────────────────────────────────────────────────
  dart-engine:
    name: Dart Engine
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable

      - name: Install dependencies
        run: cd dart && dart pub get

      - name: Run conformance tests
        id: conformance
        run: |
          cd dart/engine
          set +e
          output=$(dart test test/conformance_test.dart 2>&1)
          exit_code=$?
          echo "$output"

          # Parse pass/fail from dart test output
          passed=$(echo "$output" | grep -oP '^\+(\d+)' | tail -1 | grep -oP '\d+' || echo "0")
          # Dart test prints "+N -M" for failures or "+N" for all pass
          failed=$(echo "$output" | grep -oP '~?-(\d+)' | tail -1 | grep -oP '\d+' || echo "0")

          # Fallback: count from "All tests passed" or the summary line
          if echo "$output" | grep -q "All tests passed"; then
            total=$(echo "$output" | grep -oP '\+(\d+)' | tail -1 | grep -oP '\d+')
            passed="$total"
            failed="0"
          fi

          total=$((passed + failed))
          echo "passed=$passed" >> "$GITHUB_OUTPUT"
          echo "failed=$failed" >> "$GITHUB_OUTPUT"
          echo "total=$total" >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== Dart Engine ==="
          echo "Results: $passed passed, $failed failed, $total total"

          # Fail on a non-zero runner exit OR any parsed test failure (F-CM-1).
          if [ "$exit_code" -ne 0 ] || [ "${failed:-0}" -gt 0 ]; then
            echo "::error::Dart Engine conformance failed (exit=$exit_code, failed=${failed:-0})"
            exit 1
          fi
          exit 0

    outputs:
      passed: ${{ steps.conformance.outputs.passed }}
      failed: ${{ steps.conformance.outputs.failed }}
      total: ${{ steps.conformance.outputs.total }}

  # ──────────────────────────────────────────────────
  # TypeScript self-hosted engine (compiled from Ball)
  # ──────────────────────────────────────────────────
  ts-engine:
    name: TS Self-Hosted Engine
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ts/engine/package-lock.json

      - name: Install dependencies
        run: cd ts/engine && npm ci

      - name: Build
        run: cd ts/engine && npm run build

      - name: Run conformance tests
        id: conformance
        run: |
          cd ts/engine
          set +e
          output=$(node --experimental-strip-types test/engine_test.ts 2>&1)
          exit_code=$?
          echo "$output"

          # The TS engine prints: "Results: N passed, M failed, T total"
          passed=$(echo "$output" | grep -oP 'Results: \K\d+(?= passed)')
          failed=$(echo "$output" | grep -oP ', \K\d+(?= failed)')
          total=$(echo "$output" | grep -oP ', \K\d+(?= total)')

          echo "passed=${passed:-0}" >> "$GITHUB_OUTPUT"
          echo "failed=${failed:-0}" >> "$GITHUB_OUTPUT"
          echo "total=${total:-0}" >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== TS Self-Hosted Engine ==="
          echo "Results: ${passed:-0} passed, ${failed:-0} failed, ${total:-0} total"

          # Fail on a non-zero runner exit OR any parsed test failure (F-CM-1).
          if [ "$exit_code" -ne 0 ] || [ "${failed:-0}" -gt 0 ]; then
            echo "::error::TS Self-Hosted Engine conformance failed (exit=$exit_code, failed=${failed:-0})"
            exit 1
          fi
          exit 0

    outputs:
      passed: ${{ steps.conformance.outputs.passed }}
      failed: ${{ steps.conformance.outputs.failed }}
      total: ${{ steps.conformance.outputs.total }}

  # ──────────────────────────────────────────────────
  # TS compiled engine (self-hosted Ball engine compiled to TS)
  # ──────────────────────────────────────────────────
  ts-compiled-engine:
    name: TS Compiled Engine
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ts/compiler/package-lock.json

      - name: Install dependencies
        run: cd ts/compiler && npm ci

      - name: Build
        run: cd ts/compiler && npm run build

      - name: Run conformance tests
        id: conformance
        run: |
          cd ts/compiler
          set +e
          output=$(node --experimental-strip-types --test test/engine_runtime.test.ts 2>&1)
          exit_code=$?
          echo "$output"

          # node --test prints: "# pass N" and "# fail N" and "# tests N"
          passed=$(echo "$output" | grep -oP '^# pass \K\d+' || echo "0")
          failed=$(echo "$output" | grep -oP '^# fail \K\d+' || echo "0")
          total=$(echo "$output" | grep -oP '^# tests \K\d+' || echo "0")

          echo "passed=${passed:-0}" >> "$GITHUB_OUTPUT"
          echo "failed=${failed:-0}" >> "$GITHUB_OUTPUT"
          echo "total=${total:-0}" >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== TS Compiled Engine ==="
          echo "Results: ${passed:-0} passed, ${failed:-0} failed, ${total:-0} total"

          # Fail on a non-zero runner exit OR any parsed test failure (F-CM-1).
          if [ "$exit_code" -ne 0 ] || [ "${failed:-0}" -gt 0 ]; then
            echo "::error::TS Compiled Engine conformance failed (exit=$exit_code, failed=${failed:-0})"
            exit 1
          fi
          exit 0

    outputs:
      passed: ${{ steps.conformance.outputs.passed }}
      failed: ${{ steps.conformance.outputs.failed }}
      total: ${{ steps.conformance.outputs.total }}

  # ──────────────────────────────────────────────────
  # TS compiled (direct): Ball → TS compiler → node, per fixture (#210)
  # ──────────────────────────────────────────────────
  ts-compiled-direct:
    name: TS Compiled (Direct)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ts/compiler/package-lock.json

      - name: Install dependencies
        run: cd ts/compiler && npm ci

      - name: Build
        run: cd ts/compiler && npm run build

      - name: Run TS compiler e2e conformance
        id: conformance
        run: |
          cd ts/compiler
          set +e
          output=$(node --experimental-strip-types test/full_e2e.ts 2>&1)
          exit_code=$?
          echo "$output"

          # Parse "Results: N passed, M failed, T total" line (N/M/T exclude
          # the fixed-size carve-out list; a carve-out that starts passing or
          # a non-carved-out regression both make full_e2e.ts exit non-zero).
          passed=$(echo "$output" | grep -oP 'Results: \K\d+(?= passed)')
          failed=$(echo "$output" | grep -oP ', \K\d+(?= failed)')
          total=$(echo "$output" | grep -oP ', \K\d+(?= total)')

          echo "passed=${passed:-0}" >> "$GITHUB_OUTPUT"
          echo "failed=${failed:-0}" >> "$GITHUB_OUTPUT"
          echo "total=${total:-0}" >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== TS Compiled (Direct) ==="
          echo "Results: ${passed:-0} passed, ${failed:-0} failed, ${total:-0} total"

          # Fail on a non-zero runner exit OR any parsed test failure (F-CM-1).
          if [ "$exit_code" -ne 0 ] || [ "${failed:-0}" -gt 0 ]; then
            echo "::error::TS Compiled (Direct) conformance failed (exit=$exit_code, failed=${failed:-0})"
            exit 1
          fi
          exit 0

    outputs:
      passed: ${{ steps.conformance.outputs.passed }}
      failed: ${{ steps.conformance.outputs.failed }}
      total: ${{ steps.conformance.outputs.total }}

  # ──────────────────────────────────────────────────
  # C++ compiled engine (Ball → C++ → g++ → run)
  # ──────────────────────────────────────────────────
  cpp-compiled:
    name: C++ Compiled
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # #18 Stage 5: the C++ build is libprotobuf-free — no protobuf to install
      # or FetchContent. The only external dep is nlohmann/json, which CMake
      # FetchContents when it isn't found on the system (same as ci.yml's build).

      - name: ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: cpp-compiled-matrix
          max-size: 1G

      - name: Install ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Configure CMake
        run: cmake -S cpp -B cpp/build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build Ball→C++ compiler
        run: cmake --build cpp/build --config Release --target ball_cpp_compile -j$(nproc)

      - name: Run C++ e2e conformance
        id: conformance
        run: |
          set +e
          output=$(bash cpp/test/full_e2e.sh 2>&1)
          exit_code=$?
          echo "$output"

          # Parse "Results: N passed, M failed, T total" line
          passed=$(echo "$output" | grep -oP 'Results: \K\d+(?= passed)')
          failed=$(echo "$output" | grep -oP ', \K\d+(?= failed)')
          total=$(echo "$output" | grep -oP ', \K\d+(?= total)')

          echo "passed=${passed:-0}" >> "$GITHUB_OUTPUT"
          echo "failed=${failed:-0}" >> "$GITHUB_OUTPUT"
          echo "total=${total:-0}" >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== C++ Compiled ==="
          echo "Results: ${passed:-0} passed, ${failed:-0} failed, ${total:-0} total"

          # Fail on a non-zero runner exit OR any parsed test failure (F-CM-1).
          if [ "$exit_code" -ne 0 ] || [ "${failed:-0}" -gt 0 ]; then
            echo "::error::C++ Compiled conformance failed (exit=$exit_code, failed=${failed:-0})"
            exit 1
          fi
          exit 0

    outputs:
      passed: ${{ steps.conformance.outputs.passed }}
      failed: ${{ steps.conformance.outputs.failed }}
      total: ${{ steps.conformance.outputs.total }}

  # ──────────────────────────────────────────────────
  # Rust self-hosted engine (Ball → Rust → cargo → run)
  # ──────────────────────────────────────────────────
  rust-engine:
    name: Rust Self-Hosted Engine
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # rustup ships preinstalled; `rustup show` installs the pinned toolchain
      # from rust/rust-toolchain.toml.
      - name: Install Rust toolchain
        working-directory: rust
        run: rustup show

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rust

      # The self-hosted engine is a Ball program compiled through ball-lang-compiler,
      # so regenerate engine.ball.json (Dart) then compiled_engine.rs first.
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable

      - name: Regenerate self-hosted engine
        run: |
          dart pub get
          cd dart && dart run compiler/tool/gen_engine_json.dart
          cd ../rust && cargo run -p ball-engine-regen

      - name: Run conformance tests
        id: conformance
        run: |
          cd rust
          set +e
          output=$(cargo test -p ball-lang-engine --features self_host --test self_host_conformance -- --ignored --nocapture 2>&1)
          exit_code=$?
          echo "$output"

          # Parse "Results: N passed, M failed, T total" line. T is the
          # golden-having (executed) fixture count — the 4 golden-less
          # resource-limit/sandbox fixtures (196/197/201/202) are behavioral
          # carve-outs the runner skips, exactly like the Dart runner.
          passed=$(echo "$output" | grep -oP 'Results: \K\d+(?= passed)')
          failed=$(echo "$output" | grep -oP ', \K\d+(?= failed)')
          total=$(echo "$output" | grep -oP ', \K\d+(?= total)')

          echo "passed=${passed:-0}" >> "$GITHUB_OUTPUT"
          echo "failed=${failed:-0}" >> "$GITHUB_OUTPUT"
          echo "total=${total:-0}" >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== Rust Self-Hosted Engine ==="
          echo "Results: ${passed:-0} passed, ${failed:-0} failed, ${total:-0} total"

          # Fail on a non-zero runner exit OR any parsed test failure (F-CM-1).
          if [ "$exit_code" -ne 0 ] || [ "${failed:-0}" -gt 0 ]; then
            echo "::error::Rust Self-Hosted Engine conformance failed (exit=$exit_code, failed=${failed:-0})"
            exit 1
          fi
          exit 0

    outputs:
      passed: ${{ steps.conformance.outputs.passed }}
      failed: ${{ steps.conformance.outputs.failed }}
      total: ${{ steps.conformance.outputs.total }}

  # ──────────────────────────────────────────────────
  # C# self-hosted engine (Ball → C# → dotnet → run)
  # ──────────────────────────────────────────────────
  csharp-engine:
    name: C# Self-Hosted Engine
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "10.0.x"

      # The self-hosted engine is a Ball program compiled through the Phase-4
      # Ball -> C# compiler, so regenerate engine.ball.pb (Dart) then
      # CompiledEngine.cs (Ball.Engine.Regen) first — same two-step regen chain
      # as ci.yml's csharp job (see csharp/AGENTS.md "Self-hosted engine" +
      # "Conformance harness" -> "Regen seam for CI").
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable

      - name: Regenerate self-hosted engine
        run: |
          dart pub get
          cd dart
          dart run compiler/tool/compile_engine_cpp.dart || true
          test -f self_host/engine.ball.pb
          cd ../csharp
          dotnet run --project engine/tool/Ball.Engine.Regen.csproj

      - name: Build self-hosted engine conformance harness
        run: dotnet build csharp/engine/conformance/Ball.Engine.Conformance.csproj -c Release -p:SelfHost=true

      - name: Run conformance tests
        id: conformance
        run: |
          cd csharp
          set +e
          output=$(dotnet run --project engine/conformance/Ball.Engine.Conformance.csproj -c Release -p:SelfHost=true --no-build -- --leg=engine 2>&1)
          exit_code=$?
          echo "$output"

          # Parse "Results: N passed, M failed, T total" line. T is the
          # golden-having (executed) fixture count — the 4 golden-less
          # resource-limit/sandbox fixtures are behavioral carve-outs the
          # runner skips, exactly like the Dart/Rust runners.
          passed=$(echo "$output" | grep -oP 'Results: \K\d+(?= passed)')
          failed=$(echo "$output" | grep -oP ', \K\d+(?= failed)')
          total=$(echo "$output" | grep -oP ', \K\d+(?= total)')

          echo "passed=${passed:-0}" >> "$GITHUB_OUTPUT"
          echo "failed=${failed:-0}" >> "$GITHUB_OUTPUT"
          echo "total=${total:-0}" >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== C# Self-Hosted Engine ==="
          echo "Results: ${passed:-0} passed, ${failed:-0} failed, ${total:-0} total"

          # Fail on a non-zero runner exit OR any parsed test failure (F-CM-1).
          if [ "$exit_code" -ne 0 ] || [ "${failed:-0}" -gt 0 ]; then
            echo "::error::C# Self-Hosted Engine conformance failed (exit=$exit_code, failed=${failed:-0})"
            exit 1
          fi
          exit 0

    outputs:
      passed: ${{ steps.conformance.outputs.passed }}
      failed: ${{ steps.conformance.outputs.failed }}
      total: ${{ steps.conformance.outputs.total }}

  # ──────────────────────────────────────────────────
  # Go self-hosted engine (Ball → Go → go test → run)
  # ──────────────────────────────────────────────────
  go-engine:
    name: Go Self-Hosted Engine
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.25.x"
          cache-dependency-path: |
            go/compiler/go.sum
            go/encoder/go.sum
            go/engine/go.sum
            go/shared/go.sum

      # The self-hosted engine is a Ball program compiled through go/compiler, so
      # regenerate engine.ball.json (Dart) then compiled_engine.go (cmd/regen)
      # first — same regen chain as ci.yml's go job (see go/engine/AGENTS.md).
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable

      - name: Regenerate self-hosted engine
        run: |
          dart pub get
          cd dart && dart run compiler/tool/gen_engine_json.dart
          cd ../go/engine && go run ./cmd/regen

      - name: Run conformance tests
        id: conformance
        run: |
          cd go/engine
          set +e
          # `-v` is REQUIRED: `go test` caches and discards a passing test's
          # stdout, so the `Results:` line (a plain fmt.Printf) would never reach
          # the log without it.
          output=$(go test -v -tags selfhost -run TestConformance -timeout 3600s ./conformance/ 2>&1)
          exit_code=$?
          echo "$output"

          # Parse "Results: N passed, M failed, T total" line. T is the
          # golden-having (executed) fixture count — the 4 golden-less
          # resource-limit/sandbox fixtures are behavioral carve-outs the
          # runner skips, exactly like the Dart/Rust/C# runners.
          passed=$(echo "$output" | grep -oP 'Results: \K\d+(?= passed)')
          failed=$(echo "$output" | grep -oP ', \K\d+(?= failed)')
          total=$(echo "$output" | grep -oP ', \K\d+(?= total)')

          echo "passed=${passed:-0}" >> "$GITHUB_OUTPUT"
          echo "failed=${failed:-0}" >> "$GITHUB_OUTPUT"
          echo "total=${total:-0}" >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== Go Self-Hosted Engine ==="
          echo "Results: ${passed:-0} passed, ${failed:-0} failed, ${total:-0} total"

          # Fail on a non-zero runner exit OR any parsed test failure (F-CM-1).
          if [ "$exit_code" -ne 0 ] || [ "${failed:-0}" -gt 0 ]; then
            echo "::error::Go Self-Hosted Engine conformance failed (exit=$exit_code, failed=${failed:-0})"
            exit 1
          fi
          exit 0

    outputs:
      passed: ${{ steps.conformance.outputs.passed }}
      failed: ${{ steps.conformance.outputs.failed }}
      total: ${{ steps.conformance.outputs.total }}

  # ──────────────────────────────────────────────────
  # NEW LANGUAGE ENGINE TEMPLATE — copy and customize
  # ──────────────────────────────────────────────────
  # <lang>-engine:
  #   name: <Lang> Engine
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
  #
  #     - name: Setup <Lang>
  #       uses: <official-setup-action>
  #       with:
  #         <lang>-version: <stable>
  #
  #     - name: Install & build
  #       run: |
  #         <install-and-build-commands>
  #
  #     - name: Run conformance tests
  #       id: conformance
  #       run: |
  #         set +e
  #         output=$(<conformance-test-command> 2>&1)
  #         exit_code=$?
  #         echo "$output"
  #
  #         # Parse "Results: N passed, M failed, T total" line
  #         passed=$(echo "$output" | grep -oP 'Results: \K\d+(?= passed)')
  #         failed=$(echo "$output" | grep -oP ', \K\d+(?= failed)')
  #         total=$(echo "$output" | grep -oP ', \K\d+(?= total)')
  #
  #         echo "passed=${passed:-0}" >> "$GITHUB_OUTPUT"
  #         echo "failed=${failed:-0}" >> "$GITHUB_OUTPUT"
  #         echo "total=${total:-0}" >> "$GITHUB_OUTPUT"
  #
  #         echo ""
  #         echo "=== <Lang> Engine ==="
  #         echo "Results: ${passed:-0} passed, ${failed:-0} failed, ${total:-0} total"
  #
  #         # Fail on a non-zero runner exit OR any parsed test failure (F-CM-1).
  #         if [ "$exit_code" -ne 0 ] || [ "${failed:-0}" -gt 0 ]; then
  #           echo "::error::<Lang> Engine conformance failed (exit=$exit_code, failed=${failed:-0})"
  #           exit 1
  #         fi
  #         exit 0
  #
  #   outputs:
  #     passed: ${{ steps.conformance.outputs.passed }}
  #     failed: ${{ steps.conformance.outputs.failed }}
  #     total: ${{ steps.conformance.outputs.total }}
  #
  # Then add to the summary job:
  #   1. Add "<lang>-engine" to the needs: array
  #   2. Add a print_row call for the new engine
  #   3. Add a failure check in the exit-code block

  # ──────────────────────────────────────────────────
  # Summary — parity matrix across all engines
  # ──────────────────────────────────────────────────
  summary:
    name: Parity Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: always()
    needs: [dart-engine, ts-engine, ts-compiled-engine, ts-compiled-direct, cpp-compiled, rust-engine, csharp-engine, go-engine]
    steps:
      - name: Print conformance matrix
        run: |
          echo "╔══════════════════════════════╦════════╦════════╦════════╦════════╗"
          echo "║ Engine                       ║ Passed ║ Failed ║ Total  ║ Status ║"
          echo "╠══════════════════════════════╬════════╬════════╬════════╬════════╣"

          print_row() {
            local name="$1" passed="$2" failed="$3" total="$4" result="$5"
            local status="PASS"
            if [ "$result" != "success" ]; then
              status="FAIL"
            fi
            printf "║ %-28s ║ %6s ║ %6s ║ %6s ║ %-6s ║\n" \
              "$name" "${passed:-?}" "${failed:-?}" "${total:-?}" "$status"
          }

          print_row "Dart Engine (reference)" \
            "${{ needs.dart-engine.outputs.passed }}" \
            "${{ needs.dart-engine.outputs.failed }}" \
            "${{ needs.dart-engine.outputs.total }}" \
            "${{ needs.dart-engine.result }}"

          print_row "TS Self-Hosted Engine" \
            "${{ needs.ts-engine.outputs.passed }}" \
            "${{ needs.ts-engine.outputs.failed }}" \
            "${{ needs.ts-engine.outputs.total }}" \
            "${{ needs.ts-engine.result }}"

          print_row "TS Compiled Engine" \
            "${{ needs.ts-compiled-engine.outputs.passed }}" \
            "${{ needs.ts-compiled-engine.outputs.failed }}" \
            "${{ needs.ts-compiled-engine.outputs.total }}" \
            "${{ needs.ts-compiled-engine.result }}"

          print_row "TS Compiled (Direct)" \
            "${{ needs.ts-compiled-direct.outputs.passed }}" \
            "${{ needs.ts-compiled-direct.outputs.failed }}" \
            "${{ needs.ts-compiled-direct.outputs.total }}" \
            "${{ needs.ts-compiled-direct.result }}"

          print_row "C++ Compiled" \
            "${{ needs.cpp-compiled.outputs.passed }}" \
            "${{ needs.cpp-compiled.outputs.failed }}" \
            "${{ needs.cpp-compiled.outputs.total }}" \
            "${{ needs.cpp-compiled.result }}"

          print_row "Rust Self-Hosted Engine" \
            "${{ needs.rust-engine.outputs.passed }}" \
            "${{ needs.rust-engine.outputs.failed }}" \
            "${{ needs.rust-engine.outputs.total }}" \
            "${{ needs.rust-engine.result }}"

          print_row "C# Self-Hosted Engine" \
            "${{ needs.csharp-engine.outputs.passed }}" \
            "${{ needs.csharp-engine.outputs.failed }}" \
            "${{ needs.csharp-engine.outputs.total }}" \
            "${{ needs.csharp-engine.result }}"

          print_row "Go Self-Hosted Engine" \
            "${{ needs.go-engine.outputs.passed }}" \
            "${{ needs.go-engine.outputs.failed }}" \
            "${{ needs.go-engine.outputs.total }}" \
            "${{ needs.go-engine.result }}"

          echo "╚══════════════════════════════╩════════╩════════╩════════╩════════╝"

          # Fail the summary if any engine job did not succeed (primary gate).
          summary_failed=0
          if [ "${{ needs.dart-engine.result }}" != "success" ] || \
             [ "${{ needs.ts-engine.result }}" != "success" ] || \
             [ "${{ needs.ts-compiled-engine.result }}" != "success" ] || \
             [ "${{ needs.ts-compiled-direct.result }}" != "success" ] || \
             [ "${{ needs.cpp-compiled.result }}" != "success" ] || \
             [ "${{ needs.rust-engine.result }}" != "success" ] || \
             [ "${{ needs.csharp-engine.result }}" != "success" ] || \
             [ "${{ needs.go-engine.result }}" != "success" ]; then
            echo ""
            echo "One or more engine jobs did not succeed. See individual job logs above."
            summary_failed=1
          fi

          # Defense-in-depth (F-CM-1): also fail if any engine reported a
          # non-zero parsed failure count, even if its job reported success —
          # the parsed counts must gate, not merely decorate the matrix.
          for entry in \
            "Dart Engine:${{ needs.dart-engine.outputs.failed }}" \
            "TS Self-Hosted Engine:${{ needs.ts-engine.outputs.failed }}" \
            "TS Compiled Engine:${{ needs.ts-compiled-engine.outputs.failed }}" \
            "TS Compiled (Direct):${{ needs.ts-compiled-direct.outputs.failed }}" \
            "C++ Compiled:${{ needs.cpp-compiled.outputs.failed }}" \
            "Rust Self-Hosted Engine:${{ needs.rust-engine.outputs.failed }}" \
            "C# Self-Hosted Engine:${{ needs.csharp-engine.outputs.failed }}" \
            "Go Self-Hosted Engine:${{ needs.go-engine.outputs.failed }}"; do
            name="${entry%%:*}"
            count="${entry##*:}"
            # Normalize empty/non-numeric (e.g. a skipped job) to 0 so the
            # comparison can never fail spuriously.
            case "$count" in
              '' | *[!0-9]*) count=0 ;;
            esac
            if [ "$count" -gt 0 ]; then
              echo "::error::$name reported $count conformance failure(s)"
              summary_failed=1
            fi
          done

          if [ "$summary_failed" -ne 0 ]; then
            exit 1
          fi

          echo ""
          echo "All engines passed conformance."
