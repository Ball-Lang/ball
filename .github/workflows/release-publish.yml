name: Publish Dart package

# Publishes a single Dart package to pub.dev via OIDC trusted publishing.
# Triggered by release-tag.yml via `gh workflow run --ref <tag>` where
# <tag> is of the form `<package_name>-v<version>` (e.g. ball_base-v0.1.0).
# Can also be triggered manually with workflow_dispatch.

on:
  workflow_dispatch:
  push:
    tags:
      - '*-v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write
  id-token: write   # required for pub.dev OIDC trusted publishing

jobs:
  publish:
    name: Publish to pub.dev
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1

      # The Dart pub-workspace / Melos root is the repo root, so melos-action
      # (which runs `melos bootstrap` from the workspace root) works directly.
      # melos-action with `publish: true` parses $GITHUB_REF (a tag ref
      # like refs/tags/ball_base-v0.1.0), extracts the package name,
      # and runs `melos publish --scope=<name>` with OIDC auth.
      # Requires each pub.dev package to have "Automated publishing"
      # configured with:
      #   Repository: Ball-Lang/ball
      #   Tag pattern: <package_name>-v{{version}}
      - uses: bluefireteam/melos-action@2982f8e4fc92440a219490009d6d05195cb1a6a5 # v3
        with:
          publish: true
