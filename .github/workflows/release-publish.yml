name: Publish Dart package

# Publishes a single Dart package to pub.dev via OIDC trusted publishing.
# Triggered by release-tag.yml via `gh workflow run --ref <tag>` where
# <tag> is of the form `<package_name>-v<version>` (e.g. ball_base-v0.1.0).
# Can also be triggered manually with workflow_dispatch.

on:
  workflow_dispatch:
  push:
    tags:
      - '*-v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write
  id-token: write   # required for pub.dev OIDC trusted publishing

jobs:
  publish:
    name: Publish to pub.dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dart-lang/setup-dart@v1

      - name: Bootstrap workspace
        working-directory: dart
        run: dart pub get

      # Parse $GITHUB_REF (a tag ref like refs/tags/ball_base-v0.1.0) to extract
      # the package name, then run `melos publish --scope=<name>` from dart/ with
      # OIDC trusted publishing (setup-dart@v1 + id-token: write above).
      # melos-action@v3 would do this from the repo root, where there is no Melos
      # workspace — so we run melos directly from dart/ via the dev-dependency.
      # Requires each pub.dev package to have "Automated publishing" configured:
      #   Repository: Ball-Lang/ball ; Tag pattern: <package_name>-v{{version}}
      - name: Extract package name from tag
        id: pkg
        run: |
          PACKAGE_NAME=$(sed -E 's#^refs/tags/([a-z0-9_]+)-v([0-9]+\.[0-9]+\.[0-9]+.*)$#\1#' <<< "$GITHUB_REF")
          echo "name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "Publishing package: $PACKAGE_NAME (from $GITHUB_REF)"

      - name: Publish to pub.dev (OIDC trusted publishing)
        working-directory: dart
        run: dart run melos publish -y --no-dry-run --scope=${{ steps.pkg.outputs.name }}
