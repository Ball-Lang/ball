name: ball_compiler
description: >-
  Ball-to-Dart compiler that translates Ball protobuf programs into formatted
  Dart source code, with support for multi-module package compilation.
version: 0.1.0
homepage: https://github.com/ball-lang/ball
repository: https://github.com/ball-lang/ball
issue_tracker: https://github.com/ball-lang/ball/issues
topics:
  - programming-language
  - compiler
  - code-generation
  - protobuf
  - ball

environment:
  sdk: ^3.9.0
resolution: workspace

dependencies:
  ball_base:
    path: ../shared
  ball_encoder:
    path: ../encoder
  ball_engine:
    path: ../engine
  ball_resolver:
    path: ../resolver
  code_builder: ^4.10.0
  dart_style: ^3.0.0
  protobuf: ^6.0.0
