name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'web/playground/**'
      - 'examples/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Website
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable

      - name: Install jaspr_cli
        run: dart pub global activate jaspr_cli

      - name: Install dependencies
        working-directory: website
        run: dart pub get

      - name: Generate example excerpts
        run: dart run website/tool/generate_examples.dart

      - name: Build website
        working-directory: website
        run: jaspr build

      - name: Add .nojekyll
        run: touch website/build/jaspr/.nojekyll

      - name: Copy CNAME
        run: cp website/web/CNAME website/build/jaspr/CNAME

      - name: Copy playground
        run: |
          mkdir -p website/build/jaspr/playground
          cp web/playground/* website/build/jaspr/playground/
          mkdir -p website/build/jaspr/playground/conformance
          cp tests/conformance/*.ball.json website/build/jaspr/playground/conformance/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: website/build/jaspr

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
