name: Claude (@claude interactive)

# Interactive Claude Code on GitHub: mention @claude in an issue, issue
# comment, or PR review comment and Claude responds in-thread. Uses the
# official anthropics/claude-code-action v1 (SHA-pinned per repo convention).
#
# AUTH — Max/Pro subscription tokens (no API credits), THREE accounts with
# rotation + failover: the primary token rotates per issue/PR number to
# spread usage; if the primary account is rate-limited or exhausted the run
# automatically retries with the next token, then the last. (There is no
# public API to query a subscription's remaining quota, so rotation+failover
# is the practical "use whichever account has limits left".)
#
# Setup (one-time, per account, run BY A HUMAN — tokens are interactive):
#   for each of your Claude accounts (e.g. profiles bdaya / digrum / gmail):
#     1. `claude setup-token` while logged into that account (Pro/Max only)
#     2. gh secret set CLAUDE_CODE_OAUTH_TOKEN_<N> --repo Ball-Lang/ball   (N = 0,1,2)
# OAuth-token limitation per the action docs: inline comment classification
# is skipped (comments post directly).

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  claude:
    # Only fire when the triggering text actually mentions @claude.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # Rotate the primary account per thread so load spreads across the
      # three subscriptions; failover order is primary, primary+1, primary+2.
      - name: Pick token order
        id: pick
        env:
          SEED: ${{ github.event.issue.number || github.event.pull_request.number || github.run_number }}
        run: |
          i0=$(( SEED % 3 )); i1=$(( (SEED + 1) % 3 )); i2=$(( (SEED + 2) % 3 ))
          { echo "i0=$i0"; echo "i1=$i1"; echo "i2=$i2"; } >> "$GITHUB_OUTPUT"

      - name: Claude (primary account)
        id: try0
        continue-on-error: true
        uses: anthropics/claude-code-action@a6a5b60a078a0af52612aac63e05e3f95fd4ff64 # v1
        with:
          anthropic_api_key: ${{ secrets[format('CLAUDE_CODE_OAUTH_TOKEN_{0}', steps.pick.outputs.i0)] || secrets.CLAUDE_CODE_OAUTH_TOKEN_0 }}
          track_progress: true

      - name: Claude (failover account 2)
        id: try1
        if: steps.try0.outcome == 'failure'
        continue-on-error: true
        uses: anthropics/claude-code-action@a6a5b60a078a0af52612aac63e05e3f95fd4ff64 # v1
        with:
          anthropic_api_key: ${{ secrets[format('CLAUDE_CODE_OAUTH_TOKEN_{0}', steps.pick.outputs.i1)] || secrets.CLAUDE_CODE_OAUTH_TOKEN_0 }}
          track_progress: true

      - name: Claude (failover account 3)
        id: try2
        if: steps.try0.outcome == 'failure' && steps.try1.outcome == 'failure'
        continue-on-error: true
        uses: anthropics/claude-code-action@a6a5b60a078a0af52612aac63e05e3f95fd4ff64 # v1
        with:
          anthropic_api_key: ${{ secrets[format('CLAUDE_CODE_OAUTH_TOKEN_{0}', steps.pick.outputs.i2)] || secrets.CLAUDE_CODE_OAUTH_TOKEN_0 }}
          track_progress: true

      - name: Fail if all accounts failed
        if: steps.try0.outcome == 'failure' && steps.try1.outcome == 'failure' && steps.try2.outcome == 'failure'
        run: |
          echo "::error::All three Claude accounts failed (rate limits or a real error — check the three attempts above)."
          exit 1
