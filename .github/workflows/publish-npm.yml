name: Publish npm

# Triggered by semantic-release creating a GitHub release,
# or by manually publishing a release.
on:
  release:
    types: [published]

permissions:
  id-token: write    # OIDC trusted publishing — no NPM_TOKEN needed
  contents: read

jobs:
  publish:
    name: Publish @ball-lang/engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Install a specific newer npm version to fix the known scoped-package
      # E404 bug with OIDC trusted publishing (npm/cli issues #8976, #8678).
      # Pre-installed npm 10.9.7 has the bug; 11.5.1+ fixes it.
      - name: Install npm 11.5+
        run: npm install -g npm@11

      - name: Install dependencies
        working-directory: ts/engine
        run: npm ci

      - name: Build
        working-directory: ts/engine
        run: npm run build

      - name: Test
        working-directory: ts/engine
        run: npm test

      # No NPM_TOKEN secret — OIDC handles auth.
      # Configure trusted publisher at: npmjs.com/package/@ball-lang/engine/access
      # Workflow filename must match: "publish-npm.yml"
      - name: Publish with provenance
        working-directory: ts/engine
        run: npm publish --provenance --access public
