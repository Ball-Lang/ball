name: Publish npm

# Triggered by semantic-release creating a GitHub release,
# or by manually publishing a release.
on:
  release:
    types: [published]

permissions:
  id-token: write    # OIDC trusted publishing — no NPM_TOKEN needed
  contents: read

jobs:
  publish:
    name: Publish @ball-lang/engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Install npm 11.5.1+ globally for OIDC trusted publishing
      # (npm/cli #8976, #8678: scoped packages need newer npm).
      # Corepack alone doesn't switch the default npm shim, so we
      # install globally and ensure the PATH is updated.
      - name: Upgrade npm to 11.5+
        run: |
          corepack enable
          corepack use npm@11.5.2
          npm --version

      - name: Install dependencies
        working-directory: ts/engine
        run: npm ci

      - name: Build
        working-directory: ts/engine
        run: npm run build

      - name: Test
        working-directory: ts/engine
        run: npm test

      # Remove setup-node's .npmrc (location: $RUNNER_TEMP/.npmrc)
      # so npm 11.5+ uses pure OIDC. The token placeholder in that
      # file blocks OIDC activation.
      - name: Remove .npmrc to enable pure OIDC
        run: |
          rm -f "$RUNNER_TEMP/.npmrc"
          unset NPM_CONFIG_USERCONFIG
          echo "NPM_CONFIG_USERCONFIG=" >> $GITHUB_ENV

      - name: Publish with provenance
        working-directory: ts/engine
        env:
          NPM_CONFIG_USERCONFIG: ""
        run: |
          echo "npm version: $(npm --version)"
          npm publish --provenance --access public
