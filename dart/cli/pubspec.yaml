name: ball_cli
description: >-
  Command-line tool for the Ball programming language -- compile, encode,
  run, and inspect Ball programs from the terminal.
version: 0.3.0+4
homepage: https://github.com/ball-lang/ball
repository: https://github.com/ball-lang/ball
issue_tracker: https://github.com/ball-lang/ball/issues
topics:
  - programming-language
  - cli
  - compiler
  - interpreter
  - ball

environment:
  sdk: ^3.9.0


executables:
  ball:
    ball

dependencies:
  ball_base: ^0.3.0+2
  ball_compiler: ^0.3.0+4
  ball_encoder: ^0.3.1
  ball_engine: ^0.3.0+4
  ball_resolver: ^0.3.0+2
  fixnum: ^1.1.1
  protobuf: ^6.0.0
  yaml: ^3.1.0

dev_dependencies:
  archive: ^4.0.0
  lints: ^6.1.0
  test: ^1.25.0




resolution: workspace

