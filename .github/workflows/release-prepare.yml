name: Prepare release

# Fires on push to main. When conventional commits indicate a
# version bump, Melos opens a release PR with per-package version
# bumps + CHANGELOG updates for human review.

on:
  push:
    branches: [main]
  workflow_dispatch: {} # allow manual test runs (these workflows never run on PRs)

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    name: Prepare release PR
    runs-on: ubuntu-latest
    # Skip when the commit is itself a release commit (prevents loops)
    if: "!contains(github.event.head_commit.message, 'chore(release)')"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Use PAT so the resulting PR can trigger downstream workflows.
          # Default GITHUB_TOKEN cannot do this.
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - uses: dart-lang/setup-dart@v1

      - name: Bootstrap workspace
        working-directory: dart
        run: dart pub get

      # NOTE: bluefireteam/melos-action@v3 has NO working-directory input — it
      # runs `melos bootstrap` from the repo root, where this repo has no Melos
      # workspace (it lives in dart/). So we run melos directly from dart/ via
      # the dev-dependency, replicating exactly what the action would do.
      - name: Configure git identity
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Version packages (bumps + changelogs, no git tag)
        working-directory: dart
        run: dart run melos version --yes --no-git-tag-version

      - name: Validate publishability (dry run)
        working-directory: dart
        run: dart run melos publish -y --dry-run

      - name: Open release PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          # RELEASE_PAT must have contents:write + pull-requests:write
          # and ideally actions:write so the release-tag.yml triggers.
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          title: "chore(release): Publish packages"
          body: "Prepared all packages to be released to pub.dev"
          branch: release-${{ github.run_id }}
