name: Publish npm

on:
  release:
    types: [published]

permissions:
  id-token: write    # OIDC trusted publishing
  contents: read

jobs:
  publish:
    name: Publish @ball-lang/engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Install npm 11.5.2+ via npx (bypasses the MODULE_NOT_FOUND
      # issue when globally installing npm over the pre-installed
      # version in node:22 image).
      # Required for OIDC trusted publishing to work for scoped
      # packages (npm/cli #8976, #8678).
      - name: Install dependencies
        working-directory: ts/engine
        run: npm ci

      - name: Build
        working-directory: ts/engine
        run: npm run build

      - name: Test
        working-directory: ts/engine
        run: npm test

      # Use npx to invoke a NEW npm 11.5.2 for the publish step.
      # This avoids the need to globally upgrade, which breaks due
      # to missing dev deps in the pre-installed npm.
      # Clear NPM_CONFIG_USERCONFIG so the token-placeholder .npmrc
      # doesn't interfere with OIDC.
      - name: Publish with provenance (via npx npm@11.5.2)
        working-directory: ts/engine
        env:
          NPM_CONFIG_USERCONFIG: ""
        run: |
          rm -f "$RUNNER_TEMP/.npmrc"
          npx -y npm@11.5.2 --version
          npx -y npm@11.5.2 publish --provenance --access public
