name: Publish npm

# Triggered by semantic-release creating a GitHub release,
# or by manually publishing a release.
on:
  release:
    types: [published]

permissions:
  id-token: write    # OIDC trusted publishing — no NPM_TOKEN needed
  contents: read

jobs:
  publish:
    name: Publish @ball-lang/engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Install npm 11.5.1+ which supports OIDC trusted publishing for
      # scoped packages. Use corepack to avoid MODULE_NOT_FOUND issues
      # with `npm install -g npm@X` in node:22 image.
      - name: Enable npm 11 via corepack
        run: |
          corepack enable
          corepack prepare npm@11.5.2 --activate

      - name: Install dependencies
        working-directory: ts/engine
        run: npm ci

      - name: Build
        working-directory: ts/engine
        run: npm run build

      - name: Test
        working-directory: ts/engine
        run: npm test

      - name: Debug auth environment
        run: |
          echo "npm version: $(npm --version)"
          echo "node version: $(node --version)"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL set: ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN set: ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+yes}"
          echo "--- .npmrc locations ---"
          ls -la ~/.npmrc $RUNNER_TEMP/.npmrc ts/engine/.npmrc 2>&1 || true
          cat ~/.npmrc 2>/dev/null | sed 's/=.*$/=REDACTED/' || echo "no ~/.npmrc"
          cat $RUNNER_TEMP/.npmrc 2>/dev/null | sed 's/=.*$/=REDACTED/' || echo "no RUNNER_TEMP/.npmrc"

      # OIDC trusted publishing requires npm 11.5.1+ AND the trusted
      # publisher config on npmjs.com must match: org=ball-lang,
      # repo=ball, workflow=publish-npm.yml.
      - name: Publish with provenance
        working-directory: ts/engine
        run: npm publish --provenance --access public
