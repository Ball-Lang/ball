name: Coverage

# Cross-stack coverage: each language stack runs its suites under coverage,
# emits lcov, and uploads to Codecov with a flag (dart / typescript / cpp /
# rust). Codecov merges the flags into one repo-wide report (epic #59, #60).
# Auth is OIDC — public repo, no CODECOV_TOKEN needed.
#
# The Dart job ALSO enforces the line-coverage ratchet (floor must never
# regress; raise toward 100%). Runs on push to main + on demand (the
# instrumented suites are heavy — not gated on every PR yet).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Codecov OIDC (tokenless) upload needs id-token: write.
permissions:
  contents: read
  id-token: write

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────
  # Dart — per-package lcov + line-coverage ratchet
  # ──────────────────────────────────────────────────
  dart:
    name: Dart coverage
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable

      # The compiler tests shell out to @ball-lang/compiler (TsCompiler wrapper),
      # so Node + the built TS compiler are required — mirror the ci.yml dart job.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ts/compiler/package-lock.json

      - name: Install dependencies
        run: cd dart && dart pub get

      - name: Install & build @ball-lang/compiler
        run: cd ts/compiler && npm ci && npm run build

      # Some package suites read the generated shared artifacts (e.g.
      # ball_protobuf's facade test reads ball_protobuf.json). Regenerate them
      # first — mirrors ci.yml's ball-freshness setup — so coverage runs against
      # a correctly-built workspace.
      - name: Regenerate shared Ball artifacts
        run: |
          ( cd dart/shared  && dart run bin/gen_std.dart . )
          ( cd dart/shared  && dart run bin/gen_ball_proto.dart . )
          ( cd dart/encoder && dart run bin/gen_ball_protobuf.dart ../shared )

      # Measures EVERY workspace package and EVERY authored file (untested files
      # count as 0%, never dropped) and fails if overall line coverage drops
      # below the floor. RAISE the floor toward 100% as tests are added (see
      # docs/TESTING_STRATEGY.md); never lower it without justification.
      # Honest PRODUCT coverage: 99.99% local / 100.00% on CI (all 9
      # packages' lib/; bin/ entry-point tooling excluded — see
      # coverage_dart.dart). Per-package (#61 close-out wave): ball_protobuf
      # 100%, ball_protobuf_gen 100%, ball_rpc 100%, compiler 100%,
      # encoder 100%, engine 100%, resolver 100%, shared 100%, cli 99.80%
      # local / 100% CI. Every excluded line carries a per-site
      # `// coverage:ignore` justification in-source (three categories:
      # environmental I/O — network/raw-stdout/external-runner harness;
      # verified-unreachable defensive arms, proven per-arm via caller
      # analysis; and `bin/` entry-point glue excluded wholesale). The one
      # local-only gap (cli runner.dart 'Error reading file') is covered on
      # CI by a POSIX chmod test that must skip on Windows — the variance
      # direction is CI ≥ local by construction.
      # Dedicated suites drove the workspace from ~64% → 100%.
      - name: Dart line coverage ratchet (all packages)
        # Ratcheted 99 -> 99.9 after the #61 close-out wave (engine
        # 99.17% -> 100% via engine_wave8_coverage_test.dart's
        # BallModuleHandler-driven dispatch-arm tests; compiler 99.97% ->
        # 100% via the plain-class const-field test; ball_protobuf_gen
        # 99.01% -> 100% via dart_emitter_wave7_coverage_test.dart;
        # cli 92.31% -> 100%-of-reachable via 4 new runner tests + per-site
        # network/stdout exclusions). Floor kept a margin below the local
        # 99.99% so an unrelated platform skip can't flap the gate; CI
        # measures 100.00%.
        run: dart run tools/coverage_dart.dart --floor 99.9

      - name: Upload Dart coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          # Single merged lcov with the COMPLETE file/folder tree (every package,
          # every authored file, 0% for untested) — not a tested subset.
          files: ./coverage/dart.lcov
          flags: dart
          # Best-effort: a Codecov outage / not-yet-activated repo must not fail
          # the ratchet gate above. (This is the codecov-action default.)
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────
  # TypeScript — c8 (V8) coverage → lcov, per package
  # ──────────────────────────────────────────────────
  typescript:
    name: TypeScript coverage
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      # ts/compiler's engine-parse test regenerates engine.ball.json from the
      # Dart self-host source, so the Dart workspace must be resolved.
      - name: Bootstrap Dart workspace
        run: cd dart && dart pub get

      # Runs the SAME `npm test` ts/engine's own package.json defines
      # (engine_test.ts's 355-fixture conformance run through the compiled
      # engine, THEN the dedicated unit suites), under ONE c8 invocation so
      # both halves land in a single merged lcov.info — a prior version of
      # this step ran engine_test.ts only (as its own `node` invocation,
      # bypassing npm test), silently omitting ball_file.test.ts/
      # engine_setup.test.ts/index_wrapper.test.ts and understating coverage
      # by ~18 points (81.65% measured vs 99.85% real; #62 Phase-1 gap-map).
      - name: Coverage — @ball-lang/engine
        run: |
          cd ts/engine && npm ci && npm run build
          npx --yes c8@11.0.0 --reporter=lcovonly --src src --all npm test

      # Two invocations merged into one lcov.info (the second's --clean=false
      # keeps the first's V8 coverage instead of overwriting it): the fast
      # unit-test loop, THEN full_e2e.ts's 317-fixture conformance harness.
      # full_e2e.ts is deliberately excluded from `npm test`'s test/*.test.ts
      # glob (see its own docstring) so the fast dev loop stays fast, but
      # skipping it here as well understated coverage for any code path only
      # a conformance fixture exercises (#62 Phase-2c; e.g. emitLabelStmt/
      # emitGotoStmt, exercised only by the goto/label conformance fixture).
      - name: Coverage — @ball-lang/compiler
        run: |
          cd ts/compiler && npm ci && npm run build
          npx --yes c8@11.0.0 --reporter=lcovonly --src src --all \
            node --experimental-strip-types --test test/*.test.ts
          npx --yes c8@11.0.0 --clean=false --reporter=lcovonly --src src --all \
            node --experimental-strip-types test/full_e2e.ts

      - name: Coverage — @ball-lang/encoder
        run: |
          cd ts/encoder && npm ci && npm run build
          npx --yes c8@11.0.0 --reporter=lcovonly --src src --all \
            node --experimental-strip-types --test test/*.test.ts

      - name: Coverage — @ball-lang/shared
        run: |
          cd ts/shared && npm ci
          npx --yes c8@11.0.0 --reporter=lcovonly --src src --all \
            node --experimental-strip-types --test test/*.test.ts

      # cli depends on the in-repo engine via `file:../engine` — since the
      # @ball-lang/engine step above already ran `npm ci && npm run build`
      # in the same job/checkout, `npm ci` here resolves and links it fine
      # (this is the same order ci.yml uses). test/cli_test.ts spawns the
      # built CLI via spawnSync, which inherits NODE_V8_COVERAGE from the c8
      # parent process, so the black-box subprocess suite's coverage is
      # captured too — not just the dependency-free capability_* unit tests.
      - name: Coverage — @ball-lang/cli
        run: |
          cd ts/cli && npm ci && npm run build
          npx --yes c8@11.0.0 --reporter=lcovonly --src src --all npm test

      - name: Upload TypeScript coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          # ALL five TS packages (engine, compiler, encoder, shared, cli). c8
          # `--all` includes never-executed src files at 0%, so each package's
          # coverage is complete, not just the exercised files.
          files: >-
            ./ts/engine/coverage/lcov.info,./ts/compiler/coverage/lcov.info,./ts/encoder/coverage/lcov.info,./ts/shared/coverage/lcov.info,./ts/cli/coverage/lcov.info
          flags: typescript
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────
  # C++ — gcov/lcov over the ctest binaries (Linux/gcc)
  # ──────────────────────────────────────────────────
  cpp:
    name: C++ coverage
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1
        with:
          setup_only: true

      - name: ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: cpp-coverage
          max-size: 1G

      - name: Install nlohmann-json + lcov
        run: sudo apt-get update && sudo apt-get install -y nlohmann-json3-dev lcov

      # Debug + --coverage (gcov) instrumentation. A separate build dir from the
      # release build so the regular ci.yml cache is untouched.
      - name: Configure CMake (coverage)
        run: >
          cmake -S cpp -B cpp/build-cov
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_FLAGS="--coverage -O0 -g"
          -DCMAKE_CXX_FLAGS="--coverage -O0 -g"
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build cpp/build-cov -j 2

      # Baseline (--initial) BEFORE running tests: records 0-coverage for every
      # instrumented source, so a file that's compiled but never exercised shows
      # 0% instead of vanishing from the report.
      - name: Capture baseline coverage (lcov --initial)
        run: |
          lcov --capture --initial --directory cpp/build-cov --output-file cpp.base.lcov \
            --ignore-errors mismatch,gcov,source,negative,empty,unused,format

      - name: Run tests
        run: ctest --test-dir cpp/build-cov --output-on-failure

      # Capture test coverage, merge with the baseline (so unexecuted files stay
      # at 0%), then drop system headers, FetchContent deps, build artifacts,
      # generated code and tests. lcov 2.x is strict — tolerate the usual gcov
      # noise. cpp/shared/ball_protobuf_rt.h is GENERATED ("Generated by ball
      # compiler (C++ target, library mode)" — the compiled ball_protobuf Ball
      # module), same class as engine_rt.cpp / gen/ / compiled_engine.ts: it
      # entered the instrumented set with #18 Stage 5 (ball_rt_decode.cpp now
      # always compiles it) and its ~3.7k machine-emitted lines at ~16% dragged
      # the overall number from ~74% to ~46% overnight, tripping the floor below
      # on the flip commit itself — generated output is excluded from the
      # hand-written measurement, here and in codecov.yml's ignore list.
      - name: Capture + merge coverage (lcov)
        run: |
          lcov --capture --directory cpp/build-cov --output-file cpp.test.lcov \
            --ignore-errors mismatch,gcov,source,negative,empty,unused,format
          lcov --add-tracefile cpp.base.lcov --add-tracefile cpp.test.lcov \
            --output-file cpp.lcov --ignore-errors unused,empty,corrupt
          lcov --remove cpp.lcov \
            '/usr/*' '*/_deps/*' '*/build-cov/*' '*/gen/*' '*/test/*' \
            '*/cpp/shared/ball_protobuf_rt.h' \
            '*/cpp/shared/ball_program_descriptor.h' \
            --output-file cpp.lcov --ignore-errors unused,empty
          lcov --list cpp.lcov --ignore-errors empty

      # Line-coverage ratchet for cpp/{compiler,encoder,shared} (issue #63,
      # part of epic #59/#60). Mirrors the Dart job's ratchet philosophy
      # (`tools/coverage_dart.dart --floor`): the floor must never regress,
      # and is raised toward 100% as tests land. `cpp.lcov` already excludes
      # generated code (`gen/`), test sources, and the build tree (see the
      # capture step above); `dart/self_host/lib/engine_rt.cpp` is excluded
      # implicitly too — it is gitignored and never generated by this job, so
      # it is never compiled/instrumented in the first place.
      #
      # Uses `lcov --summary`'s "lines......: NN.N% (a of b)" aggregate, NOT
      # `--list`'s per-file table — the per-file Rate% column is unreliable on
      # a merged (baseline + post-test) tracefile once multiple TUs' data for
      # the same header are combined (confirmed by cross-checking against
      # Codecov's own per-file computation; see cpp/build-cov-floor.sh for the
      # full writeup and the local standalone per-target version of this
      # check used during development).
      - name: C++ line coverage floor
        run: |
          pct=$(lcov --summary cpp.lcov --ignore-errors empty 2>/dev/null \
            | grep -oP 'lines\.*:\s*\K[0-9]+(\.[0-9]+)?' | head -1)
          if [ -z "$pct" ]; then
            echo "ERROR: could not parse line coverage percentage from cpp.lcov"
            exit 1
          fi
          # Ratcheted 72 -> 83 -> 86 (issue #63, 2026-07-10 grinds). The latest
          # #63-close grind added ~22 per-arm class/comprehension/library/method-
          # dispatch unit tests driving hand-built ball::ir (emit_struct
          # bases/ctors/operators/factory, split-mode out-of-line class defs,
          # list-literal field & typed param defaults, message_creation runtime-
          # type arms, compile_method_call collection/string/super/static routes,
          # compile_std_call map/list comprehensions + for-in-as-expression,
          # compile_library class/enum/top-level-var facades, ClassName.new,
          # lambda input/output types), lifting compiler.cpp 86.7% -> 90.4%
          # (6713/7424) and overall 85.7% -> 88.1% (9989/11336) on the
          # CI-equivalent run (test_e2e's compile phase is reproduced locally by
          # cpp/test/corpus_driver.cpp — same instrumented compiler.cpp coverage
          # without the 40-min nested g++ builds; see cpp/build-cov-floor.sh for
          # the methodology + per-target local ratchet). encoder 89.1%, shared
          # 81.7% unchanged this round. Floor set ~2 points under measured 88.1%
          # for CI variance.
          floor=86
          echo "C++ overall line coverage: ${pct}% (floor: ${floor}%)"
          awk -v p="$pct" -v f="$floor" 'BEGIN {
            if (p + 0 < f) {
              print "ERROR: " p "% is below the floor of " f "%. Add tests " \
                    "(target: 100%) or, only with justification, lower the " \
                    "floor in this workflow.";
              exit 1;
            }
            print "OK: " p "% >= floor " f "%.";
          }'

      - name: Upload C++ coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          files: ./cpp.lcov
          flags: cpp
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────
  # Rust — cargo-llvm-cov over the default-feature workspace
  # ──────────────────────────────────────────────────
  rust:
    name: Rust coverage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # rustup ships preinstalled on GitHub-hosted runners; `rustup show` reads
      # rust/rust-toolchain.toml (channel = stable) and installs it (mirrors
      # ci.yml's rust job). llvm-tools-preview is the extra component
      # cargo-llvm-cov instruments with (source-based coverage via LLVM, not
      # gcov/lcov like the C++ job).
      - name: Install Rust toolchain
        working-directory: rust
        run: |
          rustup show
          rustup component add llvm-tools-preview

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rust

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@c7eb1735f09259a5035e8e5d44b1406b1cddc0fb # v2.83.0
        with:
          tool: cargo-llvm-cov

      # Default-feature workspace only (mirrors ci.yml's plain `cargo build
      # --workspace` / `cargo test --workspace`) — deliberately NOT
      # `--features self_host`. The self-hosted engine (`ball-engine`'s
      # `compiled_engine.rs`) is a gitignored, generated artifact that first
      # needs `dart pub get` + `gen_engine_json.dart` + `cargo run -p
      # ball-engine-regen` (see ci.yml's dedicated steps) — pulling that whole
      # dance into this job would double its runtime to instrument a single
      # generated file that's excluded from coverage anyway (see codecov.yml's
      # `ignore:` list, mirroring the TS/C++ generated-file exclusions). This
      # keeps the job lean while still measuring every authored crate
      # (ball-shared, ball-compiler, ball-encoder, ball-engine's wrapper
      # foundation, ball-cli).
      - name: Coverage — cargo-llvm-cov (workspace, default features)
        run: cd rust && cargo llvm-cov --workspace --lcov --output-path ../rust.lcov

      # Line-coverage ratchet for the authored rust/ crates (epic #59) —
      # mirrors the Dart (`coverage_dart.dart --floor`) and C++ ("C++ line
      # coverage floor") gates: the floor must never regress and is raised
      # toward 100% as tests land. `report` reuses the profdata the step
      # above already collected (no test rerun). Generated files are excluded
      # from the GATE only (`gen/` proto bindings + the self-host
      # `compiled_engine.rs`, mirroring codecov.yml's `ignore:` list and the
      # other stacks' generated-file exclusions); the uploaded rust.lcov is
      # unchanged — Codecov applies the same ignores server-side. Authored
      # coverage measured 67.3% lines by this exact command (2026-07-10;
      # Codecov flag `rust` reads 68.1% with its own accounting); floor set
      # below it to absorb run-to-run variance. RAISE toward 100% as tests
      # land; never lower it without justification.
      - name: Rust line coverage floor
        run: >
          cd rust && cargo llvm-cov report
          --ignore-filename-regex '(^|/)gen/|compiled_engine\.rs'
          --fail-under-lines 65
          --summary-only

      - name: Upload Rust coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          files: ./rust.lcov
          flags: rust
          # Best-effort: a Codecov outage / not-yet-activated repo must not
          # fail this job (mirrors the dart/typescript/cpp uploads above).
          fail_ci_if_error: false
