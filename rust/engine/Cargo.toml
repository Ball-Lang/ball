[package]
name = "ball-lang-engine"
description = "Ball engine (self-hosted, compiled from dart/self_host/engine.ball.json)."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

# `src/compiled_engine.rs` is gitignored (rust/.gitignore) — it is a generated,
# ~19k-line artifact regenerated by `cargo run -p ball-engine-regen`. By
# default `cargo package` skips gitignored files, which would ship a broken
# crate (the `self_host` build below `mod`-declares `compiled_engine`). Per the
# Cargo reference, **specifying `include` disables gitignore-based file
# discovery entirely**
# (https://doc.rust-lang.org/cargo/reference/manifest.html#the-exclude-and-include-fields):
# every listed path is packaged regardless of `.gitignore`. So the glob below
# ships `src/compiled_engine.rs` alongside the hand-written sources. The publish
# workflow (.github/workflows/publish-crates.yml) regenerates it *before*
# packaging so the shipped copy is current. `Cargo.toml` is always included by
# cargo regardless; it is listed only for clarity.
include = ["src/**/*.rs", "Cargo.toml"]

[features]
# The self-hosted engine driver — wires in the generated `compiled_engine.rs`
# and drives its `BallEngine`/`StdModuleHandler` classes. OFF by default:
# `compiled_engine.rs` is regenerated by `ball-engine-regen` and does not yet
# compile through `ball-lang-compiler` (issue #39 — see AGENTS.md's "Self-host
# status" and the gap report). Keeping it behind an off-by-default feature
# means `cargo build -p ball-lang-engine` / `cargo test -p ball-lang-engine` stay green
# on the wrapper foundation (loader + scope + ball_proto access patterns)
# without first running the dart+regen dance to materialize the gitignored
# `compiled_engine.rs`.
#
# PUBLISHED CRATE: the release workflow (.github/workflows/publish-crates.yml)
# flips this to `default = ["self_host"]` *after* regenerating
# `compiled_engine.rs` and *before* `cargo package`, so a consumer's plain
# `cargo add ball-lang-engine` / `cargo build` gets the working self-hosted engine
# out of the box (the shipped tarball contains the generated file — see the
# `include` field above). The flip is publish-time only; the committed default
# stays off so the repo's fresh-checkout `cargo build --workspace` is green.
default = []
self_host = []

[dependencies]
ball-lang-shared = { workspace = true }
prost = { workspace = true }
prost-reflect = { workspace = true, features = ["serde"] }
serde_json = "1"
