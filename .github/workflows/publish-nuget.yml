name: Publish NuGet

# Publishes the C# `ball` CLI (Ball.Cli) to nuget.org as a .NET global tool
# (`dotnet tool install --global Ball.Cli` -> `ball` on PATH). TAG-GATED:
# merging a PR never publishes anything — a release only happens when a
# `csharp-nuget/vX.Y.Z` tag is pushed.
#
# The tag namespace uses a `/` on purpose, mirroring publish-crates.yml
# (#375)'s `rust-crates/` precedent: GitHub Actions tag filters treat `*` as
# "any char except `/`", so `csharp-nuget/v0.1.0` does NOT match the Dart
# publish workflow's `*-v[0-9]+.[0-9]+.[0-9]+*` filter (release-publish.yml)
# or the Rust channel's `rust-crates/v*` filter (publish-crates.yml) — none
# of the release channels cross-fire. (Filter-pattern semantics:
# https://docs.github.com/actions/using-workflows/workflow-syntax-for-github-actions#filter-pattern-cheat-sheet)
#
# Auth is nuget.org Trusted Publishing (OIDC) via NuGet/login
# (https://github.com/NuGet/login) — the ONLY auth path. Unlike crates.io
# (RFC 3691), nuget.org Trusted Publishing policies CAN be created BEFORE a
# package's first publish
# (https://learn.microsoft.com/en-us/nuget/nuget-org/trusted-publishing), so
# no bootstrap token was ever needed here. The policy is now configured (owner
# Ball-Lang #134133652, repo ball #640792174, workflow publish-nuget.yml), so
# the NUGET_API_KEY fallback is retired: a silent fallback can only mask a
# broken or removed Trusted Publisher behind a green run — the exact failure
# the crates.io channel retired its own fallback to prevent (#455). See
# csharp/AGENTS.md § Publishing for the maintainer setup.
#
# There is no way to rehearse the OIDC exchange: `Derive package version from
# tag` runs BEFORE the login step and hard-fails without a tag, so a
# workflow_dispatch run can never reach it. Acceptable — with no fallback, a
# bad policy fails the job loudly AT the login step and nothing is pushed.

on:
  push:
    tags:
      - 'csharp-nuget/v*'
  workflow_dispatch:

permissions:
  id-token: write   # OIDC token exchange for nuget.org Trusted Publishing
  contents: read

jobs:
  publish:
    name: Publish Ball.Cli to nuget.org
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # .NET 10 is the current LTS, matching csharp/global.json's
      # rollForward: latestFeature contract (minimum SDK 10.0.100) — same
      # pin as the `csharp` job in ci.yml.
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('csharp/Directory.Packages.props', 'csharp/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      # Dart regenerates dart/self_host/{engine.ball.pb,cli.ball.json} — the
      # self-host sources the gitignored CompiledEngine.cs / CompiledCli.cs
      # are compiled from. Same reason ci.yml's csharp job bootstraps Dart.
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
        with:
          sdk: stable

      # compile_engine_cpp.dart writes dart/self_host/engine.ball.pb BEFORE
      # it tries (and, with no C++ compiler built in this job, fails) to
      # emit C++ — the trailing failure is expected and harmless here; only
      # the .pb matters (see csharp/AGENTS.md's "Build & Test"). Mirrors
      # ci.yml's csharp job exactly.
      - name: Regenerate engine.ball.pb + cli.ball.json
        run: |
          dart pub get
          cd dart
          dart run compiler/tool/compile_engine_cpp.dart || true
          test -f self_host/engine.ball.pb
          dart run compiler/tool/gen_cli_json.dart
          test -f self_host/cli.ball.json

      # ── Regenerate the gitignored generated sources the pack step needs ──
      # csharp/engine/tool and csharp/cli/tool are deliberately separate
      # console projects (never targets inside Ball.Engine/Ball.Cli) so a
      # broken generated file can never make the regenerator itself
      # un-buildable — see csharp/AGENTS.md.
      - name: Regenerate CompiledEngine.cs + CompiledCli.cs
        run: |
          dotnet run --project csharp/engine/tool/Ball.Engine.Regen.csproj -c Release
          dotnet run --project csharp/cli/tool/Ball.Cli.Regen.csproj -c Release

      # ── Pre-publish gate: self-hosted engine must run the whole
      #    conformance corpus at Dart parity — this is the publish bar,
      #    mirroring publish-crates.yml's (#375) "Self-host conformance
      #    sweep" gate. Never ship a `ball run` that is broken.
      - name: Build self-hosted engine conformance harness
        run: dotnet build csharp/engine/conformance/Ball.Engine.Conformance.csproj -c Release -p:SelfHost=true

      - name: "Self-host conformance sweep (must be full parity)"
        run: |
          cd csharp
          set +e
          output=$(dotnet run --project engine/conformance/Ball.Engine.Conformance.csproj -c Release -p:SelfHost=true --no-build -- --leg=engine 2>&1)
          exit_code=$?
          echo "$output"
          passed=$(echo "$output" | grep -oP 'Results: \K\d+(?= passed)')
          failed=$(echo "$output" | grep -oP ', \K\d+(?= failed)')
          total=$(echo "$output" | grep -oP ', \K\d+(?= total)')
          echo ""
          echo "=== C# Self-Host ==="
          echo "Results: ${passed:-0} passed, ${failed:-0} failed, ${total:-0} total"
          # `passed >= 1` floor (#439/#444): a bare `-z "$passed"` check accepts a
          # literal "0 passed, 0 failed, 0 total" — 0 is non-empty and 0 == 0 — so
          # a sweep that executed NOTHING would green-light a publish to NuGet.
          if [ "$exit_code" != "0" ] || [ "${failed:-1}" != "0" ] || [ "${passed:-0}" -lt 1 ] || [ "${passed}" != "${total}" ]; then
            echo "::error::C# self-host conformance is not at full parity — refusing to publish"
            exit 1
          fi

      # cli-core golden parity (info/validate/tree byte-identical to the
      # Dart reference CLI) — the CLI-analog of the engine sweep above.
      - name: cli-core golden parity
        run: dotnet test csharp/cli/test/Ball.Cli.Tests.csproj -c Release -p:CliCore=true -p:SelfHost=true --filter "FullyQualifiedName~CliCoreParityTests"

      # ── Derive the package version from the tag (csharp-nuget/vX.Y.Z), so
      #    the published version always matches the tag without needing a
      #    separate csproj bump before every release.
      - name: Derive package version from tag
        id: version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#csharp-nuget/v}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$tag' did not yield a valid semantic version (got '$version' from '$tag')"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $version"

      # ── Publish-time feature shape (working `ball run` out of the box) ──
      # The committed defaults (neither MSBuild property set) keep a
      # fresh-checkout `dotnet build`/`dotnet pack` green without the
      # dart+regen dance (see Ball.Cli.csproj's doc comment). For the
      # PUBLISHED package, pack WITH -p:SelfHost=true -p:CliCore=true so
      # `dotnet tool install --global Ball.Cli` yields a working `ball run`
      # (self-hosted engine) plus info/validate/tree/version (cli-core) with
      # no extra setup — mirrors publish-crates.yml's (#375) default-feature
      # flip for the exact same gitignored-generated-source packaging
      # problem. The generated files are already present (regen step above);
      # unlike Cargo's `include` field (source-based packaging), `dotnet
      # pack` ships compiled build OUTPUT, so no packaging-manifest change is
      # needed beyond building with the properties on.
      - name: dotnet pack (SelfHost + CliCore on)
        run: |
          dotnet pack csharp/cli/Ball.Cli.csproj -c Release \
            -p:SelfHost=true -p:CliCore=true \
            -p:Version=${{ steps.version.outputs.version }} \
            -o csharp/nupkg

      - name: List package contents
        run: unzip -l csharp/nupkg/*.nupkg

      # ── Auth: nuget.org Trusted Publishing (OIDC) — REQUIRED ──
      # Exchanges the GitHub OIDC token for a short-lived nuget.org API key,
      # valid ONE HOUR, exposed as steps.login.outputs.NUGET_API_KEY. This step
      # sits immediately before the push on purpose: request the key late, or it
      # can expire before it is used.
      #
      # `secrets.NUGET_USER` is the nuget.org ACCOUNT USERNAME (profile name) —
      # not an email address, and not the package owner (`ball-lang`), which is
      # a separate field on the Trusted Publishing policy.
      #
      # This step used to carry `continue-on-error: true` plus a NUGET_API_KEY
      # fallback. The Trusted Publisher is configured now, so the fallback is
      # retired — it could only ever mask a broken publisher behind a green run.
      - name: nuget.org Trusted Publishing login (OIDC)
        id: login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        with:
          user: ${{ secrets.NUGET_USER }}

      # An empty key means the token exchange silently produced nothing. Never
      # hand that to `dotnet nuget push` — it would fail with an opaque 401
      # instead of naming the real cause.
      - name: Push to nuget.org
        env:
          NUGET_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_KEY" ]; then
            echo "::error::Trusted Publishing returned no API key — refusing to push. Check the nuget.org policy (owner Ball-Lang, repo ball, workflow publish-nuget.yml) and the NUGET_USER secret."
            exit 1
          fi
          dotnet nuget push csharp/nupkg/*.nupkg \
            --api-key "$NUGET_KEY" \
            --source https://api.nuget.org/v3/index.json
