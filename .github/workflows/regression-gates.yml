name: Regression Gates

# Strict all-green gates. Every suite must run to completion with ZERO failures
# and ZERO skips — there are NO pass-count floors, "expected" counts, or
# minimum-to-pass thresholds. A "minimum number of tests to pass" tolerates
# hidden failures, and a skipped test hides a problem just as much as a failing
# one. Both are unacceptable: any failing OR skipped test fails the gate.
#
#   * TS self-hosted engine        : 0 failed; every reported test passed (passed == total)
#   * TS self-hosted compiler      : 0 failed; 0 skipped (node --test)
#   * Dart engine/encoder/compiler : 0 failed; 0 skipped
#   * C++ self-host tally          : 0 fail; 0 timeout; 0 crash (every fixture passes)
#
# This is intentionally SEPARATE from ci.yml (full build + test matrix) and
# conformance-matrix.yml (parity table). Those fail on a non-zero exit; this
# additionally refuses to let a suite stay green while silently dropping or
# skipping tests.
#
# Action versions verified 2026-05-25 against the upstream release pages:
#   actions/checkout       v6  (latest v6.0.2)
#   actions/setup-node     v6  (latest v6.4.0)
#   dart-lang/setup-dart   v1  (latest v1.7.2)
#   bufbuild/buf-action    v1
# Node is pinned to 22: `--experimental-strip-types` (used by the TS test
# scripts) first shipped in Node 22.6.0, and the `22` line resolves well
# past that.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: regression-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────
  # TypeScript regression gate — engine + compiler must each
  # run every test with 0 failed and 0 skipped.
  # ──────────────────────────────────────────────────
  ts-regression:
    name: TS Regression Gate (engine + compiler)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          # `--experimental-strip-types` requires Node >= 22.6.0; the 22 line
          # resolves to a recent 22.x that includes it.
          node-version: 22

      # engine_parse.test.ts shells out to roundtrip_engine.dart when
      # dart/self_host/engine.ball.json is missing.
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Bootstrap Dart workspace (roundtrip_engine)
        run: cd dart && dart pub get

      # engine_runtime.test.ts checks existsSync(engine.ball.json) at module
      # load and SKIPS its ~227 conformance subtests if it is missing — and the
      # file is gitignored. Generate it explicitly here (rather than relying on
      # engine_parse.test.ts's on-demand shell-out, which races module load) so
      # the TS compiler gate exercises the full self-host suite with no skips.
      - name: Generate engine.ball.json (self-host source)
        run: cd dart && dart run encoder/tool/roundtrip_engine.dart --skip-analyze --save-program self_host/engine.ball.json

      # ── @ball-lang/engine — prints: "Results: N passed, M failed, T total"
      - name: Install @ball-lang/engine
        run: cd ts/engine && npm ci

      - name: Build @ball-lang/engine
        run: cd ts/engine && npm run build

      - name: Engine — assert 0 failed and every test passed
        run: |
          set -o pipefail
          cd ts/engine
          output=$(npm test 2>&1) || { echo "$output"; echo "::error::TS engine suite exited non-zero"; exit 1; }
          echo "$output"

          passed=$(echo "$output" | grep -oP 'Results: \K\d+(?= passed)' | tail -1)
          failed=$(echo "$output" | grep -oP ', \K\d+(?= failed)'        | tail -1)
          total=$(echo "$output"  | grep -oP ', \K\d+(?= total)'         | tail -1)

          if [ -z "$passed" ] || [ -z "$failed" ] || [ -z "$total" ]; then
            echo "::error::Could not parse the 'Results: N passed, M failed, T total' line from TS engine output"
            exit 1
          fi

          echo "TS engine: $passed passed, $failed failed, $total total"
          if [ "$failed" != "0" ]; then
            echo "::error::TS engine has $failed failing test(s) — every test must pass"
            exit 1
          fi
          if [ "$passed" != "$total" ]; then
            echo "::error::TS engine: only $passed of $total tests passed — $((total - passed)) did not run/pass (skipped or errored). No skipping allowed."
            exit 1
          fi

      # ── @ball-lang/compiler — uses `node --test`, prints "# pass N" / "# fail N" / "# skipped N"
      - name: Install @ball-lang/compiler
        run: cd ts/compiler && npm ci

      - name: Build @ball-lang/compiler
        run: cd ts/compiler && npm run build

      - name: Compiler — assert 0 fail and 0 skipped
        run: |
          set -o pipefail
          cd ts/compiler
          output=$(npm test 2>&1) || { echo "$output"; echo "::error::TS compiler suite exited non-zero"; exit 1; }
          echo "$output"

          # node --test summary line varies by reporter:
          #   * TAP reporter (non-TTY direct invocation): "# pass N" / "# fail N" / "# skipped N"
          #   * spec reporter (the default when run via npm):  "ℹ pass N" / "ℹ fail N" / "ℹ skipped N"
          # Match either form by anchoring on the trailing keyword.
          passed=$(echo "$output"  | grep -oP '(^# pass |pass )\K\d+'       | tail -1)
          failed=$(echo "$output"  | grep -oP '(^# fail |fail )\K\d+'       | tail -1)
          skipped=$(echo "$output" | grep -oP '(^# skipped |skipped )\K\d+' | tail -1)

          if [ -z "$passed" ] || [ -z "$failed" ]; then
            echo "::error::Could not parse the '# pass N' / '# fail N' summary from TS compiler output"
            exit 1
          fi
          skipped=${skipped:-0}

          echo "TS compiler: $passed pass, $failed fail, $skipped skipped"
          if [ "$failed" != "0" ]; then
            echo "::error::TS compiler has $failed failing test(s) — every test must pass"
            exit 1
          fi
          if [ "$skipped" != "0" ]; then
            echo "::error::TS compiler has $skipped skipped test(s) — no skipping allowed"
            exit 1
          fi

  # ──────────────────────────────────────────────────
  # Dart regression gate — engine, encoder, and compiler must each
  # run every test with 0 failed and 0 skipped (compiler excludes
  # @Tags(['slow']) to match ci.yml; excluded tests are not run, not skipped).
  # ──────────────────────────────────────────────────
  dart-regression:
    name: Dart Regression Gate (engine + encoder + compiler)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      # The Dart compiler test suite shells out to @ball-lang/compiler.
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Dart workspace
        run: cd dart && dart pub get

      - name: Install & build @ball-lang/compiler
        run: cd ts/compiler && npm ci && npm run build

      - name: Engine — assert 0 failed and 0 skipped
        run: |
          set -o pipefail
          cd dart/engine
          output=$(dart test --reporter expanded 2>&1) || { echo "$output"; echo "::error::Dart engine suite exited non-zero"; exit 1; }
          echo "$output"

          # `|| true` on each: under `bash -e` + pipefail a grep with no match
          # exits non-zero (e.g. an all-green run has no `-N`/`~N`), which would
          # otherwise abort the step before the count checks run.
          passed=$(echo "$output"  | grep -oP '\+\K\d+'            | tail -1 || true)
          failed=$(echo "$output"  | grep -oP '(?<![+~])-\K\d+'    | tail -1 || true)
          skipped=$(echo "$output" | grep -oP '~\K\d+'             | tail -1 || true)
          failed=${failed:-0}; skipped=${skipped:-0}

          if [ -z "$passed" ]; then
            echo "::error::Could not parse Dart engine pass count"
            exit 1
          fi

          echo "Dart engine: $passed passed, $failed failed, $skipped skipped"
          if [ "$failed" != "0" ]; then
            echo "::error::Dart engine has $failed failing test(s) — every test must pass"
            exit 1
          fi
          if [ "$skipped" != "0" ]; then
            echo "::error::Dart engine has $skipped skipped test(s) — no skipping allowed"
            exit 1
          fi

      - name: Encoder — assert 0 failed and 0 skipped
        run: |
          set -o pipefail
          cd dart/encoder
          output=$(dart test --reporter expanded 2>&1) || { echo "$output"; echo "::error::Dart encoder suite exited non-zero"; exit 1; }
          echo "$output"

          # `|| true` on each: under `bash -e` + pipefail a grep with no match
          # exits non-zero (e.g. an all-green run has no `-N`/`~N`), which would
          # otherwise abort the step before the count checks run.
          passed=$(echo "$output"  | grep -oP '\+\K\d+'            | tail -1 || true)
          failed=$(echo "$output"  | grep -oP '(?<![+~])-\K\d+'    | tail -1 || true)
          skipped=$(echo "$output" | grep -oP '~\K\d+'             | tail -1 || true)
          failed=${failed:-0}; skipped=${skipped:-0}

          if [ -z "$passed" ]; then
            echo "::error::Could not parse Dart encoder pass count"
            exit 1
          fi

          echo "Dart encoder: $passed passed, $failed failed, $skipped skipped"
          if [ "$failed" != "0" ]; then
            echo "::error::Dart encoder has $failed failing test(s) — every test must pass"
            exit 1
          fi
          if [ "$skipped" != "0" ]; then
            echo "::error::Dart encoder has $skipped skipped test(s) — no skipping allowed"
            exit 1
          fi

      - name: Compiler — assert 0 failed and 0 skipped (exclude slow)
        run: |
          set -o pipefail
          cd dart/compiler
          output=$(dart test --reporter expanded --exclude-tags slow 2>&1) || { echo "$output"; echo "::error::Dart compiler suite exited non-zero"; exit 1; }
          echo "$output"

          # `|| true` on each: under `bash -e` + pipefail a grep with no match
          # exits non-zero (e.g. an all-green run has no `-N`/`~N`), which would
          # otherwise abort the step before the count checks run.
          passed=$(echo "$output"  | grep -oP '\+\K\d+'            | tail -1 || true)
          failed=$(echo "$output"  | grep -oP '(?<![+~])-\K\d+'    | tail -1 || true)
          skipped=$(echo "$output" | grep -oP '~\K\d+'             | tail -1 || true)
          failed=${failed:-0}; skipped=${skipped:-0}

          if [ -z "$passed" ]; then
            echo "::error::Could not parse Dart compiler pass count"
            exit 1
          fi

          echo "Dart compiler: $passed passed, $failed failed, $skipped skipped"
          if [ "$failed" != "0" ]; then
            echo "::error::Dart compiler has $failed failing test(s) — every test must pass"
            exit 1
          fi
          if [ "$skipped" != "0" ]; then
            echo "::error::Dart compiler has $skipped skipped test(s) — no skipping allowed"
            exit 1
          fi

  # ──────────────────────────────────────────────────
  # C++ self-host gate — the compiled Ball engine (engine_rt.cpp) must pass
  # EVERY conformance fixture: 0 fail, 0 timeout, 0 crash. Each fixture is its
  # own CTest test, run in its own process (cpp/test/CMakeLists.txt), so a
  # crash/hang fails only that fixture; CTest fails the job if any is non-pass.
  # (Job id/name kept stable for branch-protection required-check matching.)
  # ──────────────────────────────────────────────────
  cpp-selfhost-tally:
    name: C++ Self-Host Tally (every fixture must pass)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: cpp-selfhost
          max-size: 1G

      - name: Install nlohmann-json + ninja
        run: sudo apt-get update && sudo apt-get install -y nlohmann-json3-dev ninja-build

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Cache Dart pub
        uses: actions/cache@v5.0.5
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('dart/**/pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Bootstrap Dart workspace (engine_rt generation)
        run: cd dart && dart pub get

      - name: Configure CMake (bootstrap compiler)
        run: cmake -S cpp -B cpp/ci-build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build ball_cpp_compile
        run: cmake --build cpp/ci-build --config Release --target ball_cpp_compile

      - name: Generate engine_rt.cpp
        run: dart run dart/compiler/tool/compile_engine_cpp.dart --monolithic

      - name: Configure CMake (enable self-host target)
        run: cmake -S cpp -B cpp/ci-build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build self-host conformance binary
        run: cmake --build cpp/ci-build --config Release --target test_selfhost_conformance

      - name: Run self-host conformance (per-fixture, isolated, via CTest)
        # Each conformance fixture is its own CTest test (label "selfhost"), run
        # in its own process on the binary's main thread — see
        # cpp/test/CMakeLists.txt. CTest provides the cross-platform process
        # isolation + per-test timeout (1200s), and exits non-zero if ANY fixture
        # fails, times out, or crashes — so a single stack-overflowing fixture
        # fails only its own test instead of killing the whole run.
        # Run SEQUENTIALLY (no -j): the self-host engine is a slow std::any
        # tree-walker and several fixtures are CPU/memory-heavy (the heaviest,
        # 143_perfect_number, ~110s alone — more on slower CI runners). Parallel
        # runs make them contend for cores/RAM, swap, and blow the timeout;
        # sequential keeps each fixture at its predictable solo cost — well under
        # the 1200s budget — at the same wall-clock as the old per-fixture loop.
        # --no-tests=error guards against the self-host tests not being
        # registered (e.g. engine_rt missing). Replaces that hand-rolled loop.
        run: >-
          ctest --test-dir cpp/ci-build -C Release
          -L selfhost
          --output-on-failure --no-tests=error
