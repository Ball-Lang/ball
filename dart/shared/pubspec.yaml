name: ball_base
description: >-
  Cross-language standard library for the ball programming language.
  Contains the universal std base module definition and the
  buf-generated protobuf types shared by all target-language compilers.
version: 0.1.0

environment:
  sdk: ^3.9.0


executables:
  gen_std:
    gen_std

dependencies:
  fixnum: ^1.1.1
  protobuf: ^6.0.0

dev_dependencies:
  lints: ^6.1.0
  test: ^1.25.0




resolution: workspace
