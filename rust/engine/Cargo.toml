[package]
name = "ball-engine"
description = "Ball engine (self-hosted, compiled from dart/self_host/engine.ball.json)."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[features]
# The self-hosted engine driver — wires in the generated `compiled_engine.rs`
# and drives its `BallEngine`/`StdModuleHandler` classes. OFF by default:
# `compiled_engine.rs` is regenerated by `ball-engine-regen` and does not yet
# compile through `ball-compiler` (issue #39 — see AGENTS.md's "Self-host
# status" and the gap report). Keeping it behind an off-by-default feature
# means `cargo build -p ball-engine` / `cargo test -p ball-engine` stay green
# on the wrapper foundation (loader + scope + ball_proto access patterns)
# while the compiler gaps are closed under separate follow-up issues.
default = []
self_host = []

[dependencies]
ball-shared = { workspace = true }
prost = { workspace = true }
prost-reflect = { workspace = true, features = ["serde"] }
serde_json = "1"
