  # ──────────────────────────────────────────────────
  # C# Compiler leg — Ball → C# → Roslyn → run, per fixture (#452)
  #
  # A COMPILE leg, not an engine leg, and deliberately gated as a RATCHET
  # rather than a parity gate. The Ball → C# compiler does not yet cover the
  # whole language: at the floor below it emits 224 of 320 fixtures correctly.
  # Gating it at full parity would just hold main red; leaving it unrun (the
  # status quo this closes) left the gap UNMEASURED, which is worse — an
  # unmeasured gap regresses silently.
  #
  # So: run it every time, report the honest count, fail only if the count goes
  # DOWN. Raise CSHARP_COMPILER_FLOOR as each family lands — the job prints the
  # exact new value when it sees an improvement.
  #
  # Needs no Dart bootstrap and no -p:SelfHost=true: the leg compiles each
  # fixture with CSharpCompiler + Roslyn in-memory and runs it, never touching
  # the self-hosted engine. It is independent of the regen chain the
  # csharp-engine row depends on, so it is cheap and cannot be broken by it.
  # ──────────────────────────────────────────────────
  csharp-compiler:
    name: C# Compiler Leg (ratcheted)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      # Fixtures the Ball → C# compiler currently emits correctly. NEVER lower
      # this to turn a red build green — preventing exactly that is the whole
      # point of a ratchet. Open families are catalogued in #452.
      CSHARP_COMPILER_FLOOR: "245"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "10.0.x"

      - name: Build conformance harness
        run: dotnet build csharp/engine/conformance/Ball.Engine.Conformance.csproj -c Release

      - name: Run compiler leg
        id: conformance
        run: |
          cd csharp
          set +e
          output=$(dotnet run --project engine/conformance/Ball.Engine.Conformance.csproj -c Release --no-build -- --leg=compiler 2>&1)
          exit_code=$?
          echo "$output"

          # Parse counts from the FINAL `Results:` line ONLY — never a global
          # grep over all output. A leg's own progress chatter can contain a
          # second match (the Rust leg prints "320 fixtures emitted Rust, 0
          # failed to compile"), which makes `grep -oP` return a MULTILINE
          # value, splits the echo, and makes GITHUB_OUTPUT reject the write.
          # Same summary-anchored idiom regression-gates.yml uses for dart test.
          summary=$(echo "$output" | grep -E '^Results: [0-9]+ passed' | tail -1 || true)
          passed=$(echo "$summary" | grep -oP 'Results: \K\d+(?= passed)' | tail -1 || true)
          failed=$(echo "$summary" | grep -oP ', \K\d+(?= failed)'  | tail -1 || true)
          total=$(echo "$summary"  | grep -oP ', \K\d+(?= total)'   | tail -1 || true)

          # Assert each count is a single bare integer. A MULTILINE value would
          # make `[ "$passed" -lt "$FLOOR" ]` error with exit 2 — and a failing
          # `[` in an `if` SKIPS the branch, so the script would fall through to
          # `exit 0`: a silently disabled gate. tail -1 above makes that
          # unreachable; this asserts it rather than trusting it.
          for v in "$passed" "$failed" "$total"; do
            case "$v" in
              ''|*[!0-9]*)
                echo "::error::Could not parse a clean integer count from the Results line (got '$v'). Refusing to report a number this gate cannot trust."
                exit 1;;
            esac
          done
          passed=${passed:-0}; failed=${failed:-0}; total=${total:-0}

          echo "passed=$passed" >> "$GITHUB_OUTPUT"
          echo "failed=$failed" >> "$GITHUB_OUTPUT"
          echo "total=$total"   >> "$GITHUB_OUTPUT"
          echo "floor=$CSHARP_COMPILER_FLOOR" >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== C# Compiler Leg ==="
          echo "Results: $passed passed, $failed failed, $total total (floor: $CSHARP_COMPILER_FLOOR)"

          # A harness that printed nothing must never read as a silent pass
          # (#439/#444). The ratchet floor below is >= 1 by construction, but
          # keep the parse guard explicit and separate from it.
          if [ "$exit_code" != "0" ] && [ "$total" -lt 1 ]; then
            echo "::error::The compiler leg crashed without reporting a Results line — it measured nothing"
            exit 1
          fi
          if [ "$total" -lt 1 ]; then
            echo "::error::Could not parse a Results line from the compiler leg — it ran no fixtures"
            exit 1
          fi

          if [ "$passed" -lt "$CSHARP_COMPILER_FLOOR" ]; then
            echo "::error::C# compiler leg REGRESSED: $passed passed, below the floor of $CSHARP_COMPILER_FLOOR — a fixture that used to compile no longer does"
            exit 1
          fi

          if [ "$passed" -gt "$CSHARP_COMPILER_FLOOR" ]; then
            echo "::notice::C# compiler leg IMPROVED: $passed passed (floor was $CSHARP_COMPILER_FLOOR). Raise CSHARP_COMPILER_FLOOR to $passed in this workflow to lock the gain in."
          fi
          exit 0

    outputs:
      passed: ${{ steps.conformance.outputs.passed }}
      failed: ${{ steps.conformance.outputs.failed }}
      total: ${{ steps.conformance.outputs.total }}
      floor: ${{ steps.conformance.outputs.floor }}

  # ──────────────────────────────────────────────────
  # Compiler legs — Ball -> <lang> -> build -> run, PER FIXTURE (#452)
  #
  # These are COMPILE legs, not engine legs, and every one is gated as a
  # RATCHET rather than a parity gate. Read the C# row above for the full
  # rationale; the short version:
  #
  #   A self-hosted engine only has to compile ONE Ball program
  #   (engine.ball.json, a subset of the language). A compile leg sweeps all
  #   320 fixture programs. The engine rows being green says NOTHING about the
  #   compilers — and until now, Rust/Go/Python had no compile leg at all, so
  #   their compilers were UNMEASURED, which is a different claim from passing.
  #
  # Measured on first run (each number reproduced independently twice):
  #   Go 243/320   Python 238/320   Rust 237/320   C# 226/320
  # For contrast, TS Compiled (Direct) and C++ Compiled are 320/320 — so the
  # corpus IS fully compilable and the algorithms exist. These four are ports
  # that are not finished.
  #
  # Gate on "the count did not go DOWN". Raise the floor in the SAME PR that
  # closes a family, or the gain is not locked in. NEVER lower a floor to turn
  # a red build green — preventing exactly that is what a ratchet is for.
